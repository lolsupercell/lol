<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPSC & APPSC Gr-I Preparation Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A84FF">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1D1D1F;
  --paper:#F5F5F7;
  --paper-2:#ECECEE;
  --seal:#0A84FF;
  --seal-dim:#0A84FF14;
  --teal:#30B05C;
  --teal-dim:#30B05C1a;
  --gold:#FF9F0A;
  --gold-dim:#FF9F0A1a;
  --charcoal:#1D1D1F;
  --line:#E5E5EA;
  --white:#ffffff;
  --radius:10px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 2px 6px rgba(0,0,0,.05),0 8px 20px rgba(0,0,0,.05);
  --leaf-deep:#2FA84F;
  --leaf:#9AD4AC;
  --bark-mid:#F5CD82;
  --bark:#F3B08F;
  --bark-dark:#D8D6D2;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--charcoal);
  font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{
  font-family:inherit;
  color:var(--ink);
  margin:0 0 8px 0;
  font-weight:600;
  letter-spacing:-.01em;
}
.mono{font-family:'SF Mono','IBM Plex Mono',monospace;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
::selection{background:var(--seal-dim);color:var(--seal);}

/* ---------- App shell ---------- */
#app{display:flex;min-height:100vh;}
#sidebar{
  width:220px;flex:none;background:var(--white);color:var(--charcoal);border-right:1px solid var(--line);
  padding:28px 0 20px 0;position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{padding:0 20px 20px 20px;border-bottom:1px solid var(--line);margin-bottom:14px;}
.brand .stamp-mini{
  width:36px;height:36px;border:none;border-radius:9px;background:var(--seal);
  display:flex;align-items:center;justify-content:center;
  font-family:inherit;font-weight:700;color:#fff;font-size:14px;margin-bottom:10px;
}
.stamp-mini svg{width:20px;height:20px;flex:none;}
.brand h1{color:var(--ink);font-size:17px;line-height:1.25;margin:0;}
.brand .sub{font-size:11px;color:#8E8E93;font-family:inherit;letter-spacing:.02em;margin-top:4px;text-transform:uppercase;}
.navlist{list-style:none;margin:0;padding:0 8px;}
.navlist li{margin:2px 0;}
.navlist button{
  width:100%;text-align:left;background:none;border:none;color:#3C3C43;padding:10px 12px;font-size:13.5px;
  display:flex;align-items:center;gap:10px;border-left:none;border-radius:8px;
  transition:background .15s, color .15s;
}
.navlist .tabnum{font-family:inherit;font-size:11px;color:#AEAEB2;opacity:.9;}
.navlist button:hover{background:rgba(0,0,0,.04);color:var(--ink);}
.navlist button.active{background:var(--seal-dim);color:var(--seal);font-weight:600;}
.navlist button.active .tabnum{color:var(--seal);}

#main{flex:1;min-width:0;padding:34px 40px 80px 40px;max-width:1220px;}
.page{display:none;}
.page.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

/* ---------- Mobile top bar + drawer nav ---------- */
#mobile-topbar{display:none;}
#nav-overlay{display:none;}
#edge-tab{display:none;}
@media(max-width:900px){
  #app{display:block;}
  #mobile-topbar{
    display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40;
    background:var(--white);border-bottom:1px solid var(--line);padding:12px 16px;
  }
  #mobile-topbar .stamp-mini{
    width:30px;height:30px;border:none;border-radius:8px;background:var(--seal);
    display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:12px;flex:none;
  }
  #mobile-topbar .stamp-mini svg{width:17px;height:17px;}
  #mobile-topbar h1{font-size:15px;margin:0;color:var(--ink);}
  #hamburger{
    width:36px;height:36px;flex:none;border:none;background:none;border-radius:8px;
    display:flex;align-items:center;justify-content:center;margin-left:auto;
  }
  #hamburger:active{background:rgba(0,0,0,.06);}
  #hamburger span{display:block;width:18px;height:2px;background:var(--ink);position:relative;}
  #hamburger span::before,#hamburger span::after{content:"";position:absolute;left:0;width:18px;height:2px;background:var(--ink);}
  #hamburger span::before{top:-5px;}
  #hamburger span::after{top:5px;}

  #sidebar{
    position:fixed;top:0;left:0;height:100vh;width:78vw;max-width:280px;
    transform:translateX(-100%);transition:transform .22s ease;z-index:60;
    box-shadow:0 0 0 rgba(0,0,0,0);
  }
  #sidebar.open{transform:translateX(0);box-shadow:2px 0 24px rgba(0,0,0,.18);}
  #sidebar .live-clock{display:none;}

  #nav-overlay.open{
    display:block;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;
  }

  #main{padding:18px 16px 60px 16px;max-width:100%;}
  .hero{padding:18px 16px;}

  /* A small tab on the screen edge, sitting at a comfortable thumb height,
     so opening the menu doesn't always mean reaching all the way up to the
     top corner — one-handed use on a tall phone. */
  #edge-tab{
    display:flex;align-items:center;justify-content:center;
    position:fixed;left:0;top:62%;transform:translateY(-50%);z-index:39;
    width:26px;height:58px;border:none;border-radius:0 12px 12px 0;
    background:var(--seal);color:#fff;box-shadow:2px 2px 10px rgba(0,0,0,.18);
    padding:0;
  }
  #edge-tab svg{width:15px;height:15px;}
  #edge-tab:active{background:#0972df;}
  body.mood-good #edge-tab{background:rgb(47,168,79);}
  body.mood-low #edge-tab{background:rgb(255,105,97);}
}

.pagehead{margin-bottom:26px;padding-bottom:14px;}
.pagehead .eyebrow{font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--seal);margin-bottom:4px;font-weight:600;}
.pagehead p{margin:6px 0 0 0;color:#6E6E73;max-width:680px;font-size:13.5px;}

.card{background:var(--white);border:none;box-shadow:var(--shadow-sm);border-radius:16px;padding:20px 22px;margin-bottom:18px;}
.card h3{font-size:15px;margin-bottom:12px;padding-left:11px;border-left:3px solid var(--seal);}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:1fr 1fr;}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

.hero{
  display:flex;gap:26px;align-items:center;flex-wrap:wrap;background:var(--white);
  border:none;box-shadow:var(--shadow-sm);border-radius:20px;padding:26px 28px;margin-bottom:20px;position:relative;overflow:hidden;
}
.stamp{
  flex:none;width:104px;height:104px;border-radius:22px;border:none;background:var(--seal-dim);
  display:flex;align-items:center;justify-content:center;flex-direction:column;transform:none;
  color:var(--seal);text-align:center;
}
.stamp .phase{font-family:inherit;font-weight:700;font-size:13px;letter-spacing:.01em;line-height:1.15;}
.stamp .phase-sub{font-family:inherit;font-size:9px;margin-top:4px;letter-spacing:.04em;opacity:.8;}
.hero-info{flex:1;min-width:240px;}
.hero-info .target{font-family:inherit;font-size:12px;color:#6E6E73;text-transform:uppercase;letter-spacing:.04em;}
.hero-info .countdown{font-family:inherit;font-size:34px;font-weight:700;color:var(--ink);margin:4px 0;}
.hero-info .countdown small{font-size:15px;font-weight:400;color:#6E6E73;}

.stat{border:none;background:var(--white);box-shadow:var(--shadow-sm);border-radius:14px;padding:14px 16px;}
.stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#8E8E93;font-family:inherit;}
.stat .value{font-family:inherit;font-weight:700;font-size:24px;color:var(--ink);margin-top:4px;}
.stat .value.up{color:var(--teal);}
.stat .value.down{color:#FF6961;}

.progress-track{background:var(--paper-2);height:8px;border-radius:4px;overflow:hidden;margin-top:6px;}
.progress-fill{height:100%;background:var(--teal);border-radius:4px;}
.progress-track.small{height:5px;}

.banner{
  border:none;background:var(--gold-dim);padding:14px 18px;margin-bottom:18px;border-radius:14px;
  display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
}
.banner p{margin:0;font-size:13.5px;}
.banner button{background:var(--ink);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12.5px;}

label{display:block;font-size:12px;color:#6E6E73;margin-bottom:4px;font-family:inherit;text-transform:uppercase;letter-spacing:.03em;font-weight:500;}
input,select,textarea{
  width:100%;padding:9px 11px;border:1px solid var(--line);background:var(--white);
  font-family:inherit;font-size:14px;color:var(--charcoal);border-radius:var(--radius);
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--seal);box-shadow:0 0 0 3px var(--seal-dim);}
textarea{min-height:60px;resize:vertical;}
/* Native number-input spin arrows eat into narrow fields and clip the digits
   (e.g. a 3-digit minute value behind tiny up/down arrows in a 60px box).
   Removed everywhere; typing a value directly still works fine, and the few
   fields that specifically want a stepper (like hours-stepper) already have
   their own custom +/− buttons. */
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.field{margin-bottom:12px;}
.btn{background:var(--ink);color:#fff;border:none;padding:9px 16px;font-size:13px;border-radius:var(--radius);font-weight:500;transition:opacity .15s,background .15s,transform .15s,box-shadow .15s;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn.secondary{background:var(--paper-2);border:none;color:var(--ink);}
.btn.secondary:hover{background:var(--line);opacity:1;}
.btn.seal{background:linear-gradient(135deg,var(--seal),#5E5CE6);box-shadow:0 3px 12px rgba(10,132,255,.28);}
.btn.seal:hover{box-shadow:0 6px 18px rgba(10,132,255,.4);opacity:1;}
.btn.small{padding:5px 10px;font-size:12px;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* DMY date field */
.dmy-wrap{display:flex;gap:6px;align-items:stretch;}
.dmy-text{flex:1;letter-spacing:.03em;}
.dmy-cal{
  flex:none;width:38px;border:1px solid var(--line);background:var(--paper-2);border-radius:var(--radius);
  font-size:15px;
}
.dmy-cal:hover{background:var(--line);}

/* Self-contained calendar popup (no native <input type=date>, no network — works fully offline) */
#popup-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:9997;}
#popup-backdrop.open{display:block;}
#cal-popup{
  position:fixed;z-index:9999;background:var(--white);border:none;border-radius:14px;
  box-shadow:var(--shadow-md);padding:12px;width:296px;display:none;font-family:inherit;
}
#cal-popup.open{display:block;}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:4px;}
.cal-head .cal-title{font-family:inherit;font-weight:600;font-size:13px;color:var(--ink);display:flex;gap:4px;}
.cal-title select{border:1px solid var(--line);border-radius:6px;font-size:12.5px;padding:2px 4px;background:var(--white);font-family:inherit;color:var(--ink);}
.cal-nav{background:none;border:1px solid var(--line);border-radius:8px;width:32px;height:32px;font-size:14px;line-height:1;color:var(--ink);flex:none;}
.cal-nav:hover{background:var(--paper-2);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-dow{font-size:10px;text-align:center;color:#8E8E93;font-family:inherit;padding:2px 0 4px 0;}
.cal-day{
  font-size:13px;text-align:center;padding:9px 0;border-radius:8px;background:none;border:none;color:var(--charcoal);
  cursor:pointer;
}
.cal-day:hover{background:var(--gold-dim);}
.cal-day.muted{color:#C7C7CC;}
.cal-day.today{font-weight:700;color:var(--seal);}
.cal-day.selected{background:var(--ink);color:#fff;}
.cal-foot{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--line);}
.cal-foot button{background:none;border:none;color:var(--teal);font-size:12px;text-decoration:underline;padding:0;}

/* Time field (text + clock icon) — mirrors the DMY date field */
.tm-wrap{display:flex;gap:6px;align-items:stretch;}
.tm-text{flex:1;letter-spacing:.02em;min-width:0;padding-left:8px;padding-right:6px;}
.tm-clock{
  flex:none;width:38px;border:1px solid var(--line);background:var(--paper-2);border-radius:var(--radius);
  font-size:15px;
}
.tm-clock:hover{background:var(--line);}

/* Self-contained analog clock popup — a working, draggable clock face used to set times */
#time-popup{
  position:fixed;z-index:9999;background:var(--white);border:none;border-radius:16px;
  box-shadow:var(--shadow-md);padding:14px;width:236px;display:none;font-family:inherit;
}
#time-popup.open{display:block;}
.tp-display{display:flex;align-items:center;justify-content:center;gap:2px;font-family:inherit;font-weight:700;font-size:25px;color:var(--ink);margin-bottom:8px;user-select:none;}
.tp-h,.tp-m{cursor:pointer;padding:2px 6px;border-radius:6px;}
.tp-h.active,.tp-m.active{background:var(--seal-dim);color:var(--seal);}
.tp-ampm{display:flex;flex-direction:column;margin-left:8px;font-size:10.5px;font-family:inherit;}
.tp-ampm-btn{border:1px solid var(--line);background:var(--white);padding:2px 7px;cursor:pointer;color:#8E8E93;}
.tp-ampm-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.tp-ampm-btn:first-child{border-radius:6px 6px 0 0;}
.tp-ampm-btn:last-child{border-radius:0 0 6px 6px;border-top:none;}
.tp-face-wrap{display:flex;justify-content:center;touch-action:none;}
.tp-face{cursor:pointer;}
.tp-face-bg{fill:var(--paper-2);}
.tp-hand{stroke:var(--seal);stroke-width:2;}
.tp-hand-knob{fill:var(--seal);}
.tp-center{fill:var(--ink);}
.tp-num{font-family:inherit;font-size:13px;fill:var(--charcoal);text-anchor:middle;dominant-baseline:central;cursor:pointer;user-select:none;}
.tp-num.selected{fill:var(--white);font-weight:700;}
.tp-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid var(--line);}
.tp-foot button{background:none;border:none;color:var(--teal);font-size:12px;text-decoration:underline;padding:0;}
.tp-foot #tp-ok{color:var(--seal);font-weight:600;}

/* Live analog clock — the "working clock" in the sidebar */
.live-clock{display:flex;flex-direction:column;align-items:center;gap:5px;margin-top:14px;}
.lc-face{fill:var(--paper);stroke:var(--line);stroke-width:1.5;}
.lc-tick{stroke:var(--charcoal);stroke-opacity:.3;stroke-width:1;}
.lc-hand{stroke:var(--charcoal);stroke-linecap:round;}
.lc-hour{stroke-width:3;}
.lc-min{stroke-width:2;}
.lc-sec{stroke:var(--seal);stroke-width:1;}
.lc-center{fill:var(--seal);}
.lc-digital{font-size:10px;color:#8E8E93;letter-spacing:.05em;}

/* Mundane / routine task rows (Daily Log + Settings) */
.mundane-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:9px 0;border-top:1px solid var(--line);}
.mundane-row:first-child{border-top:none;}
.mundane-row .mr-check{display:flex;align-items:center;gap:7px;flex:1;min-width:130px;font-size:13px;text-transform:none;font-family:inherit;color:var(--charcoal);cursor:pointer;}
.mundane-row .mr-check input{width:auto;accent-color:var(--teal);}
.mundane-row .mr-times{display:flex;align-items:center;gap:6px;flex-wrap:wrap;flex:1 1 auto;min-width:0;}
.mundane-row .mr-times .tm-wrap{width:150px;flex:0 1 150px;}
.mundane-row .mr-dur{flex:none;width:52px;text-align:right;color:#8E8E93;}
@media(max-width:560px){
  .mundane-row .mr-times{flex-basis:100%;}
}
.mundane-edit-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;border:none;border-radius:10px;padding:9px 10px;margin-bottom:7px;background:var(--paper);}
.mundane-edit-row .tm-wrap{width:152px;}

/* Syllabus search */
#syl-search{width:100%;}
#syl-search-results{
  position:absolute;left:20px;right:20px;top:100%;margin-top:2px;z-index:60;
  background:var(--white);border:none;border-radius:12px;max-height:340px;overflow-y:auto;
  box-shadow:var(--shadow-md);
}
#syl-search-results:empty{border:none;box-shadow:none;}
.search-item{
  display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--paper-2);
  padding:9px 12px;cursor:pointer;
}
.search-item:last-child{border-bottom:none;}
.search-item:hover{background:var(--paper-2);}
.search-item .si-name{font-size:13px;color:var(--charcoal);margin-bottom:2px;}
.search-item .si-path{font-size:10.5px;font-family:inherit;color:#8E8E93;}
.search-item.empty-hit{color:#8E8E93;font-size:12.5px;cursor:default;}
.search-item.empty-hit:hover{background:none;}

/* Daily Log — two-column layout: sessions (tabs) on the left, day metadata on the right */
.daily-layout{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start;}
@media (max-width:800px){ .daily-layout{grid-template-columns:1fr;} }
.dl-sidebar .card{margin-bottom:14px;}
.session-tabs{display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--line);margin-bottom:16px;}
.session-tab{
  padding:9px 15px;border:none;border-radius:10px 10px 0 0;
  background:var(--paper-2);cursor:pointer;font-size:12.5px;color:#6E6E73;position:relative;top:1px;
  display:flex;align-items:center;gap:7px;max-width:170px;font-weight:500;
  transition:background .15s ease,color .15s ease;
}
.session-tab:hover{background:var(--line);color:var(--ink);}
.session-tab span.st-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.session-tab.active{
  background:var(--white);box-shadow:0 -2px 0 var(--seal) inset,var(--shadow-sm);
  font-weight:700;color:var(--ink);
}
.session-tab .st-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex:none;}
.session-tab .st-hrs{font-family:inherit;font-size:10.5px;color:#8E8E93;flex:none;}
.session-tab-add{
  padding:9px 14px;border:1px dashed var(--line);border-bottom:none;border-radius:10px 10px 0 0;
  background:none;cursor:pointer;font-size:16px;line-height:1;color:var(--teal);position:relative;top:1px;
  transition:background .15s ease;
}
.session-tab-add:hover{background:var(--teal-dim);}

/* Tags */
.tag{
  display:inline-block;font-family:inherit;font-size:10.5px;padding:2px 8px;border-radius:10px;
  margin-right:4px;letter-spacing:.02em;text-transform:uppercase;font-weight:600;
}
.tag.imp-high{background:#FF3B301a;color:#D93A2B;}
.tag.imp-medium{background:var(--gold-dim);color:#B5730A;}
.tag.imp-low{background:var(--teal-dim);color:var(--teal);}
.tag.pyq{background:var(--ink);color:#fff;}

/* Breadcrumb */
.crumb{font-family:inherit;font-size:12px;color:#8E8E93;margin-bottom:14px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;}
.crumb span.sep{color:#C7C7CC;}
.crumb button{background:none;border:none;color:var(--seal);text-decoration:none;padding:0;font-size:12px;font-family:inherit;}
.crumb button:last-child,.crumb .current{color:#8E8E93;text-decoration:none;font-weight:600;}

/* Tile grid (syllabus) */
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
.tile{
  border:none;background:var(--white);box-shadow:var(--shadow-sm);border-radius:14px;padding:16px 16px 14px 16px;text-align:left;
  cursor:pointer;transition:box-shadow .15s, transform .1s;position:relative;overflow:hidden;
  display:flex;flex-direction:column;gap:8px;min-height:118px;
}
.tile:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.tile .tile-eyebrow{font-family:inherit;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#8E8E93;font-weight:600;}
.tile h4{margin:0;font-size:15.5px;line-height:1.28;color:var(--ink);}
.tile .tile-meta{margin-top:auto;font-size:11px;font-family:inherit;color:#8E8E93;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.tile .ring{
  flex:none;width:34px;height:34px;border-radius:50%;position:relative;
  background:conic-gradient(var(--teal) calc(var(--pct)*1%), var(--paper-2) 0);
}
.tile .ring::after{
  content:attr(data-pct)'%';position:absolute;inset:4px;border-radius:50%;background:var(--white);
  display:flex;align-items:center;justify-content:center;font-size:8.5px;font-family:inherit;font-weight:600;color:var(--ink);
}
.tile.complete{box-shadow:0 0 0 1.5px var(--teal),var(--shadow-sm);}
.tile.stage-tile{min-height:96px;justify-content:center;}
.tile.stage-tile h4{font-size:17px;}

/* Subtopic checklist */
.subtopic-row{
  display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid var(--line);flex-wrap:wrap;
}
.subtopic-row:first-of-type{border-top:none;}
.subtopic-row input[type=checkbox]{width:auto;margin-top:3px;accent-color:var(--teal);flex:none;}
.subtopic-row .tname{flex:1;font-size:13.5px;}
.subtopic-row .tname.done{text-decoration:line-through;color:#8E8E93;}
.subtopic-row .tdate{font-size:10.5px;color:#8E8E93;font-family:inherit;white-space:nowrap;}

/* Revision stepper — increments AND decrements, so an accidental extra click
   can always be walked back down (rather than a one-way toggle/counter). */
.revise-stepper{display:inline-flex;align-items:center;gap:6px;flex:none;}
.revise-stepper .btn{padding:3px 9px;font-size:12px;line-height:1.3;}
.revise-stepper .revise-count{font-size:11.5px;color:#8E8E93;font-family:inherit;white-space:nowrap;min-width:78px;text-align:center;}
.revise-stepper .revise-count.active{color:var(--teal);font-weight:600;}

/* Per-subtopic coverage — 10 clickable bars (10% each). Click a bar to jump
   straight to that level; click the last filled bar again to step back down
   by one. Value is remembered, so progress can be topped up across sessions. */
.progress-row{display:flex;align-items:center;gap:9px;flex-basis:100%;padding-left:26px;margin-top:2px;}
.seg10{display:flex;gap:2px;flex:none;}
.seg10 .seg{
  width:15px;height:11px;background:var(--paper-2);border:none;border-radius:3px;
  cursor:pointer;transition:background .12s;
}
.seg10 .seg:hover{background:var(--teal-dim);}
.seg10 .seg.filled{background:var(--teal);border-color:var(--teal);}
.progress-row .seg-pct{font-size:10.5px;color:#8E8E93;font-family:inherit;min-width:30px;}
.progress-row .seg-reset{background:none;border:none;padding:0;color:var(--seal);font-size:10.5px;text-decoration:underline;font-family:inherit;cursor:pointer;}
@media(max-width:640px){.progress-row{padding-left:0;}}

table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{border:none;border-bottom:1px solid var(--line);padding:9px 10px;text-align:left;vertical-align:top;}
th{background:none;font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:#8E8E93;font-weight:600;}
tr:nth-child(even) td{background:var(--paper);}

.plan-card{border:none;background:var(--white);box-shadow:var(--shadow-sm);border-radius:14px;padding:16px;margin-bottom:14px;}
.plan-card .top-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.plan-card .meta{font-family:inherit;font-size:11px;color:#8E8E93;margin-top:4px;}

/* Planner scope picker — tile drill-down in place of a plain <select>, so
   choosing which paper/section/topic to plan for is a browse, not a scroll. */
.scope-box{
  display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);
  background:linear-gradient(180deg,#fff,var(--paper));padding:9px 14px;min-height:38px;border-radius:12px;
  box-shadow:var(--shadow-sm);
}
.scope-box .scope-current{font-size:13px;color:var(--ink);line-height:1.3;}
.scope-panel{
  border:1px solid var(--line);background:linear-gradient(180deg,var(--paper),#fff 55%);padding:16px;margin-top:10px;border-radius:14px;
  max-height:440px;overflow-y:auto;
}
.tile-grid.compact{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;}
.scope-tile{
  border:none;background:var(--white);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:9px;
  padding:14px;text-align:left;min-height:auto;border-radius:14px;position:relative;overflow:hidden;
  transition:transform .18s ease, box-shadow .18s ease;
}
.scope-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--tile-accent, var(--seal));}
.scope-tile:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.scope-tile-body{background:none;border:none;padding:0;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:5px;}
.scope-tile-body .tile-eyebrow{
  display:inline-block;width:fit-content;font-family:inherit;font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;
  color:var(--tile-accent, var(--seal));font-weight:700;background:var(--tile-accent-dim, var(--seal-dim));
  padding:3px 9px;border-radius:999px;
}
.scope-tile-body h4{margin:0;font-size:14px;line-height:1.28;color:var(--ink);font-family:inherit;font-weight:600;}
.scope-tile-body:hover h4{color:var(--seal);}
.scope-use{align-self:flex-start;border-radius:999px;background:var(--tile-accent, var(--seal))!important;box-shadow:0 3px 10px rgba(0,0,0,.18);}
.tile.scope-tile-single{min-height:auto;padding:12px;position:relative;overflow:hidden;}
.tile.scope-tile-single::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--tile-accent, var(--seal));}
.tile.scope-tile-single .tile-eyebrow{
  display:inline-block;width:fit-content;color:var(--tile-accent, var(--seal));font-weight:700;
  background:var(--tile-accent-dim, var(--seal-dim));padding:3px 9px;border-radius:999px;margin-bottom:2px;
}
.tile.scope-tile-single:hover{box-shadow:0 0 0 1.5px var(--teal),var(--shadow-sm);}
/* List-style rows used for paper / topic / sub-topic levels of the scope picker
   (sections in between stay as tiles) */
.scope-list{display:flex;flex-direction:column;gap:8px;}
.scope-row{
  display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--white);
  border:none;box-shadow:var(--shadow-sm);border-radius:12px;padding:11px 14px;position:relative;overflow:hidden;
}
.scope-row::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--tile-accent, var(--seal));}
.scope-row-body{background:none;border:none;padding:0 0 0 6px;text-align:left;cursor:pointer;display:flex;flex-direction:column;gap:3px;flex:1;min-width:0;font-family:inherit;}
.scope-row-body h4{margin:0;font-size:14px;line-height:1.3;color:var(--ink);font-family:inherit;font-weight:600;}
.scope-row-body:hover h4{color:var(--seal);}
.scope-row-meta{font-size:10.5px;color:#8E8E93;font-family:inherit;}
.scope-row-actions{display:flex;align-items:center;gap:10px;flex:none;}
.scope-row-arrow{color:#C7C7CC;font-size:17px;flex:none;cursor:pointer;line-height:1;padding:2px;}
@media(max-width:480px){
  .scope-row{flex-wrap:wrap;padding:12px;}
  .scope-row-body{padding-left:6px;flex-basis:100%;}
  .scope-row-actions{width:100%;justify-content:space-between;padding-left:6px;}
}
/* Scope picker search — searches across papers, sections, topics and sub-topics */
.scope-search-wrap{position:relative;margin-bottom:14px;}
.scope-search-wrap input{width:100%;}
#pl-scope-search-results{
  margin-top:6px;background:var(--white);border-radius:12px;max-height:280px;overflow-y:auto;
}
#pl-scope-search-results:empty{box-shadow:none;}
#pl-scope-search-results:not(:empty){box-shadow:var(--shadow-md);}
.schedule-summary{
  font-size:12px;color:#636366;font-family:inherit;background:var(--paper);border-radius:10px;
  padding:9px 12px;margin:12px 0;display:flex;flex-wrap:wrap;gap:6px 14px;
}
.schedule-summary strong{color:var(--ink);}
/* Planner — optional daily study window (from/to + break) that auto-fills the hours field */
.window-box{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:14px 16px 2px 16px;margin:2px 0 14px 0;}
.window-box>label{margin-bottom:10px;}
.window-box .field{margin-bottom:12px;}
.window-net{font-size:12px;color:#636366;font-family:inherit;margin:-4px 0 12px 0;min-height:16px;}
.window-net strong{color:var(--seal);}
.window-net .wn-warn{color:#D93A2B;font-weight:500;}
@media(max-width:480px){
  .scope-row-actions .scope-use{font-size:11.5px;padding:6px 10px;}
}
.daybox{
  display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;
  border:1px solid var(--line);font-size:11px;font-family:inherit;margin:2px;border-radius:7px;
  cursor:pointer;background:var(--white);
}
.daybox.done{background:var(--teal);color:#fff;border-color:var(--teal);}
.daybox.missed{background:#FF3B301a;border-color:#FF3B30;color:#D93A2B;}
.daybox.future{opacity:.4;cursor:default;}

.session-row{border:1px solid var(--line);background:var(--white);border-radius:14px;padding:14px 16px 16px 16px;margin-bottom:8px;}
.sess-label-row{display:flex;gap:8px;align-items:center;margin-bottom:2px;}
.sess-label-row .sess-label{flex:1;width:auto;font-weight:600;background:var(--paper);border-color:transparent;}
.sess-label-row .sess-label:focus{background:var(--white);border-color:var(--seal);}
.session-remove-icon{
  flex:none;width:32px;height:32px;padding:0;border-radius:9px;background:none;border:none;
  color:#C7C7CC;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;
}
.session-remove-icon:hover{background:#FF3B301a;color:#D93A2B;}
.session-hint{margin:4px 0 12px 0;}
/* "Studied as" toggle — one continuous stretch vs. broken up with breaks */
.sess-format-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:6px 0 10px 0;}
.sess-format-row .sfr-label{font-size:11px;color:#8E8E93;text-transform:uppercase;letter-spacing:.03em;font-weight:500;flex:none;}

.topic-rows{display:flex;flex-direction:column;gap:10px;margin:0 0 12px 0;}
.topic-row{
  --row-accent:var(--seal);
  position:relative;border:1px solid var(--line);background:var(--paper);border-radius:12px;
  padding:11px 12px 11px 16px;overflow:hidden;
}
.topic-row::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--row-accent);}

/* The picker button replaces the old subject <select> + free-text topic <input>:
   tapping it opens the full paper → section → topic → sub-topic drill-down modal,
   so logging time against one precise sub-topic no longer means scrolling a giant
   dropdown or hoping a native datalist suggestion appears. */
.topic-pick-btn{
  width:100%;display:flex;align-items:center;gap:9px;background:var(--white);border:1px solid var(--line);
  border-radius:9px;padding:9px 10px;text-align:left;font-size:13px;color:var(--ink);
  transition:background .15s,border-color .15s;
}
.topic-pick-btn:hover{background:var(--seal-dim);border-color:var(--seal);}
.topic-pick-btn.placeholder{color:#8E8E93;}
.topic-pick-btn .tpb-icon{flex:none;color:var(--seal);opacity:.75;}
.topic-pick-btn .tpb-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topic-pick-btn .tpb-chevron{flex:none;color:#C7C7CC;font-size:16px;line-height:1;}

.trow-meta{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap;}
.hours-stepper{display:flex;align-items:stretch;height:34px;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex:none;background:var(--white);}
.hours-stepper button{width:26px;background:var(--paper-2);border:none;color:var(--ink);font-size:14px;line-height:1;padding:0;}
.hours-stepper button:hover{background:var(--line);}
.hours-stepper input.s-hours{
  width:42px;border:none;text-align:center;padding:6px 2px;font-size:13px;background:var(--white);border-radius:0;
  -moz-appearance:textfield;
}
.hours-stepper input.s-hours::-webkit-outer-spin-button,.hours-stepper input.s-hours::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.hours-stepper input.s-hours:focus{box-shadow:none;}
.hours-stepper .hs-unit{display:flex;align-items:center;padding:0 9px 0 1px;font-size:10.5px;color:#8E8E93;background:var(--white);}

.done-toggle{
  display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:20px;padding:0 12px;height:34px;
  font-size:12px;font-weight:600;color:#6E6E73;cursor:pointer;background:var(--white);text-transform:none;
  transition:background .15s,border-color .15s,color .15s;
}
.done-toggle input{width:auto;accent-color:var(--teal);margin:0;}
.done-toggle:has(input:checked){background:var(--teal-dim);border-color:var(--teal);color:var(--teal);}

.topic-remove{
  margin-left:auto;flex:none;width:30px;height:30px;padding:0;border-radius:8px;background:none;border:none;
  color:#C7C7CC;font-size:12.5px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;
}
.topic-remove:hover{background:#FF3B301a;color:#D93A2B;}
.topic-row textarea.s-challenges{
  min-height:34px;font-size:12.5px;margin-top:9px;background:var(--white);border-color:var(--line);
}
.activity-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;border:none;background:var(--paper);border-radius:10px;padding:9px 10px;margin-bottom:7px;}

/* Time breakdown donut charts */
.pie-slice{cursor:default;transition:opacity .1s;}
.pie-slice:hover{opacity:.85;}
.tb-legend-row{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;font-size:12.5px;}
.tb-legend-row.clickable{cursor:pointer;}
.tb-legend-row.clickable:hover{background:var(--paper-2);}
.tb-swatch{width:10px;height:10px;border-radius:3px;flex:none;}
.tb-label{flex:1;color:var(--charcoal);}
.tb-val{flex:none;color:#8E8E93;}
.tb-arrow{flex:none;color:var(--teal);font-weight:600;}
.tb-tabs{display:flex;gap:6px;margin-bottom:14px;}

.small-muted{font-size:11.5px;color:#8E8E93;}
.divider{border:none;border-top:1px solid var(--line);margin:18px 0;}
.footer-note{margin-top:40px;font-size:11.5px;color:#8E8E93;text-align:center;font-family:inherit;}

.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.chip{border:1px solid var(--line);padding:6px 14px;font-size:12.5px;border-radius:20px;background:var(--white);cursor:pointer;font-weight:600;color:var(--ink);transition:all .18s ease;}
.chip:hover{border-color:var(--seal);color:var(--seal);transform:translateY(-1px);}
.chip.active{background:linear-gradient(135deg,var(--seal),#5E5CE6);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(10,132,255,.32);}
.chip.active:hover{color:#fff;transform:none;}
.tab-row{display:flex;gap:22px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:14px;}
.tab-flat{border:none;background:none;padding:9px 1px;font-size:13px;font-weight:600;color:#8E8E93;cursor:pointer;position:relative;transition:color .15s ease;font-family:inherit;}
.tab-flat:hover{color:var(--ink);}
.tab-flat.active{color:var(--seal);}
.tab-flat.active::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--seal);border-radius:2px 2px 0 0;}

.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.week-day{border:none;background:var(--white);box-shadow:var(--shadow-sm);border-radius:12px;padding:10px;min-height:90px;font-size:11.5px;}
.week-day .d-num{font-family:inherit;color:#8E8E93;font-size:11px;}
@media(max-width:900px){.week-grid{grid-template-columns:repeat(2,1fr);}}

.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-row .bar-label{width:150px;flex:none;font-size:12.5px;}
.bar-row .bar-track{flex:1;background:var(--paper-2);height:10px;border-radius:5px;overflow:hidden;position:relative;}
.bar-row .bar-fill{height:100%;background:var(--teal);border-radius:5px;}
.bar-row .bar-val{width:74px;flex:none;font-size:11px;font-family:inherit;color:#6E6E73;text-align:right;}

.flag{border-left:none;background:var(--seal-dim);padding:10px 14px;margin-bottom:8px;font-size:13px;border-radius:10px;}
.flag.good{background:var(--teal-dim);}
.flag.warn{background:var(--gold-dim);}

#toast{
  position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transform:translateY(10px);
  box-shadow:var(--shadow-md);
  transition:opacity .2s, transform .2s;pointer-events:none;z-index:999;
}
#toast.show{opacity:1;transform:none;}
.empty{padding:26px;text-align:center;color:#8E8E93;border:1px dashed var(--line);border-radius:14px;font-size:13px;}

/* ---------- Opening Screen: countdown grid + reveal ---------- */
#app{display:none;}
#opening-screen{
  position:fixed;inset:0;z-index:5000;overflow-y:auto;
  background:var(--paper);
  display:flex;align-items:flex-start;justify-content:center;padding:44px 20px 60px 20px;
}
.op-inner{max-width:760px;width:100%;}
.op-top{text-align:center;margin-bottom:24px;}
.op-eyebrow{font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--seal);font-weight:600;}
.op-title{font-size:27px;margin:6px 0 4px 0;font-weight:700;}
.op-title span{color:var(--leaf-deep);}
.op-sub{font-family:inherit;font-size:12.5px;color:#6E6E73;}

.op-grid-card{background:var(--white);border:none;box-shadow:var(--shadow-sm);border-radius:18px;padding:20px;margin-bottom:16px;}
.op-grid-card h3{font-size:12px;text-transform:uppercase;letter-spacing:.04em;font-family:inherit;color:#8E8E93;font-weight:600;margin-bottom:14px;}
.day-grid{display:grid;grid-template-columns:repeat(14,1fr);gap:4px;}
.day-cell{aspect-ratio:1;border-radius:5px;position:relative;transition:transform .12s;}
.day-cell:hover{transform:scale(1.15);z-index:2;}
.day-cell.is-today{box-shadow:0 0 0 2px var(--seal) inset;}
.day-cell:hover::after{
  content:attr(data-tip);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;font-size:10px;padding:4px 8px;border-radius:6px;
  white-space:nowrap;z-index:10;font-family:inherit;pointer-events:none;
}

.op-legend{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;font-size:11px;color:#6E6E73;margin:16px 0 4px 0;font-family:inherit;}
.op-swatch{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:middle;}

.op-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px;}
@media(max-width:600px){.op-stats{grid-template-columns:1fr;}}

.op-reveal-frame{background:var(--white);border:none;box-shadow:var(--shadow-sm);border-radius:18px;padding:24px;text-align:center;margin-bottom:20px;}
.op-reveal-frame img{max-width:100%;border-radius:10px;display:block;margin:0 auto;}
.op-reveal-locked{
  padding:30px 20px;text-align:center;border:1px dashed var(--line);color:#8E8E93;font-size:13px;border-radius:18px;
  margin-bottom:20px;background:var(--white);
}
.op-reveal-upload{font-size:12px;color:var(--seal);cursor:pointer;text-decoration:none;font-weight:500;display:inline-block;margin-top:10px;}

.op-continue{display:block;width:100%;padding:15px;font-size:14px;font-weight:600;text-align:center;letter-spacing:.01em;border-radius:14px;}

/* ---- Subtle whole-app mood hint, tied to recent consistency ---- */
body.mood-good #sidebar{box-shadow:inset 3px 0 0 rgba(47,168,79,.55);}
body.mood-good .hero,body.mood-good .stamp{box-shadow:var(--shadow-sm),0 0 0 1px rgba(47,168,79,.12);}
body.mood-low #sidebar{box-shadow:inset 3px 0 0 rgba(255,105,97,.55);}
body.mood-low .hero,body.mood-low .stamp{box-shadow:var(--shadow-sm),0 0 0 1px rgba(255,105,97,.12);}
@media(max-width:900px){
  body.mood-good #mobile-topbar{box-shadow:inset 0 -3px 0 rgba(47,168,79,.55);}
  body.mood-low #mobile-topbar{box-shadow:inset 0 -3px 0 rgba(255,105,97,.55);}
}

/* ---- Opening screen: simple, reliable fade + settle transition ---- */
#opening-screen{transition:opacity .5s ease, transform .5s ease;}
#opening-screen.op-zoom{opacity:0;transform:scale(.97);pointer-events:none;}
.day-cell{transition:transform .12s ease, background-color .5s ease;}
.today-pulse{animation:todayPulse 1.4s ease;}
@keyframes todayPulse{
  0%{box-shadow:0 0 0 0 rgba(47,168,79,.55);}
  60%{box-shadow:0 0 0 16px rgba(47,168,79,0);}
  100%{box-shadow:0 0 0 0 rgba(47,168,79,0);}
}

/* ---- Daily Log: date navigation, missed-day nudge, prep quote ---- */
.dl-datenav{display:flex;gap:6px;margin-top:8px;}
.dl-datenav button{flex:1;background:var(--paper-2);border:none;border-radius:8px;padding:7px 6px;font-size:11.5px;color:var(--ink);font-weight:500;}
.dl-datenav button:disabled{opacity:.35;cursor:default;}
.dl-datenav button:not(:disabled):hover{background:var(--seal-dim);color:var(--seal);}

/* ================= MOBILE HARDENING =================
   Several fields elsewhere use fixed inline pixel widths sized for a
   desktop-width form (time pickers, activity rows, popups). On a narrow
   phone screen those add up and either overflow sideways or cram into an
   unreadable pile. This block reins them in at phone widths without
   touching the desktop layout. Uses !important only where an inline style
   needs overriding. */
@media(max-width:640px){
  html{font-size:15px;}
  #main{padding-left:14px;padding-right:14px;}
  .card,.hero,.op-grid-card{padding:16px;}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}

  /* Activity rows: name + notes take the full line each, the time/duration
     controls group together compactly on their own line below. */
  .activity-row{padding:10px;}
  .activity-row .a-name,
  .activity-row .a-notes{flex-basis:100%!important;min-width:0!important;}
  .activity-row .act-time-field{width:auto!important;flex:1 1 118px!important;min-width:100px;}
  .activity-row .a-minutes{width:52px!important;}

  /* Mundane/routine task time pickers: let them wrap to their own line and
     shrink instead of forcing a fixed 150-152px box that no longer fits. */
  .mundane-row .mr-times .tm-wrap,
  .mundane-edit-row .tm-wrap{width:auto!important;flex:1 1 118px!important;min-width:100px;}

  /* Any other inline-styled time/date field wrapper set for a desktop form
     width — shrink and let it wrap instead of overflowing. */
  .field[style*="max-width"]{max-width:100%!important;}
  .tm-wrap{min-width:0;}
  .tm-text{font-size:13px;padding-left:6px;padding-right:4px;}

  /* Calendar & time popups: never exceed the viewport, with a safety margin. */
  /* Calendar & time popups: on mobile these become a centered, fixed-position
     modal instead of trying to hover near the tapped field. Anchoring to the
     field breaks the moment the page scrolls (position:fixed doesn't track
     the field's new location), which is what made the calendar look "stuck"
     — centering sidesteps that entirely. */
  #cal-popup, #time-popup{
    top:50%!important; left:50%!important; right:auto!important; bottom:auto!important;
    transform:translate(-50%,-50%)!important;
    max-height:82vh; overflow-y:auto;
  }
  #cal-popup{width:min(296px, 92vw)!important;}
  #time-popup{width:min(236px, 88vw)!important;}

  /* Chip rows and button rows: allow wrapping, keep touch targets comfy. */
  .chip-row,.tb-tabs{row-gap:8px;}
  .chip{font-size:12px;padding:6px 12px;}

  /* Tables / wide bar-chart rows: let the label column shrink instead of a
     fixed 150px eating most of a 360px screen. */
  .bar-row .bar-label{width:auto!important;max-width:38vw;flex:1 1 auto;}

  /* Long headings / hero text: keep readable, no overflow-driven shrinking. */
  .hero h2,.hero h1{font-size:19px;line-height:1.3;}
  h3{overflow-wrap:anywhere;}
}
@media(max-width:380px){
  .activity-row .act-time-field{flex-basis:100%!important;}
  .tm-text{font-size:12.5px;}
}

<script>
/* ================= LOCAL STORAGE POLYFILL =================
   This app was originally built against Claude's Artifact window.storage
   API. Running standalone (e.g. hosted on GitHub Pages), that API doesn't
   exist, so every save silently failed. This shim reimplements the same
   shape using the browser's built-in localStorage, so all existing
   storeGet/storeSet calls below keep working unchanged and data now
   actually persists on this device between visits. */
if (!window.storage) {
  window.storage = {
    _mem: new Map(),
    _warned: false,
    _warn(e){
      if(this._warned) return;
      this._warned = true;
      console.error('Persistent storage unavailable, using in-memory fallback for this session:', e);
      setTimeout(()=>{
        if(typeof toast === 'function'){
          toast("This device is blocking or has run out of storage — today's changes will still work, but may not survive closing the app. Try freeing up space or check browser storage permissions.");
        }
      }, 300);
    },
    async get(key, shared){
      try{
        const raw = localStorage.getItem('kv:'+key);
        if (raw !== null) return { key, value: raw, shared: !!shared };
      }catch(e){ this._warn(e); }
      if (this._mem.has(key)) return { key, value: this._mem.get(key), shared: !!shared };
      return null;
    },
    async set(key, value, shared){
      try{
        localStorage.setItem('kv:'+key, value);
        this._mem.delete(key);
        return { key, value, shared: !!shared };
      }catch(e){
        this._warn(e);
        this._mem.set(key, value);
        return { key, value, shared: !!shared };
      }
    },
    async delete(key, shared){
      try{ localStorage.removeItem('kv:'+key); }catch(e){ this._warn(e); }
      this._mem.delete(key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const keys = new Set();
      try{
        for (let i = 0; i < localStorage.length; i++){
          const k = localStorage.key(i);
          if (k && k.indexOf('kv:') === 0){
            const actual = k.slice(3);
            if (!prefix || actual.indexOf(prefix) === 0) keys.add(actual);
          }
        }
      }catch(e){ this._warn(e); }
      for (const k of this._mem.keys()){
        if (!prefix || k.indexOf(prefix) === 0) keys.add(k);
      }
      return { keys: [...keys], prefix, shared: !!shared };
    }
  };
}
</script>
<script>
/* ================= STORAGE HELPERS ================= */
async function storeGet(key, fallback){
  try{
    const r = await window.storage.get(key, false);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){ return fallback; }
}
async function storeSet(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), false); return true; }
  catch(e){ console.error('storage set failed', key, e); return false; }
}
async function storeDelete(key){ try{ await window.storage.delete(key, false); }catch(e){} }
async function storeListKeys(prefix){
  try{ const r = await window.storage.list(prefix, false); return r ? r.keys : []; }
  catch(e){ return []; }
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ================= DATE HELPERS (all display in DD/MM/YYYY) ================= */
function todayStr(){ return new Date().toISOString().slice(0,10); } // internal storage stays ISO yyyy-mm-dd
function tomorrowStr(){ const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
function yesterdayStr(){ const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); }
function dmy(iso){
  if(!iso) return '';
  const parts = iso.split('-');
  if(parts.length!==3) return iso;
  const [y,m,d] = parts;
  return `${d}/${m}/${y}`;
}
function fmtDate(iso){ return dmy(iso); }
function isoFromDmy(str){
  if(!str) return '';
  const m = str.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  if(!m) return '';
  return `${m[3]}-${m[2]}-${m[1]}`;
}
function daysBetween(a,b){
  return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00'))/86400000);
}
function uid(){ return 'p'+Math.random().toString(36).slice(2,9); }
function clamp(n,lo,hi){ return Math.max(lo,Math.min(hi,n)); }

// Reusable DD/MM/YYYY input: text field (typed) + calendar-icon button (native picker)
function dateInputHTML(id, iso, style){
  return `<div class="dmy-wrap" style="${style||''}">
    <input type="text" class="dmy-text" id="${id}" placeholder="DD/MM/YYYY" maxlength="10" value="${dmy(iso)}" data-iso="${iso||''}">
    <button type="button" class="dmy-cal" data-target="${id}" title="Pick a date">&#128197;</button>
  </div>`;
}
function getDmyIso(id){
  const el = document.getElementById(id);
  if(!el) return '';
  return el.dataset.iso || isoFromDmy(el.value) || '';
}
// Self-contained calendar popup — pure DOM/JS, no native <input type=date>,
// no showPicker() (which sandboxed/embedded viewers commonly block silently),
// and no network dependency of any kind.
let calState = { targetId:null, viewYear:0, viewMonth:0 };
function ensureCalPopup(){
  let el = document.getElementById('cal-popup');
  if(el) return el;
  el = document.createElement('div');
  el.id = 'cal-popup';
  document.body.appendChild(el);
  return el;
}
function renderCalPopup(){
  const el = ensureCalPopup();
  const {viewYear, viewMonth} = calState;
  const txt = document.getElementById(calState.targetId);
  const selectedIso = txt ? (txt.dataset.iso || '') : '';
  const first = new Date(viewYear, viewMonth, 1);
  const startOffset = first.getDay(); // 0=Sun
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const daysInPrevMonth = new Date(viewYear, viewMonth, 0).getDate();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dows = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  const todayIso = todayStr();

  let cells = '';
  for(let i=0;i<startOffset;i++){
    const d = daysInPrevMonth - startOffset + 1 + i;
    cells += `<button type="button" class="cal-day muted" disabled>${d}</button>`;
  }
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    let cls = 'cal-day';
    if(iso===todayIso) cls += ' today';
    if(iso===selectedIso) cls += ' selected';
    cells += `<button type="button" class="${cls}" data-iso="${iso}">${d}</button>`;
  }
  const totalCells = startOffset + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for(let d=1; d<=trailing; d++){
    cells += `<button type="button" class="cal-day muted" disabled>${d}</button>`;
  }

  el.innerHTML = `
    <div class="cal-head">
      <button type="button" class="cal-nav" id="cal-prev-year" title="Previous year">&#171;</button>
      <button type="button" class="cal-nav" id="cal-prev" title="Previous month">&#8249;</button>
      <span class="cal-title">
        <select id="cal-month-select" title="Jump to month">${monthNames.map((m,i)=>`<option value="${i}" ${i===viewMonth?'selected':''}>${m}</option>`).join('')}</select>
        <select id="cal-year-select" title="Jump to year">${calYearOptions(viewYear)}</select>
      </span>
      <button type="button" class="cal-nav" id="cal-next" title="Next month">&#8250;</button>
      <button type="button" class="cal-nav" id="cal-next-year" title="Next year">&#187;</button>
    </div>
    <div class="cal-grid">${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
    <div class="cal-foot">
      <button type="button" id="cal-today">Today</button>
      <button type="button" id="cal-close">Close</button>
    </div>`;

  el.querySelector('#cal-prev').onclick = (e)=>{ e.stopPropagation(); calState.viewMonth--; if(calState.viewMonth<0){calState.viewMonth=11; calState.viewYear--;} renderCalPopup(); };
  el.querySelector('#cal-next').onclick = (e)=>{ e.stopPropagation(); calState.viewMonth++; if(calState.viewMonth>11){calState.viewMonth=0; calState.viewYear++;} renderCalPopup(); };
  el.querySelector('#cal-prev-year').onclick = (e)=>{ e.stopPropagation(); calState.viewYear--; renderCalPopup(); };
  el.querySelector('#cal-next-year').onclick = (e)=>{ e.stopPropagation(); calState.viewYear++; renderCalPopup(); };
  el.querySelector('#cal-month-select').onchange = (e)=>{ e.stopPropagation(); calState.viewMonth = Number(e.target.value); renderCalPopup(); };
  el.querySelector('#cal-year-select').onchange = (e)=>{ e.stopPropagation(); calState.viewYear = Number(e.target.value); renderCalPopup(); };
  el.querySelector('#cal-today').onclick = (e)=>{ e.stopPropagation(); pickCalDate(todayIso); };
  el.querySelector('#cal-close').onclick = (e)=>{ e.stopPropagation(); closeCalPopup(); };
  el.querySelectorAll('.cal-day[data-iso]').forEach(btn=>{
    btn.onclick = (e)=>{ e.stopPropagation(); pickCalDate(btn.dataset.iso); };
  });
}
// Year dropdown spans a decade back to a decade+ forward so distant target
// dates (e.g. a future exam date) are always reachable in one jump.
function calYearOptions(viewYear){
  const nowY = new Date().getFullYear();
  const lo = Math.min(nowY, viewYear) - 6;
  const hi = Math.max(nowY, viewYear) + 8;
  let opts = '';
  for(let y=lo; y<=hi; y++) opts += `<option value="${y}" ${y===viewYear?'selected':''}>${y}</option>`;
  return opts;
}
function pickCalDate(iso){
  const txt = document.getElementById(calState.targetId);
  if(txt){
    txt.value = dmy(iso); txt.dataset.iso = iso;
    txt.dispatchEvent(new Event('change',{bubbles:true}));
  }
  closeCalPopup();
}
function ensurePopupBackdrop(){
  let el = document.getElementById('popup-backdrop');
  if(el) return el;
  el = document.createElement('div');
  el.id = 'popup-backdrop';
  document.body.appendChild(el);
  el.addEventListener('click', ()=>{
    closeCalPopup();
    closeTimePopup();
  });
  return el;
}
function showPopupBackdrop(){
  ensurePopupBackdrop().classList.add('open');
  document.body.style.overflow = 'hidden';
}
function hidePopupBackdrop(){
  const cal = document.getElementById('cal-popup');
  const time = document.getElementById('time-popup');
  if((cal && cal.classList.contains('open')) || (time && time.classList.contains('open'))) return;
  const el = document.getElementById('popup-backdrop');
  if(el) el.classList.remove('open');
  document.body.style.overflow = '';
}
function openCalPopup(btn){
  const targetId = btn.dataset.target;
  const txt = document.getElementById(targetId);
  const baseIso = (txt && (txt.dataset.iso || isoFromDmy(txt.value))) || todayStr();
  const base = new Date(baseIso+'T00:00:00');
  calState = { targetId, viewYear: base.getFullYear(), viewMonth: base.getMonth() };
  renderCalPopup();
  const el = document.getElementById('cal-popup');
  el.classList.add('open');
  showPopupBackdrop();
  const r = btn.getBoundingClientRect();
  const popW = 296;
  let left = r.left;
  if(left + popW > window.innerWidth - 10) left = window.innerWidth - popW - 10;
  el.style.left = left+'px';
  el.style.top = (r.bottom+6)+'px';
}
function closeCalPopup(){
  const el = document.getElementById('cal-popup');
  if(el) el.classList.remove('open');
  calState.targetId = null;
  hidePopupBackdrop();
}
document.addEventListener('input', (e)=>{
  if(!e.target.classList || !e.target.classList.contains('dmy-text')) return;
  let v = e.target.value.replace(/[^\d]/g,'').slice(0,8);
  let out = v;
  if(v.length>4) out = v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);
  else if(v.length>2) out = v.slice(0,2)+'/'+v.slice(2);
  e.target.value = out;
  const m = out.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
  e.target.dataset.iso = m ? `${m[3]}-${m[2]}-${m[1]}` : '';
});
document.addEventListener('click', (e)=>{
  const btn = e.target.closest('.dmy-cal');
  if(btn){
    e.preventDefault();
    e.stopPropagation();
    const openPopup = document.getElementById('cal-popup');
    if(openPopup && openPopup.classList.contains('open') && calState.targetId===btn.dataset.target){
      closeCalPopup();
    } else {
      openCalPopup(btn);
    }
    return;
  }
  // click outside the popup closes it
  const popup = document.getElementById('cal-popup');
  if(popup && popup.classList.contains('open') && !e.target.closest('#cal-popup')){
    closeCalPopup();
  }
});
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape') closeCalPopup();
});
</script>
<script>
/* ================= TIME PICKER — a self-contained, working analog clock =================
   Used everywhere a time is entered (wake/sleep, workout, activities, mundane routine tasks).
   Storage stays 24h "HH:MM"; display is 12h with AM/PM, exactly like the DMY date field pattern above. */
function pad2(n){ return String(n).padStart(2,'0'); }
function to12(hour24){
  const ampm = hour24>=12 ? 'PM':'AM';
  let h = hour24%12; if(h===0) h=12;
  return {h, ampm};
}
function to24(h12, ampm){
  let h = h12%12;
  if(ampm==='PM') h += 12;
  return h;
}
function fmtTime12(hhmm){
  if(!hhmm) return '';
  const parts = hhmm.split(':');
  if(parts.length!==2) return '';
  const H = Number(parts[0]), M = Number(parts[1]);
  if(isNaN(H)||isNaN(M)) return '';
  const {h,ampm} = to12(H);
  return `${pad2(h)}:${pad2(M)} ${ampm}`;
}
// Reusable time input: text field (typed) + clock-icon button (analog picker)
function timeInputHTML(id, hhmm, style){
  return `<div class="tm-wrap" style="${style||''}">
    <input type="text" class="tm-text" id="${id}" placeholder="HH:MM AM/PM" maxlength="9" value="${fmtTime12(hhmm)}" data-time="${hhmm||''}">
    <button type="button" class="tm-clock" data-target="${id}" title="Pick a time">&#128336;</button>
  </div>`;
}
function getTimeValue(id){
  const el = document.getElementById(id);
  return el ? (el.dataset.time || '') : '';
}

let tpState = { targetId:null, hour24:6, minute:0, mode:'hour', dragging:false };

function ensureTimePopup(){
  let el = document.getElementById('time-popup');
  if(el) return el;
  el = document.createElement('div');
  el.id = 'time-popup';
  document.body.appendChild(el);
  return el;
}
function renderTimePopup(){
  const el = ensureTimePopup();
  const {h, ampm} = to12(tpState.hour24);
  const cx=110, cy=110, R=82;
  let numbersSvg = '';
  let handAngle;
  if(tpState.mode==='hour'){
    for(let i=1;i<=12;i++){
      const idx = i%12;
      const angle = (idx/12)*Math.PI*2 - Math.PI/2;
      const x = cx+R*Math.cos(angle), y = cy+R*Math.sin(angle);
      const sel = i===h;
      numbersSvg += `<text class="tp-num ${sel?'selected':''}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" data-value="${i}">${i}</text>`;
    }
    const idx = h%12;
    handAngle = (idx/12)*Math.PI*2 - Math.PI/2;
  } else {
    for(let i=0;i<12;i++){
      const m = i*5;
      const angle = (i/12)*Math.PI*2 - Math.PI/2;
      const x = cx+R*Math.cos(angle), y = cy+R*Math.sin(angle);
      const sel = (m===tpState.minute) || (m===0 && tpState.minute===0);
      numbersSvg += `<text class="tp-num ${sel?'selected':''}" x="${x.toFixed(1)}" y="${y.toFixed(1)}" data-value="${m}">${pad2(m)}</text>`;
    }
    handAngle = (tpState.minute/60)*Math.PI*2 - Math.PI/2;
  }
  const hx = cx+R*Math.cos(handAngle), hy = cy+R*Math.sin(handAngle);

  el.innerHTML = `
    <div class="tp-display">
      <span class="tp-h ${tpState.mode==='hour'?'active':''}" data-mode="hour">${pad2(h)}</span><span>:</span><span class="tp-m ${tpState.mode==='minute'?'active':''}" data-mode="minute">${pad2(tpState.minute)}</span>
      <span class="tp-ampm">
        <button type="button" class="tp-ampm-btn ${ampm==='AM'?'active':''}" data-ap="AM">AM</button>
        <button type="button" class="tp-ampm-btn ${ampm==='PM'?'active':''}" data-ap="PM">PM</button>
      </span>
    </div>
    <div class="tp-face-wrap">
      <svg class="tp-face" viewBox="0 0 220 220" width="200" height="200" id="tp-svg">
        <circle cx="110" cy="110" r="104" class="tp-face-bg"/>
        <line class="tp-hand" x1="110" y1="110" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}"/>
        <circle class="tp-hand-knob" cx="${hx.toFixed(1)}" cy="${hy.toFixed(1)}" r="14"/>
        <circle cx="110" cy="110" r="4" class="tp-center"/>
        ${numbersSvg}
      </svg>
    </div>
    <div class="tp-foot">
      <button type="button" id="tp-now">Now</button>
      <div>
        <button type="button" id="tp-cancel">Cancel</button>
        <button type="button" id="tp-ok">OK</button>
      </div>
    </div>`;

  el.querySelector('.tp-h').onclick = (e)=>{ e.stopPropagation(); tpState.mode='hour'; renderTimePopup(); };
  el.querySelector('.tp-m').onclick = (e)=>{ e.stopPropagation(); tpState.mode='minute'; renderTimePopup(); };
  el.querySelectorAll('.tp-ampm-btn').forEach(btn=>{
    btn.onclick = (e)=>{
      e.stopPropagation();
      const cur = to12(tpState.hour24);
      tpState.hour24 = to24(cur.h, btn.dataset.ap);
      renderTimePopup();
    };
  });
  el.querySelector('#tp-now').onclick = (e)=>{
    e.stopPropagation();
    const now = new Date();
    tpState.hour24 = now.getHours(); tpState.minute = now.getMinutes(); tpState.mode='hour';
    renderTimePopup();
  };
  el.querySelector('#tp-cancel').onclick = (e)=>{ e.stopPropagation(); closeTimePopup(); };
  el.querySelector('#tp-ok').onclick = (e)=>{ e.stopPropagation(); applyTimePopup(); };
  el.querySelectorAll('.tp-num').forEach(t=>{
    t.addEventListener('click', (e)=>{
      e.stopPropagation();
      const v = Number(t.dataset.value);
      if(tpState.mode==='hour'){
        tpState.hour24 = to24(v, to12(tpState.hour24).ampm);
        tpState.mode='minute';
      } else {
        tpState.minute = v;
      }
      renderTimePopup();
    });
  });
}
// Dragging support — bound once at document level (not re-bound on every render,
// so the clock hand tracks the pointer smoothly like a real working clock).
function tpPointFromEvent(svg, evt){
  const rect = svg.getBoundingClientRect();
  const cx0 = (evt.touches && evt.touches.length) ? evt.touches[0].clientX : evt.clientX;
  const cy0 = (evt.touches && evt.touches.length) ? evt.touches[0].clientY : evt.clientY;
  return { x: (cx0-rect.left)/rect.width*220, y: (cy0-rect.top)/rect.height*220 };
}
function tpApplyPoint(p){
  const angle = Math.atan2(p.y-110, p.x-110);
  let deg = (angle*180/Math.PI + 90 + 360) % 360;
  if(tpState.mode==='hour'){
    let idx = Math.round(deg/30) % 12;
    const val = idx===0?12:idx;
    tpState.hour24 = to24(val, to12(tpState.hour24).ampm);
  } else {
    let m = Math.round(deg/6) % 60;
    tpState.minute = (m===60?0:m);
  }
  renderTimePopup();
}
function tpEndDrag(){
  const wasHourDrag = tpState.dragging && tpState.mode==='hour';
  tpState.dragging = false;
  if(wasHourDrag){ tpState.mode='minute'; renderTimePopup(); }
}
document.addEventListener('mousedown', (e)=>{
  const svg = e.target.closest('#tp-svg'); if(!svg) return;
  tpState.dragging = true; tpApplyPoint(tpPointFromEvent(svg, e));
});
document.addEventListener('touchstart', (e)=>{
  const svg = e.target.closest('#tp-svg'); if(!svg) return;
  tpState.dragging = true; tpApplyPoint(tpPointFromEvent(svg, e)); e.preventDefault();
}, {passive:false});
document.addEventListener('mousemove', (e)=>{
  if(!tpState.dragging) return;
  const svg = document.getElementById('tp-svg'); if(!svg) return;
  tpApplyPoint(tpPointFromEvent(svg, e));
});
document.addEventListener('touchmove', (e)=>{
  if(!tpState.dragging) return;
  const svg = document.getElementById('tp-svg'); if(!svg) return;
  tpApplyPoint(tpPointFromEvent(svg, e)); e.preventDefault();
}, {passive:false});
document.addEventListener('mouseup', tpEndDrag);
document.addEventListener('touchend', tpEndDrag);

function openTimePopup(btn){
  const targetId = btn.dataset.target;
  const txt = document.getElementById(targetId);
  const cur = (txt && txt.dataset.time) || '';
  let hour24=6, minute=0;
  if(cur){ const p=cur.split(':'); hour24=Number(p[0])||0; minute=Number(p[1])||0; }
  tpState = { targetId, hour24, minute, mode:'hour', dragging:false };
  renderTimePopup();
  const el = document.getElementById('time-popup');
  el.classList.add('open');
  showPopupBackdrop();
  const r = btn.getBoundingClientRect();
  const popW = 236;
  let left = r.left;
  if(left + popW > window.innerWidth - 10) left = window.innerWidth - popW - 10;
  let top = r.bottom + 6;
  if(top + 360 > window.innerHeight) top = Math.max(10, r.top - 366);
  el.style.left = left+'px';
  el.style.top = top+'px';
}
function closeTimePopup(){
  const el = document.getElementById('time-popup');
  if(el) el.classList.remove('open');
  tpState.targetId = null;
  hidePopupBackdrop();
}
function applyTimePopup(){
  const txt = document.getElementById(tpState.targetId);
  if(txt){
    const hhmm = `${pad2(tpState.hour24)}:${pad2(tpState.minute)}`;
    txt.value = fmtTime12(hhmm);
    txt.dataset.time = hhmm;
    txt.dispatchEvent(new Event('change',{bubbles:true}));
    txt.dispatchEvent(new Event('input',{bubbles:true}));
  }
  closeTimePopup();
}
document.addEventListener('click', (e)=>{
  const btn = e.target.closest('.tm-clock');
  if(btn){
    e.preventDefault(); e.stopPropagation();
    const openPopup = document.getElementById('time-popup');
    if(openPopup && openPopup.classList.contains('open') && tpState.targetId===btn.dataset.target){
      closeTimePopup();
    } else {
      openTimePopup(btn);
    }
    return;
  }
  const popup = document.getElementById('time-popup');
  if(popup && popup.classList.contains('open') && !e.target.closest('#time-popup')){
    closeTimePopup();
  }
});
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape') closeTimePopup();
});
// Light mask for typed input, so a time can also be typed by hand (e.g. "0730AM")
// without opening the clock face — the clock remains the reliable primary method.
document.addEventListener('input', (e)=>{
  if(!e.target.classList || !e.target.classList.contains('tm-text')) return;
  const el = e.target;
  const raw = el.value.toUpperCase();
  const digits = raw.replace(/[^0-9]/g,'').slice(0,4);
  const letters = raw.replace(/[0-9:.\s]/g,'');
  const ampm = letters.indexOf('P')>=0 ? 'PM' : (letters.indexOf('A')>=0 ? 'AM' : '');
  let out = digits;
  if(digits.length>2) out = digits.slice(0,2)+':'+digits.slice(2);
  if(ampm) out += ' '+ampm;
  el.value = out;
  if(digits.length===4 && ampm){
    const hh = parseInt(digits.slice(0,2),10), mm = parseInt(digits.slice(2,4),10);
    el.dataset.time = (hh>=1 && hh<=12 && mm<=59) ? `${pad2(to24(hh,ampm))}:${pad2(mm)}` : '';
  } else {
    el.dataset.time = '';
  }
});

/* ---- Live analog clock in the sidebar — a real, ticking, working clock ---- */
function initLiveClock(){
  const ticksG = document.getElementById('lc-ticks');
  if(ticksG){
    let ticks='';
    for(let i=0;i<12;i++){
      const angle = i/12*Math.PI*2;
      const x1=50+41*Math.sin(angle), y1=50-41*Math.cos(angle);
      const x2=50+46*Math.sin(angle), y2=50-46*Math.cos(angle);
      ticks += `<line class="lc-tick" x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
    }
    ticksG.innerHTML = ticks;
  }
  function tick(){
    const now = new Date();
    const h = now.getHours()%12, m = now.getMinutes(), s = now.getSeconds();
    const hourDeg = (h + m/60)/12*360;
    const minDeg = (m + s/60)/60*360;
    const secDeg = s/60*360;
    const hourEl=document.getElementById('lc-hour'), minEl=document.getElementById('lc-min'), secEl=document.getElementById('lc-sec');
    if(hourEl) hourEl.setAttribute('transform', `rotate(${hourDeg} 50 50)`);
    if(minEl) minEl.setAttribute('transform', `rotate(${minDeg} 50 50)`);
    if(secEl) secEl.setAttribute('transform', `rotate(${secDeg} 50 50)`);
    const digital = document.getElementById('lc-digital');
    if(digital){
      let hh = now.getHours(); const ap = hh>=12?'PM':'AM'; hh = hh%12; if(hh===0) hh=12;
      digital.textContent = `${pad2(hh)}:${pad2(m)}:${pad2(s)} ${ap}`;
    }
  }
  tick();
  setInterval(tick, 1000);
}
</script>

        { id:'ap-m5-env-1', name:'Development vs Environment', subs:[
          T('Depletion of natural resources; conservation policy; environmental pollution & degradation','high'),
          T('Sustainable development — possibilities & challenges; climate change & climate justice','high'),
          T('Environment Impact Assessment; natural disasters — cyclones, earthquakes, landslides, tsunamis','high'),
          T('Natural resources — forest, fishery, fossil fuels, minerals, water & land resources','medium')]},
        { id:'ap-m5-env-2', name:'Pollution, Waste Management & Legislation', subs:[
          T('Air, water, soil & noise pollution — sources, impacts, control','high'),
          T('Solid waste management — types, impacts, recycling & reuse','medium'),
          T('Global issues — ozone depletion, acid rain, global warming','medium'),
          T('Environmental legislation — Montreal & Kyoto Protocols, UNFCCC, CITES; Indian Acts; SDGs; National Disaster Management Policy 2016','high')]}
      ]},
      { id:'ap-m5-biotech-health', name:'Biotechnology, Health & IPR', topics:[
        { id:'ap-m5-biotech', name:'Biotechnology, Nanotechnology & Genetic Engineering', subs:[
          T('Nature, scope & applications; ethical, social & legal concerns; government policies','high'),
          T('Genetic engineering — issues & impact on human life; tissue culture; GM crops; bio-pesticides/fertilizers/fuels','high')]},
        { id:'ap-m5-health', name:'Human Diseases & Vaccines', subs:[
          T('Bacterial, viral, protozoal & fungal infections — diarrhoea, TB, malaria, HIV, chikungunya, bird flu','high'),
          T('Vaccination — fundamental concepts & production of modern vaccines','medium')]},
        { id:'ap-m5-ipr', name:'Intellectual Property Rights', subs:[
          T('IPR issues in Science & Technology; promotion of science in AP and India','medium')]}
      ]}
    ]
  }

];

/* Flatten to leaves for progress tracking: each leaf = one subtopic */
function flattenLeaves(){
  const out = [];
  SYLLABUS.forEach(paper=>{
    paper.sections.forEach(sec=>{
      sec.topics.forEach(top=>{
        top.subs.forEach((sub,i)=>{
          out.push({
            id: `${paper.id}__${sec.id}__${top.id}__${i}`,
            paperId: paper.id, paperTitle: paper.title, exam: paper.exam,
            sectionId: sec.id, sectionName: sec.name,
            topicId: top.id, topicName: top.name,
            name: sub.name, importance: sub.importance, pyq: sub.pyq
          });
        });
      });
    });
  });
  return out;
}
const ALL_LEAVES = flattenLeaves();
</script>

<script>
/* ================= APP STATE & ROUTING ================= */
const STATE = {
  settings: null,
  plans: [],
  syllabusProgress: {}, // leafId -> {done, doneDate}
};
const RENDERERS = {};
let syllabusNav = { exam:'prelims', paperId:null, sectionId:null, topicId:null };

async function goPage(name, opts){
  opts = opts || {};
  document.querySelectorAll('.navlist button').forEach(b=>b.classList.toggle('active', b.dataset.page===name));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active', p.id==='page-'+name));
  if(RENDERERS[name]) await RENDERERS[name]();
  if(!opts.fromPopstate){
    const state = { sgPage: name };
    if(opts.replace) history.replaceState(state, '', '#'+name);
    else history.pushState(state, '', '#'+name);
  }
}
// Android's hardware/gesture back button closes the whole app if the page
// never adds any browser history — there's nothing for it to "go back" to.
// This makes in-app page navigation add real history entries, so back
// steps back through your recent pages first, only exiting once you're
// back at the page you started on (the normal, expected behavior).
window.addEventListener('popstate', (e)=>{
  const name = (e.state && e.state.sgPage) || 'dashboard';
  goPage(name, { fromPopstate: true });
});
document.getElementById('navlist').addEventListener('click', async (e)=>{
  const btn = e.target.closest('button[data-page]');
  if(!btn) return;
  await goPage(btn.dataset.page);
});

function currentPhase(){
  const s = STATE.settings;
  const t = todayStr();
  if(t >= s.revisionStart && t < s.targetEnd) return {phase:'REVISION', sub:'Test Series & Revision'};
  if(t >= s.targetEnd) return {phase:'EXAM WINDOW', sub:'Target period reached'};
  return {phase:'FOUNDATION', sub:'First-pass Coverage'};
}
async function loadSyllabusProgress(){
  STATE.syllabusProgress = await storeGet('syllabusProgress', {});
}
async function saveSyllabusProgress(){
  await storeSet('syllabusProgress', STATE.syllabusProgress);
}
async function toggleLeafDone(leafId){
  const cur = STATE.syllabusProgress[leafId] || {done:false};
  cur.done = !cur.done;
  cur.doneDate = cur.done ? todayStr() : null;
  if(cur.done) cur.progress = 10; // quick full-tick also fills the coverage bar
  STATE.syllabusProgress[leafId] = cur;
  await saveSyllabusProgress();
}
function leafDone(leafId){ return !!(STATE.syllabusProgress[leafId] && STATE.syllabusProgress[leafId].done); }
async function setLeavesDone(leafIds, done){
  const d = todayStr();
  leafIds.forEach(id=>{
    const cur = STATE.syllabusProgress[id] || {done:false};
    cur.done = done;
    cur.doneDate = done ? d : null;
    cur.progress = done ? 10 : 0; // bulk actions are an explicit full reset either way
    STATE.syllabusProgress[id] = cur;
  });
  await saveSyllabusProgress();
}
function pctOf(list){ // list of leaf ids
  if(!list.length) return 0;
  const done = list.filter(leafDone).length;
  return Math.round(done/list.length*100);
}

/* ---- Coverage tracker (separate from the done checkbox) ----
   Lets a single sub-topic be filled in gradually, 10% (one bar) at a time,
   across as many sittings as it takes — e.g. cover 30% today, come back
   later and top it up to 60%, and so on. Reaching 10/10 auto-ticks "done". */
async function setLeafProgress(leafId, segments){
  segments = Math.max(0, Math.min(10, Math.round(segments)));
  const cur = STATE.syllabusProgress[leafId] || {done:false};
  cur.progress = segments;
  if(segments>=10 && !cur.done){
    cur.done = true;
    cur.doneDate = todayStr();
  }
  STATE.syllabusProgress[leafId] = cur;
  await saveSyllabusProgress();
}
function leafProgress(leafId){ // 0-10 (each unit = 10%)
  const p = STATE.syllabusProgress[leafId];
  if(!p) return 0;
  if(typeof p.progress === 'number') return p.progress;
  return p.done ? 10 : 0; // older saved entries only had the done flag — treat as fully covered
}

/* ---- Revision tracking (separate from first-pass "done") ----
   A real up/down counter: "+" logs another revision pass, "−" walks an
   accidental extra click back down. Nothing here can only ever increase. */
async function incLeafRevision(leafId){
  const cur = STATE.syllabusProgress[leafId] || {done:false};
  if(!cur.done) return;
  cur.revisionCount = (cur.revisionCount||0) + 1;
  cur.revised = true;
  cur.lastRevised = todayStr();
  STATE.syllabusProgress[leafId] = cur;
  await saveSyllabusProgress();
}
async function decLeafRevision(leafId){
  const cur = STATE.syllabusProgress[leafId];
  if(!cur || !cur.revisionCount) return;
  cur.revisionCount = Math.max(0, cur.revisionCount - 1);
  cur.revised = cur.revisionCount > 0;
  if(cur.revisionCount===0) cur.lastRevised = null;
  STATE.syllabusProgress[leafId] = cur;
  await saveSyllabusProgress();
}
function leafRevisionCount(leafId){ return (STATE.syllabusProgress[leafId] && STATE.syllabusProgress[leafId].revisionCount) || 0; }
function leafRevised(leafId){ return leafRevisionCount(leafId) > 0; }
function revisedPctOf(list){ // % of DONE leaves in the list that have also been revised at least once
  const doneList = list.filter(leafDone);
  if(!doneList.length) return 0;
  const rev = doneList.filter(leafRevised).length;
  return Math.round(rev/doneList.length*100);
}
</script>

<script>
/* ================= SYLLABUS PAGE — tile grid drill-down ================= */
const EXAM_LABELS = {
  prelims:'UPSC Prelims', mains:'UPSC Mains (GS + Essay)', optional:'UPSC Optional — Anthropology',
  'appsc-pre':'APPSC Gr-I Prelims', 'appsc-mains':'APPSC Gr-I Mains'
};

function leavesForPaper(paperId){ return ALL_LEAVES.filter(l=>l.paperId===paperId); }
function leavesForSection(paperId, sectionId){ return ALL_LEAVES.filter(l=>l.paperId===paperId && l.sectionId===sectionId); }
function leavesForTopic(paperId, sectionId, topicId){ return ALL_LEAVES.filter(l=>l.paperId===paperId && l.sectionId===sectionId && l.topicId===topicId); }
function leavesForExam(exam){ return ALL_LEAVES.filter(l=>l.exam===exam); }

function tileHTML({eyebrow, title, pct, meta, dataAttrs, extraClass}){
  const done = pct>=100;
  return `<button class="tile ${extraClass||''} ${done?'complete':''}" ${dataAttrs}>
    <div class="tile-eyebrow">${eyebrow}</div>
    <h4>${title}</h4>
    <div class="tile-meta">
      <span>${meta}</span>
      <span class="ring" style="--pct:${pct}" data-pct="${pct}"></span>
    </div>
  </button>`;
}

function syllabusCrumb(){
  const crumbs = [];
  crumbs.push({label:'Syllabus', action:()=>{ syllabusNav={exam:syllabusNav.exam,paperId:null,sectionId:null,topicId:null}; }});
  crumbs.push({label:EXAM_LABELS[syllabusNav.exam], action:()=>{ syllabusNav.paperId=null; syllabusNav.sectionId=null; syllabusNav.topicId=null; }});
  if(syllabusNav.paperId){
    const p = SYLLABUS.find(x=>x.id===syllabusNav.paperId);
    crumbs.push({label:p.title, action:()=>{ syllabusNav.sectionId=null; syllabusNav.topicId=null; }});
  }
  if(syllabusNav.sectionId){
    const p = SYLLABUS.find(x=>x.id===syllabusNav.paperId);
    const sec = p.sections.find(x=>x.id===syllabusNav.sectionId);
    crumbs.push({label:sec.name, action:()=>{ syllabusNav.topicId=null; }});
  }
  if(syllabusNav.topicId){
    const p = SYLLABUS.find(x=>x.id===syllabusNav.paperId);
    const sec = p.sections.find(x=>x.id===syllabusNav.sectionId);
    const top = sec.topics.find(x=>x.id===syllabusNav.topicId);
    crumbs.push({label:top.name, action:null});
  }
  let html = '<div class="crumb">';
  crumbs.forEach((c,i)=>{
    if(i>0) html += `<span class="sep">/</span>`;
    if(i===crumbs.length-1) html += `<span class="current">${c.label}</span>`;
    else html += `<button data-crumb="${i}">${c.label}</button>`;
  });
  html += '</div>';
  return {html, crumbs};
}

function renderSyllabusPage(){
  const el = document.getElementById('page-syllabus');
  const overallPct = pctOf(ALL_LEAVES.map(l=>l.id));
  el.innerHTML = `
    <div class="pagehead">
      <div class="eyebrow">02 · Reference</div>
      <h2>UPSC Syllabus</h2>
      <p>Drill from exam stage → paper → subject → broad topic → precise sub-topic. Tick sub-topics as you cover them; progress rolls up automatically. Overall: <strong>${overallPct}%</strong> across ${ALL_LEAVES.length} tracked items.</p>
    </div>
    <div class="card" style="position:relative;margin-bottom:16px;">
      <label style="display:block;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#8E8E93;margin-bottom:6px;">Search the whole syllabus</label>
      <input type="text" id="syl-search" placeholder="e.g. Panchayati Raj, Mughal, El Nino, Whistleblower Act…" autocomplete="off">
      <div id="syl-search-results"></div>
    </div>
    <div id="syl-body"></div>
  `;
  const searchInput = document.getElementById('syl-search');
  searchInput.oninput = ()=>{ renderSylSearchResults(searchInput.value.trim()); };
  document.addEventListener('click', (e)=>{
    if(!e.target.closest('#syl-search') && !e.target.closest('#syl-search-results')){
      const r = document.getElementById('syl-search-results');
      if(r) r.innerHTML = '';
    }
  });
  renderSyllabusBody();
}

function renderSylSearchResults(q){
  const box = document.getElementById('syl-search-results');
  if(!box) return;
  if(q.length < 2){ box.innerHTML=''; return; }
  const ql = q.toLowerCase();
  const matches = ALL_LEAVES.filter(l=> l.name.toLowerCase().includes(ql)).slice(0,30);
  if(!matches.length){ box.innerHTML = `<div class="search-item empty-hit">No matches for "${q}"</div>`; return; }
  box.innerHTML = matches.map(l=>{
    const p = SYLLABUS.find(x=>x.id===l.paperId);
    const sec = p.sections.find(x=>x.id===l.sectionId);
