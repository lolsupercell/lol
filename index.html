    const top = sec.topics.find(x=>x.id===l.topicId);
    return `<button class="search-item" data-paper="${l.paperId}" data-section="${l.sectionId}" data-topic="${l.topicId}">
      <div class="si-name">${l.name}</div>
      <div class="si-path">${p.title} → ${sec.name} → ${top.name}</div>
    </button>`;
  }).join('');
  box.querySelectorAll('.search-item[data-paper]').forEach(btn=>{
    btn.onclick = ()=>{
      syllabusNav = { exam: SYLLABUS.find(x=>x.id===btn.dataset.paper).exam, paperId: btn.dataset.paper, sectionId: btn.dataset.section, topicId: btn.dataset.topic, returnTo: syllabusNav.returnTo||null };
      document.getElementById('syl-search').value = '';
      box.innerHTML = '';
      renderSyllabusBody();
    };
  });
}

// Pops one level of syllabus drill-down. If already at top and we arrived via a
// deep-link (e.g. from a Planner block), returns to that page instead.
function syllabusGoBack(){
  if(syllabusNav.topicId){ syllabusNav.topicId=null; renderSyllabusBody(); return; }
  if(syllabusNav.sectionId){ syllabusNav.sectionId=null; renderSyllabusBody(); return; }
  if(syllabusNav.paperId){ syllabusNav.paperId=null; renderSyllabusBody(); return; }
  if(syllabusNav.returnTo){
    const dest = syllabusNav.returnTo;
    syllabusNav.returnTo = null;
    goPage(dest);
    return;
  }
  renderSyllabusBody();
}

function renderSyllabusBody(){
  const wrap = document.getElementById('syl-body');
  const {html:crumbHtml} = syllabusCrumb();

  let bodyHtml = '';

  if(!syllabusNav.paperId){
    // Level 1: exam stage tabs + paper tiles for that stage
    const tabsHtml = Object.keys(EXAM_LABELS).map(ex=>{
      const pct = pctOf(leavesForExam(ex).map(l=>l.id));
      return `<button class="chip ${syllabusNav.exam===ex?'active':''}" data-exam="${ex}">${EXAM_LABELS[ex]} · ${pct}%</button>`;
    }).join('');
    const papers = SYLLABUS.filter(p=>p.exam===syllabusNav.exam);
    const tilesHtml = papers.map(p=>{
      const leaves = leavesForPaper(p.id);
      const pct = pctOf(leaves.map(l=>l.id));
      return tileHTML({eyebrow:p.weightage, title:p.title, pct, meta:p.subtitle.length>46?p.subtitle.slice(0,44)+'…':p.subtitle, dataAttrs:`data-paper="${p.id}"`});
    }).join('');
    bodyHtml = `<div class="chip-row" id="syl-exam-tabs" style="margin-bottom:16px;">${tabsHtml}</div>
      <div class="tile-grid">${tilesHtml}</div>`;
  }
  else if(!syllabusNav.sectionId){
    // Level 2: section tiles within paper
    const p = SYLLABUS.find(x=>x.id===syllabusNav.paperId);
    const tilesHtml = p.sections.map(sec=>{
      const leaves = leavesForSection(p.id, sec.id);
      const pct = pctOf(leaves.map(l=>l.id));
      return tileHTML({eyebrow:`${sec.topics.length} topic${sec.topics.length>1?'s':''}`, title:sec.name, pct, meta:`${leaves.length} sub-items`, dataAttrs:`data-section="${sec.id}"`});
    }).join('');
    bodyHtml = `<div class="card" style="margin-bottom:16px;"><strong>${p.title}</strong> — ${p.subtitle} <span class="small-muted">(${p.weightage})</span></div>
      <div class="tile-grid">${tilesHtml}</div>`;
  }
  else if(!syllabusNav.topicId){
    // Level 3: topic tiles within section
    const p = SYLLABUS.find(x=>x.id===syllabusNav.paperId);
    const sec = p.sections.find(x=>x.id===syllabusNav.sectionId);
    const tilesHtml = sec.topics.map(top=>{
      const leaves = leavesForTopic(p.id, sec.id, top.id);
      const pct = pctOf(leaves.map(l=>l.id));
      const impCounts = {high:0,medium:0,low:0};
      leaves.forEach(l=>impCounts[l.importance]++);
      return tileHTML({eyebrow:`${leaves.length} sub-topics`, title:top.name, pct, meta:`${impCounts.high} high-wt`, dataAttrs:`data-topic="${top.id}"`});
    }).join('');
    bodyHtml = `<div class="tile-grid">${tilesHtml}</div>`;
  }
  else {
    // Level 4: leaf checklist
    const p = SYLLABUS.find(x=>x.id===syllabusNav.paperId);
    const sec = p.sections.find(x=>x.id===syllabusNav.sectionId);
    const top = sec.topics.find(x=>x.id===syllabusNav.topicId);
    const leaves = leavesForTopic(p.id, sec.id, top.id);
    const doneCount = leaves.filter(l=>leafDone(l.id)).length;
    bodyHtml = `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;flex-wrap:wrap;">
        <h3 style="margin-bottom:0;">${top.name}</h3>
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="small-muted mono">${doneCount}/${leaves.length} done</span>
          <button class="btn secondary small" id="syl-mark-all">Mark all done</button>
          <button class="btn secondary small" id="syl-clear-all">Clear all</button>
        </div>
      </div>
      <div id="syl-leaf-list">${leaves.map(leafRowHtml).join('')}</div>
    </div>`;
  }

  const showBack = !!(syllabusNav.paperId || syllabusNav.returnTo);
  const backLabel = (!syllabusNav.paperId && syllabusNav.returnTo) ? `← Back to ${syllabusNav.returnTo==='planner'?'Planner':'Dashboard'}` : '← Back';
  const backHtml = showBack ? `<button class="btn secondary small" id="syl-back" style="margin-bottom:10px;">${backLabel}</button>` : '';

  wrap.innerHTML = backHtml + crumbHtml + bodyHtml;

  const backBtn = document.getElementById('syl-back');
  if(backBtn) backBtn.onclick = syllabusGoBack;

  // wire crumb
  wrap.querySelectorAll('.crumb button[data-crumb]').forEach(b=>{
    b.onclick = ()=>{
      const {crumbs} = syllabusCrumb();
      crumbs[Number(b.dataset.crumb)].action();
      renderSyllabusBody();
    };
  });
  const tabs = document.getElementById('syl-exam-tabs');
  if(tabs) tabs.querySelectorAll('button[data-exam]').forEach(b=>{
    b.onclick = ()=>{ syllabusNav.exam = b.dataset.exam; renderSyllabusBody(); };
  });
  wrap.querySelectorAll('.tile[data-paper]').forEach(b=>{ b.onclick = ()=>{ syllabusNav.paperId=b.dataset.paper; renderSyllabusBody(); }; });
  wrap.querySelectorAll('.tile[data-section]').forEach(b=>{ b.onclick = ()=>{ syllabusNav.sectionId=b.dataset.section; renderSyllabusBody(); }; });
  wrap.querySelectorAll('.tile[data-topic]').forEach(b=>{ b.onclick = ()=>{ syllabusNav.topicId=b.dataset.topic; renderSyllabusBody(); }; });

  const leafList = document.getElementById('syl-leaf-list');
  if(leafList){
    leafList.querySelectorAll('input[type=checkbox][data-leaf]').forEach(cb=>{
      cb.onchange = async ()=>{
        await toggleLeafDone(cb.dataset.leaf);
        // Navigation position lives in syllabusNav (not in DOM state like <details open>),
        // so re-rendering the whole body keeps us on the same tile/checklist — nothing collapses.
        renderSyllabusBody();
        toast(leafDone(cb.dataset.leaf) ? 'Marked complete' : 'Marked incomplete');
      };
    });
    leafList.querySelectorAll('.revise-inc[data-leaf]').forEach(btn=>{
      btn.onclick = async ()=>{
        if(btn.disabled) return;
        await incLeafRevision(btn.dataset.leaf);
        renderSyllabusBody();
        toast('Revision logged (×'+leafRevisionCount(btn.dataset.leaf)+')');
      };
    });
    leafList.querySelectorAll('.revise-dec[data-leaf]').forEach(btn=>{
      btn.onclick = async ()=>{
        if(btn.disabled) return;
        await decLeafRevision(btn.dataset.leaf);
        renderSyllabusBody();
        const n = leafRevisionCount(btn.dataset.leaf);
        toast(n>0 ? 'Revision count reduced to ×'+n : 'Revision count cleared');
      };
    });
    leafList.querySelectorAll('.seg10[data-leaf]').forEach(track=>{
      track.querySelectorAll('.seg[data-seg]').forEach(seg=>{
        seg.onclick = async ()=>{
          const leafId = track.dataset.leaf;
          const clicked = Number(seg.dataset.seg);
          const cur = leafProgress(leafId);
          // Clicking the bar that's already the current top level steps back
          // down by one (an easy, obvious way to correct an over-click);
          // clicking any other bar jumps straight to that level.
          const next = (clicked===cur) ? clicked-1 : clicked;
          await setLeafProgress(leafId, next);
          renderSyllabusBody();
          const pct = leafProgress(leafId)*10;
          toast(pct>=100 ? 'Fully covered — marked done' : (pct===0?'Progress reset':'Progress set to '+pct+'%'));
        };
      });
    });
    leafList.querySelectorAll('.seg-reset[data-leaf]').forEach(btn=>{
      btn.onclick = async ()=>{
        await setLeafProgress(btn.dataset.leaf, 0);
        renderSyllabusBody();
        toast('Progress reset');
      };
    });
  }
  const markAllBtn = document.getElementById('syl-mark-all');
  if(markAllBtn) markAllBtn.onclick = async ()=>{
    const p = SYLLABUS.find(x=>x.id===syllabusNav.paperId);
    const sec = p.sections.find(x=>x.id===syllabusNav.sectionId);
    const leaves = leavesForTopic(p.id, sec.id, syllabusNav.topicId);
    await setLeavesDone(leaves.map(l=>l.id), true);
    renderSyllabusBody();
    toast('All sub-topics marked complete');
  };
  const clearAllBtn = document.getElementById('syl-clear-all');
  if(clearAllBtn) clearAllBtn.onclick = async ()=>{
    if(!confirm('Clear done status and coverage for every sub-topic in this list?')) return;
    const p = SYLLABUS.find(x=>x.id===syllabusNav.paperId);
    const sec = p.sections.find(x=>x.id===syllabusNav.sectionId);
    const leaves = leavesForTopic(p.id, sec.id, syllabusNav.topicId);
    await setLeavesDone(leaves.map(l=>l.id), false);
    renderSyllabusBody();
    toast('Cleared');
  };
}

function leafRowHtml(leaf){
  const prog = STATE.syllabusProgress[leaf.id];
  const done = prog && prog.done;
  const revCount = leafRevisionCount(leaf.id);
  const segments = leafProgress(leaf.id); // 0-10
  const pct = segments*10;
  const segBars = Array.from({length:10}).map((_,i)=>
    `<span class="seg ${i<segments?'filled':''}" data-seg="${i+1}"></span>`
  ).join('');
  return `<div class="subtopic-row" data-row="${leaf.id}">
    <input type="checkbox" data-leaf="${leaf.id}" ${done?'checked':''}>
    <div class="tname ${done?'done':''}">${leaf.name}
      <span class="tag imp-${leaf.importance}">${leaf.importance}</span>
      ${leaf.pyq!=='none'?`<span class="tag pyq">PYQ ${leaf.pyq}</span>`:''}
    </div>
    <div class="tdate">${done && prog.doneDate ? 'done '+dmy(prog.doneDate) : ''}</div>
    <div class="revise-stepper">
      <button type="button" class="btn secondary small revise-dec" data-leaf="${leaf.id}" ${revCount<=0?'disabled':''} title="Undo one revision pass">−</button>
      <span class="revise-count ${revCount?'active':''}">↻ ${revCount ? 'Revised ×'+revCount : 'Not revised'}</span>
      <button type="button" class="btn secondary small revise-inc" data-leaf="${leaf.id}" ${done?'':'disabled'}
        title="${done?'Log another revision pass over this sub-topic':'Complete the first pass before revising'}">+</button>
    </div>
    <div class="progress-row">
      <div class="seg10" data-leaf="${leaf.id}" title="How much of this sub-topic have you covered? Click a bar (10% each) — top it up further any time.">${segBars}</div>
      <span class="seg-pct mono">${pct}%</span>
      ${segments>0 ? `<button type="button" class="seg-reset" data-leaf="${leaf.id}">Reset</button>` : ''}
    </div>
  </div>`;
}
RENDERERS.syllabus = async ()=>{ renderSyllabusPage(); };
</script>

<script>
/* ================= DASHBOARD ================= */
async function getAllDailyLogs(){
  const keys = await storeListKeys('daily:');
  const logs = [];
  for(const k of keys){
    const v = await storeGet(k, null);
    if(v) logs.push(Object.assign({date:k.replace('daily:','')}, v));
  }
  logs.sort((a,b)=> a.date<b.date?-1:1);
  return logs;
}
function computeStreak(logs){
  const dates = new Set(logs.filter(l=>flattenTopicEntries(l.sessions).some(s=>s.hours>0)).map(l=>l.date));
  let streak = 0, d = new Date(todayStr()+'T00:00:00');
  while(dates.has(d.toISOString().slice(0,10))){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}
function totalHoursLogged(logs){
  return logs.reduce((sum,l)=> sum + flattenTopicEntries(l.sessions).reduce((a,s)=>a+(Number(s.hours)||0),0), 0);
}
// A quiet, whole-app hint — not a bright badge — reflecting the last few days.
// Green if you've been consistent lately, a faint red if you've been slipping,
// neutral if there isn't enough recent data yet.
async function applyMoodTint(){
  const s = STATE.settings;
  if(!s) return;
  const logs = await getAllDailyLogs();
  const logByDate = {}; logs.forEach(l=>logByDate[l.date]=l);
  const today = todayStr();
  const recent = [];
  for(let i=0;i<5;i++){
    const d = new Date(today+'T00:00:00'); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    const score = computeDayScore(logByDate[iso], s);
    if(score!==null) recent.push(score);
  }
  document.body.classList.remove('mood-good','mood-low');
  if(recent.length<2) return;
  const avg = recent.reduce((a,b)=>a+b,0)/recent.length;
  if(avg>=0.6) document.body.classList.add('mood-good');
  else if(avg<0.4) document.body.classList.add('mood-low');
}

async function renderDashboard(){
  const el = document.getElementById('page-dashboard');
  const s = STATE.settings;
  const phase = currentPhase();
  const daysLeft = daysBetween(todayStr(), s.targetEnd);
  const overallPct = pctOf(ALL_LEAVES.map(l=>l.id));
  const logs = await getAllDailyLogs();
  const streak = computeStreak(logs);
  const totalHrs = totalHoursLogged(logs);
  const totalDaysTracked = logs.length;

  const examPcts = Object.keys(EXAM_LABELS).map(ex=>({exam:ex, pct: pctOf(leavesForExam(ex).map(l=>l.id))}));
  const revPcts = Object.keys(EXAM_LABELS).map(ex=>({exam:ex, pct: revisedPctOf(leavesForExam(ex).map(l=>l.id))}));
  const overallRevisedPct = revisedPctOf(ALL_LEAVES.map(l=>l.id));

  el.innerHTML = `
    <div class="pagehead">
      <div class="eyebrow">01 · Overview</div>
      <h2>Dashboard</h2>
      <p>A live snapshot of where your preparation stands today, ${dmy(todayStr())}.</p>
    </div>
    <div class="hero">
      <div class="stamp"><div class="phase">${phase.phase}</div><div class="phase-sub">${phase.sub}</div></div>
      <div class="hero-info">
        <div class="target">Target exam window · ${dmy(s.targetEnd)}</div>
        <div class="countdown">${daysLeft>=0?daysLeft:0} <small>days remaining</small></div>
        <div class="small-muted">Tracking started ${dmy(s.trackingStart)} · Revision & test-series phase begins ${dmy(s.revisionStart)}</div>
      </div>
    </div>
    <div class="grid grid-4">
      <div class="stat"><div class="label">Overall Syllabus</div><div class="value">${overallPct}%</div>
        <div class="progress-track small"><div class="progress-fill" style="width:${overallPct}%"></div></div></div>
      <div class="stat"><div class="label">Current Streak</div><div class="value">${streak} <span style="font-size:14px;">day${streak===1?'':'s'}</span></div>
        <div class="small-muted">days with logged study</div></div>
      <div class="stat"><div class="label">Total Hours Logged</div><div class="value">${totalHrs.toFixed(1)}</div>
        <div class="small-muted">across ${totalDaysTracked} tracked day${totalDaysTracked===1?'':'s'}</div></div>
      <div class="stat"><div class="label">Avg Hours / Tracked Day</div><div class="value">${totalDaysTracked?(totalHrs/totalDaysTracked).toFixed(1):'0.0'}</div>
        <div class="small-muted">study hours per logged day</div></div>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <h3>Coverage by Exam Stage <span class="small-muted">(first pass)</span></h3>
        ${examPcts.map(e=>`<div class="bar-row">
          <div class="bar-label">${EXAM_LABELS[e.exam]}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${e.pct}%"></div></div>
          <div class="bar-val">${e.pct}%</div>
        </div>`).join('')}
      </div>
      <div class="card">
        <h3>Revision Coverage <span class="small-muted">(of topics done)</span></h3>
        <p class="small-muted" style="margin-bottom:10px;">Overall: <strong>${overallRevisedPct}%</strong> of completed topics have had at least one revision pass.</p>
        ${revPcts.map(e=>`<div class="bar-row">
          <div class="bar-label">${EXAM_LABELS[e.exam]}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${e.pct}%;background:var(--gold);"></div></div>
          <div class="bar-val">${e.pct}%</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="grid grid-2">
      <div class="card">
        <h3>Quick Actions</h3>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="btn seal small" id="qa-daily">Log today</button>
          <button class="btn secondary small" id="qa-syllabus">Open syllabus</button>
          <button class="btn secondary small" id="qa-plan">New plan block</button>
        </div>
      </div>
      <div class="card">
        <h3>Reminder</h3>
        <p class="small-muted">${totalDaysTracked===0 ? "No days logged yet — start with today's Daily Log to begin building your Analysis view." : (logs[logs.length-1].date!==todayStr() ? "You haven't logged today yet." : 'Today is logged. Good discipline — keep the streak alive.')}</p>
      </div>
    </div>
  `;
  document.getElementById('qa-daily').onclick = ()=>goPage('daily');
  document.getElementById('qa-syllabus').onclick = ()=>goPage('syllabus');
  document.getElementById('qa-plan').onclick = ()=>goPage('planner');
}
RENDERERS.dashboard = renderDashboard;
</script>

<script>
/* ================= PLANNER PAGE ================= */
async function loadPlans(){ STATE.plans = await storeGet('plans', []); }
async function savePlans(){ await storeSet('plans', STATE.plans); }
// Scope currently selected in the Create Plan Block form — chosen via the
// tile drill-down below instead of a chain of <select> dropdowns.
let plannerScope = { paperId: SYLLABUS[0].id, sectionId: null, topicId: null, leafId: null };
// Transient nav position *inside* the open picker panel. Kept separate from
// plannerScope so browsing around doesn't commit anything until a "Use…"
// row/tile is actually clicked.
let plannerPick = { exam: SYLLABUS[0].exam, paperId: null, sectionId: null, topicId: null };
let plannerScopeSearchQuery = '';

function scopeSummaryLabel(scope){
  const p = SYLLABUS.find(x=>x.id===scope.paperId);
  if(!p) return 'Choose a paper, section, topic or sub-topic…';
  const sec = scope.sectionId ? p.sections.find(x=>x.id===scope.sectionId) : null;
  const top = (sec && scope.topicId) ? sec.topics.find(x=>x.id===scope.topicId) : null;
  const leaf = scope.leafId ? ALL_LEAVES.find(l=>l.id===scope.leafId) : null;
  return [`${p.title} (${EXAM_LABELS[p.exam]})`, sec?sec.name:null, top?top.name:null, leaf?leaf.name:null].filter(Boolean).join(' → ');
}
function dateRangeArray(start,end){
  const out = []; let d = new Date(start+'T00:00:00'); const endD = new Date(end+'T00:00:00');
  while(d<=endD){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
  return out;
}
// Leaves covered by a plan block, honoring however far it was scoped: paper only,
// paper+section, or down to a single topic.
function leavesForPlan(p){
  if(p.leafId) return ALL_LEAVES.filter(l=>l.id===p.leafId);
  if(p.topicId) return leavesForTopic(p.paperId, p.sectionId, p.topicId);
  if(p.sectionId) return leavesForSection(p.paperId, p.sectionId);
  return leavesForPaper(p.paperId);
}

function renderPlannerPage(){
  const el = document.getElementById('page-planner');
  el.innerHTML = `
    <div class="pagehead">
      <div class="eyebrow">03 · Calendar</div>
      <h2>Planner</h2>
      <p>Allocate a paper — or drill into a specific section or individual topic — to a date range with a daily-hours target, then track each day against it and watch syllabus coverage move alongside it. Dates are entered as DD/MM/YYYY.</p>
    </div>
    <div class="card">
      <h3>Create Plan Block</h3>
      <div class="grid grid-2">
        <div class="field">
          <label>Study scope</label>
          <div class="scope-box">
            <div class="scope-current" id="pl-scope-current">${scopeSummaryLabel(plannerScope)}</div>
            <button type="button" class="btn secondary small" id="pl-scope-toggle">Change</button>
          </div>
          <div class="scope-panel" id="pl-scope-panel" style="display:none;"></div>
        </div>
        <div class="field"><label>Daily target (hours)</label><input type="number" id="pl-hours" step="0.5" value="3"></div>
      </div>
      <div class="grid grid-4">
        <div class="field"><label>Start date</label>${dateInputHTML('pl-start', todayStr())}</div>
        <div class="field"><label>End date</label>${dateInputHTML('pl-end', todayStr())}</div>
      </div>
      <div class="window-box">
        <label>Daily study window <span class="small-muted" style="text-transform:none;font-weight:400;">— optional, works out the hours above for you</span></label>
        <div class="grid grid-3">
          <div class="field"><label>From</label>${timeInputHTML('pl-win-start','')}</div>
          <div class="field"><label>To</label>${timeInputHTML('pl-win-end','')}</div>
          <div class="field"><label>Break (mins)</label><input type="number" id="pl-win-break" min="0" step="5" value="30"></div>
        </div>
        <div class="window-net" id="pl-win-net"></div>
      </div>
      <div class="schedule-summary" id="pl-schedule-summary"></div>
      <button class="btn seal" id="pl-add">Add Plan Block</button>
    </div>
    <div id="plan-list"></div>
  `;
  document.getElementById('pl-scope-toggle').onclick = ()=>{
    const panel = document.getElementById('pl-scope-panel');
    const opening = panel.style.display === 'none';
    panel.style.display = opening ? 'block' : 'none';
    if(opening){
      const startPaper = SYLLABUS.find(x=>x.id===plannerScope.paperId);
      plannerPick = { exam: startPaper ? startPaper.exam : SYLLABUS[0].exam, paperId:null, sectionId:null, topicId:null };
      plannerScopeSearchQuery = '';
      renderScopePanel();
    }
  };
  document.getElementById('pl-add').onclick = async ()=>{
    const start = getDmyIso('pl-start'), end = getDmyIso('pl-end');
    if(!start || !end){ toast('Enter both dates as DD/MM/YYYY'); return; }
    if(end < start){ toast('End date must be after start date'); return; }
    const paperId = plannerScope.paperId;
    if(!paperId){ toast('Choose a study scope first'); return; }
    const sectionId = plannerScope.sectionId || null;
    const topicId = plannerScope.topicId || null;
    const leafId = plannerScope.leafId || null;
    const p = SYLLABUS.find(x=>x.id===paperId);
    const sec = sectionId ? p.sections.find(x=>x.id===sectionId) : null;
    const top = (sec && topicId) ? sec.topics.find(x=>x.id===topicId) : null;
    const leaf = leafId ? ALL_LEAVES.find(l=>l.id===leafId) : null;
    const winStart = getTimeValue('pl-win-start') || null;
    const winEnd = getTimeValue('pl-win-end') || null;
    const winBreak = (winStart && winEnd) ? (Number(document.getElementById('pl-win-break').value)||0) : null;
    STATE.plans.push({
      id: uid(),
      paperId, sectionId, topicId, leafId,
      subject: p.title, // kept for backward-compat matching against Daily Log session subjects
      sectionName: sec ? sec.name : null,
      topicName: top ? top.name : null,
      subName: leaf ? leaf.name : null,
      start, end, dailyHours: Number(document.getElementById('pl-hours').value)||1,
      windowStart: winStart, windowEnd: winEnd, windowBreakMins: winBreak,
      dayLog:{}
    });
    await savePlans();
    toast('Plan block added');
    renderPlanList();
  };
  ['pl-start','pl-end'].forEach(id=>{
    const el = document.getElementById(id);
    el.addEventListener('input', updateScheduleSummary);
    el.addEventListener('change', updateScheduleSummary);
  });
  document.getElementById('pl-hours').addEventListener('input', updateScheduleSummary);
  ['pl-win-start','pl-win-end'].forEach(id=>{
    document.getElementById(id).addEventListener('change', updateWindowNet);
  });
  document.getElementById('pl-win-break').addEventListener('input', updateWindowNet);
  updateWindowNet();
  updateScheduleSummary();
  renderPlanList();
}

// Live "how many days, from when to when, how many hours" readout above the
// Add Plan Block button — updates as the dates or daily target change.
function updateScheduleSummary(){
  const box = document.getElementById('pl-schedule-summary');
  if(!box) return;
  const start = getDmyIso('pl-start'), end = getDmyIso('pl-end');
  const hoursEl = document.getElementById('pl-hours');
  const hours = hoursEl ? Number(hoursEl.value)||0 : 0;
  if(!start || !end || end < start){
    box.innerHTML = `<span>Enter a valid start and end date to see the schedule.</span>`;
    return;
  }
  const days = dateRangeArray(start,end).length;
  const total = Math.round(days*hours*10)/10;
  box.innerHTML = `<span><strong>${days}</strong> day${days>1?'s':''}</span>
    <span><strong>${dmy(start)}</strong> → <strong>${dmy(end)}</strong></span>
    <span><strong>${hours}</strong> hrs/day</span>
    <span><strong>${total}</strong> total hours</span>`;
}

// Turns the optional "From / To / Break" trio into a net daily-hours figure and
// writes it straight into the Daily target (hours) field, so someone who thinks
// in clock time ("2 to 5:30, with a 30 min break") doesn't have to do the maths
// themselves. Leaves the hours field free to edit by hand at any point — this
// only overwrites it when the window itself changes. Doesn't assume an overnight
// wrap-around: an end time at or before the start time is flagged, not silently
// treated as crossing midnight, since that's almost always a typo here.
function updateWindowNet(){
  const box = document.getElementById('pl-win-net');
  if(!box) return;
  const start = getTimeValue('pl-win-start');
  const end = getTimeValue('pl-win-end');
  if(!start || !end){ box.innerHTML = ''; return; }
  const breakEl = document.getElementById('pl-win-break');
  const brk = breakEl ? (Number(breakEl.value)||0) : 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  const mins = (eh*60+em) - (sh*60+sm) - brk;
  if(mins<=0){
    box.innerHTML = `<span class="wn-warn">End time should be after start time (minus the break).</span>`;
    return;
  }
  const net = Math.round(mins/60*100)/100;
  const hoursEl = document.getElementById('pl-hours');
  if(hoursEl) hoursEl.value = net;
  box.innerHTML = `${fmtTime12(start)} → ${fmtTime12(end)}${brk?` minus ${brk} min break`:''} = <strong>${net}</strong> hrs/day`;
  updateScheduleSummary();
}

// Drill-down used to pick a plan block's scope: exam tabs → paper list →
// section tiles → topic list → sub-topic list. Each level (except sub-topic,
// which IS the finest grain) also offers a "Use whole …" action, so a block
// can be scoped as broadly or as precisely as needed. A search box up top
// jumps straight to any paper/section/topic/sub-topic by name.
function renderScopePanel(){
  const panel = document.getElementById('pl-scope-panel');
  if(!panel) return;
  panel.innerHTML = `
    <div class="scope-search-wrap">
      <input type="text" id="pl-scope-search" placeholder="Search e.g. Panchayati Raj, GS Paper I, Ethics…" autocomplete="off" value="${plannerScopeSearchQuery.replace(/"/g,'&quot;')}">
      <div id="pl-scope-search-results"></div>
    </div>
    <div id="pl-scope-browse"></div>
  `;
  const searchInput = document.getElementById('pl-scope-search');
  searchInput.oninput = ()=>{ plannerScopeSearchQuery = searchInput.value.trim(); renderScopeSearch(); };
  renderScopeSearch();
}

// Toggles between the search-results view and the normal browse view,
// depending on whether there's an active query.
function renderScopeSearch(){
  const resultsBox = document.getElementById('pl-scope-search-results');
  const browseBox = document.getElementById('pl-scope-browse');
  if(!resultsBox || !browseBox) return;
  const q = plannerScopeSearchQuery;
  if(q.length < 2){
    resultsBox.innerHTML = '';
    browseBox.style.display = '';
    renderScopeBrowse();
    return;
  }
  browseBox.style.display = 'none';
  const ql = q.toLowerCase();
  const results = [];
  SYLLABUS.forEach(p=>{
    if(p.title.toLowerCase().includes(ql)){
      results.push({paperId:p.id, sectionId:null, topicId:null, leafId:null, label:p.title, path:EXAM_LABELS[p.exam]});
    }
    p.sections.forEach(sec=>{
      if(sec.name.toLowerCase().includes(ql)){
        results.push({paperId:p.id, sectionId:sec.id, topicId:null, leafId:null, label:sec.name, path:p.title});
      }
      sec.topics.forEach(top=>{
        if(top.name.toLowerCase().includes(ql)){
          results.push({paperId:p.id, sectionId:sec.id, topicId:top.id, leafId:null, label:top.name, path:`${p.title} → ${sec.name}`});
        }
      });
    });
  });
  ALL_LEAVES.forEach(l=>{
    if(l.name.toLowerCase().includes(ql)){
      results.push({paperId:l.paperId, sectionId:l.sectionId, topicId:l.topicId, leafId:l.id, label:l.name, path:`${l.paperTitle} → ${l.sectionName} → ${l.topicName}`});
    }
  });
  const capped = results.slice(0,40);
  if(!capped.length){
    resultsBox.innerHTML = `<div class="search-item empty-hit">No matches for "${q}"</div>`;
    return;
  }
  resultsBox.innerHTML = capped.map((r,i)=>`
    <button type="button" class="search-item" data-idx="${i}">
      <div class="si-name">${r.label}</div>
      <div class="si-path">${r.path}</div>
    </button>`).join('');
  resultsBox.querySelectorAll('.search-item[data-idx]').forEach(btn=>{
    btn.onclick = ()=>{
      const r = capped[Number(btn.dataset.idx)];
      finalizeScope({ paperId:r.paperId, sectionId:r.sectionId, topicId:r.topicId, leafId:r.leafId });
    };
  });
}

function renderScopeBrowse(){
  const box = document.getElementById('pl-scope-browse');
  if(!box) return;
  const ACCENTS = [
    {c:'var(--seal)', d:'var(--seal-dim)'},
    {c:'var(--teal)', d:'var(--teal-dim)'},
    {c:'var(--gold)', d:'var(--gold-dim)'},
  ];
  const accentStyle = (i)=> `--tile-accent:${ACCENTS[i%3].c};--tile-accent-dim:${ACCENTS[i%3].d};`;
  const nav = plannerPick;
  let inner = '';
  if(!nav.paperId){
    // Level 1: exam tabs + a LIST of papers (e.g. "General Studies Paper I")
    const tabs = Object.keys(EXAM_LABELS).map(ex=>
      `<button type="button" class="tab-flat ${nav.exam===ex?'active':''}" data-sc-exam="${ex}">${EXAM_LABELS[ex]}</button>`
    ).join('');
    const papers = SYLLABUS.filter(p=>p.exam===nav.exam);
    const rows = papers.map((p,i)=>`
      <div class="scope-row" style="${accentStyle(i)}">
        <button type="button" class="scope-row-body" data-sc-drill-paper="${p.id}">
          <h4>${p.title}</h4>
        </button>
        <div class="scope-row-actions">
          <button type="button" class="btn seal small scope-use" data-sc-use-paper="${p.id}">Use whole paper</button>
          <span class="scope-row-arrow" data-sc-drill-paper="${p.id}">›</span>
        </div>
      </div>`).join('');
    inner = `<div class="tab-row">${tabs}</div><div class="scope-list">${rows}</div>`;
  } else if(!nav.sectionId){
    // Level 2: TILES for sections within the chosen paper
    const p = SYLLABUS.find(x=>x.id===nav.paperId);
    const tiles = p.sections.map((sec,i)=>`
      <div class="tile scope-tile" style="${accentStyle(i)}">
        <button type="button" class="scope-tile-body" data-sc-drill-section="${sec.id}">
          <div class="tile-eyebrow">${sec.topics.length} topic${sec.topics.length>1?'s':''}</div>
          <h4>${sec.name}</h4>
        </button>
        <button type="button" class="btn seal small scope-use" data-sc-use-section="${sec.id}">Use whole section</button>
      </div>`).join('');
    inner = `<button type="button" class="btn secondary small" id="sc-back">← Back to papers</button>
      <div class="crumb" style="margin:10px 0 12px;"><span class="current">${p.title}</span></div>
      <div class="tile-grid compact">${tiles}</div>`;
  } else if(!nav.topicId){
    // Level 3: LIST of topics within the chosen section
    const p = SYLLABUS.find(x=>x.id===nav.paperId);
    const sec = p.sections.find(x=>x.id===nav.sectionId);
    const rows = sec.topics.map((top,i)=>`
      <div class="scope-row" style="${accentStyle(i)}">
        <button type="button" class="scope-row-body" data-sc-drill-topic="${top.id}">
          <h4>${top.name}</h4>
          <div class="scope-row-meta">${top.subs.length} sub-topic${top.subs.length>1?'s':''}</div>
        </button>
        <div class="scope-row-actions">
          <button type="button" class="btn seal small scope-use" data-sc-use-topic="${top.id}">Use whole topic</button>
          <span class="scope-row-arrow" data-sc-drill-topic="${top.id}">›</span>
        </div>
      </div>`).join('');
    inner = `<button type="button" class="btn secondary small" id="sc-back">← Back to ${p.title}</button>
      <div class="crumb" style="margin:10px 0 12px;"><span class="current">${p.title} / ${sec.name}</span></div>
      <div class="scope-list">${rows}</div>`;
  } else {
    // Level 4: LIST of individual sub-topics — the finest grain, picked directly
    const p = SYLLABUS.find(x=>x.id===nav.paperId);
    const sec = p.sections.find(x=>x.id===nav.sectionId);
    const top = sec.topics.find(x=>x.id===nav.topicId);
    const rows = top.subs.map((sub,i)=>{
      const leafId = `${p.id}__${sec.id}__${top.id}__${i}`;
      return `<div class="scope-row" style="${accentStyle(i)}">
        <div class="scope-row-body" style="cursor:default;">
          <h4>${sub.name}</h4>
        </div>
        <div class="scope-row-actions">
          <button type="button" class="btn seal small scope-use" data-sc-use-leaf="${leafId}">Use</button>
        </div>
      </div>`;
    }).join('');
    inner = `<button type="button" class="btn secondary small" id="sc-back">← Back to ${top.name}</button>
      <div class="crumb" style="margin:10px 0 12px;"><span class="current">${p.title} / ${sec.name} / ${top.name}</span></div>
      <div class="scope-list">${rows}</div>`;
  }
  box.innerHTML = inner;
  wireScopeBrowse();
}
function wireScopeBrowse(){
  const box = document.getElementById('pl-scope-browse');
  if(!box) return;
  box.querySelectorAll('[data-sc-exam]').forEach(b=>{
    b.onclick = ()=>{ plannerPick.exam = b.dataset.scExam; renderScopeBrowse(); };
  });
  box.querySelectorAll('[data-sc-drill-paper]').forEach(b=>{
    b.onclick = ()=>{ plannerPick.paperId = b.dataset.scDrillPaper; renderScopeBrowse(); };
  });
  box.querySelectorAll('[data-sc-drill-section]').forEach(b=>{
    b.onclick = ()=>{ plannerPick.sectionId = b.dataset.scDrillSection; renderScopeBrowse(); };
  });
  box.querySelectorAll('[data-sc-drill-topic]').forEach(b=>{
    b.onclick = ()=>{ plannerPick.topicId = b.dataset.scDrillTopic; renderScopeBrowse(); };
  });
  const back = document.getElementById('sc-back');
  if(back) back.onclick = ()=>{
    if(plannerPick.topicId){ plannerPick.topicId = null; }
    else if(plannerPick.sectionId){ plannerPick.sectionId = null; }
    else if(plannerPick.paperId){ plannerPick.paperId = null; }
    renderScopeBrowse();
  };
  box.querySelectorAll('[data-sc-use-paper]').forEach(b=>{
    b.onclick = ()=>{ finalizeScope({ paperId:b.dataset.scUsePaper, sectionId:null, topicId:null, leafId:null }); };
  });
  box.querySelectorAll('[data-sc-use-section]').forEach(b=>{
    b.onclick = ()=>{ finalizeScope({ paperId:plannerPick.paperId, sectionId:b.dataset.scUseSection, topicId:null, leafId:null }); };
  });
  box.querySelectorAll('[data-sc-use-topic]').forEach(b=>{
    b.onclick = ()=>{ finalizeScope({ paperId:plannerPick.paperId, sectionId:plannerPick.sectionId, topicId:b.dataset.scUseTopic, leafId:null }); };
  });
  box.querySelectorAll('[data-sc-use-leaf]').forEach(b=>{
    b.onclick = ()=>{ finalizeScope({ paperId:plannerPick.paperId, sectionId:plannerPick.sectionId, topicId:plannerPick.topicId, leafId:b.dataset.scUseLeaf }); };
  });
}
function finalizeScope(scope){
  plannerScope = scope;
  const summary = document.getElementById('pl-scope-current');
  if(summary) summary.textContent = scopeSummaryLabel(plannerScope);
  const panel = document.getElementById('pl-scope-panel');
  if(panel) panel.style.display = 'none';
  plannerScopeSearchQuery = '';
  toast('Scope set: '+scopeSummaryLabel(plannerScope));
}

function renderPlanList(){
  const wrap = document.getElementById('plan-list');
  if(!STATE.plans.length){ wrap.innerHTML = `<div class="empty">No plan blocks yet — create one above to start allocating study time.</div>`; return; }
  const sorted = [...STATE.plans].sort((a,b)=> a.start<b.start?-1:1);
  wrap.innerHTML = sorted.map(p=>{
    const days = dateRangeArray(p.start,p.end);
    const doneDays = days.filter(d=>p.dayLog[d]&&p.dayLog[d].done).length;
    const pct = Math.round(doneDays/days.length*100);
    const dayboxes = days.map(d=>{
      const entry = p.dayLog[d];
      let cls = 'future';
      if(d < todayStr()) cls = entry&&entry.done ? 'done' : 'missed';
      else if(d===todayStr()) cls = entry&&entry.done ? 'done' : '';
      return `<span class="daybox ${cls}" data-plan="${p.id}" data-day="${d}" title="${dmy(d)}${entry&&entry.notes?' — '+entry.notes:''}">${new Date(d+'T00:00:00').getDate()}</span>`;
    }).join('');
    // Syllabus-linked coverage: how much of the scoped paper/section/topic is actually
    // ticked off in the Syllabus page, independent of day-by-day adherence above.
    const scopeLeaves = p.paperId ? leavesForPlan(p) : [];
    const covPct = scopeLeaves.length ? pctOf(scopeLeaves.map(l=>l.id)) : null;
    const scopeLabel = [p.subject, p.sectionName, p.topicName, p.subName].filter(Boolean).join(' → ');
    return `<div class="plan-card">
      <div class="top-row">
        <div><strong>${p.subName || p.topicName || p.sectionName || p.subject}</strong>
          ${(p.sectionName||p.topicName) ? `<div class="small-muted mono" style="margin-top:2px;">${scopeLabel}</div>` : ''}
          <div class="meta">${dmy(p.start)} → ${dmy(p.end)} · ${p.dailyHours} hrs/day target · ${days.length} days${p.windowStart && p.windowEnd ? ` · ${fmtTime12(p.windowStart)}–${fmtTime12(p.windowEnd)}${p.windowBreakMins?` (${p.windowBreakMins}m break)`:''}` : ''}</div>
        </div>
        <div style="text-align:right;">
          <div class="mono small-muted">${doneDays}/${days.length} days on target (${pct}%)</div>
          ${covPct!==null ? `<div class="mono small-muted">${covPct}% of syllabus scope covered</div>` : ''}
          <div style="margin-top:6px;display:flex;gap:6px;justify-content:flex-end;">
            ${p.paperId ? `<button class="btn secondary small pl-open-syllabus" data-id="${p.id}">Open in Syllabus</button>` : ''}
            <button class="btn secondary small pl-remove" data-id="${p.id}">Remove</button>
          </div>
        </div>
      </div>
      <div class="progress-track" style="margin:10px 0;"><div class="progress-fill" style="width:${pct}%"></div></div>
      ${covPct!==null ? `<div class="progress-track" style="margin:0 0 10px 0;opacity:.7;"><div class="progress-fill" style="width:${covPct}%;background:var(--teal);"></div></div>` : ''}
      <div>${dayboxes}</div>
    </div>`;
  }).join('');
  wrap.querySelectorAll('.daybox:not(.future)').forEach(box=>{
    box.onclick = async ()=>{
      const plan = STATE.plans.find(p=>p.id===box.dataset.plan);
      const d = box.dataset.day;
      const cur = plan.dayLog[d] || {done:false, notes:''};
      cur.done = !cur.done;
      plan.dayLog[d] = cur;
      await savePlans();
      renderPlanList();
    };
  });
  wrap.querySelectorAll('.pl-remove').forEach(btn=>{
    btn.onclick = async ()=>{
      if(!confirm('Remove this plan block? This cannot be undone.')) return;
      STATE.plans = STATE.plans.filter(p=>p.id!==btn.dataset.id);
      await savePlans();
      renderPlanList();
      toast('Plan block removed');
    };
  });
  wrap.querySelectorAll('.pl-open-syllabus').forEach(btn=>{
    btn.onclick = async ()=>{
      const plan = STATE.plans.find(p=>p.id===btn.dataset.id);
      syllabusNav = { exam: SYLLABUS.find(x=>x.id===plan.paperId).exam, paperId: plan.paperId, sectionId: plan.sectionId||null, topicId: plan.topicId||null, returnTo:'planner' };
      await goPage('syllabus');
    };
  });
}
RENDERERS.planner = async ()=>{ renderPlannerPage(); };
</script>

<script>
/* ================= DAILY LOG PAGE ================= */
let dailyCurrentDate = todayStr();
let dailyDraft = null;
let dailyActiveSessionIdx = 0;
let dailyChartState = {level:0, subject:null};

// A mundane task carries {done, start, end} for the day — pre-filled from the
// ideal routine set in Settings, but freely editable per day if something came up.
function normalizeMundane(existingMundane, s){
  const out = {};
  (s.mundaneTasks||[]).forEach(t=>{
    const prev = existingMundane ? existingMundane[t.name] : null;
    if(prev && typeof prev==='object'){
      out[t.name] = {done: !!prev.done, start: prev.start||t.start, end: prev.end||t.end};
    } else {
      out[t.name] = {done: !!prev, start: t.start, end: t.end}; // legacy boolean or missing
    }
  });
  return out;
}
// A "session" is a block of time (e.g. "Morning block, 9–12") that can contain
// several topics — possibly across different subjects. getSessionTopics()
// also transparently upgrades old-format sessions (which stored a single
// subject/topic/hours directly on the session) into a one-item topics array,
// so past logs keep working without a manual migration step.
function getSessionTopics(session){
  if(!session) return [];
  if(Array.isArray(session.topics)) return session.topics;
  if(session.subject || session.topic || session.hours || session.challenges || session.completed){
    return [{subject:session.subject||'', topic:session.topic||'', hours:Number(session.hours)||0, completed:!!session.completed, challenges:session.challenges||''}];
  }
  return [];
}
function migrateSession(session){
  if(session && Array.isArray(session.topics)) return session;
  return {label: (session&&session.label)||'', topics: getSessionTopics(session)};
}
function flattenTopicEntries(sessions){
  return (sessions||[]).flatMap(getSessionTopics);
}
async function loadDailyLog(date){
  const existing = await storeGet('daily:'+date, null);
  const s = STATE.settings;
  if(existing){
    existing.activities = existing.activities || [];
    existing.mundane = normalizeMundane(existing.mundane, s);
    existing.sessions = (existing.sessions||[]).map(migrateSession);
    return existing;
  }
  return {
    wake: s.defaultWake, sleep: s.defaultSleep,
    workoutStart: s.defaultWorkoutStart, workoutDuration: s.defaultWorkoutDuration, workoutDone:false,
    mundane: normalizeMundane({}, s), sessions: [], activities: [], notes:'', testTaken:false, testScore:'', testSubject:''
  };
}
const ACTIVITY_SUGGESTIONS = ['Morning Run','Gym / Workout','Walk','Yoga','Meditation','Reading (non-syllabus)','Newspaper','Cooking','Chores','Family Time','Commute','Social Media / Break'];

// Short, original lines for the Daily Log — picked deterministically per
// calendar day so it feels intentional rather than random each render.
const PREP_QUOTES = [
  {text:"Some day you'll thank the version of you who showed up today.", by:''},
  {text:'Consistency beats intensity — one honest hour daily wins over months.', by:''},
  {text:"The syllabus doesn't care about your mood. Show up anyway.", by:''},
  {text:"Every revision you skip, someone else's rank quietly improves.", by:''},
  {text:'Fall seven times, stand up eight.', by:'Japanese proverb'},
  {text:"You don't need a good day. You need one honest hour.", by:''},
  {text:"The exam is far. The syllabus is near. Work on what's near.", by:''},
  {text:"Small, boring, repeated effort — that's what a rank is made of.", by:''},
  {text:'Your only real competition is who you were yesterday.', by:''},
  {text:"Tired isn't the same as done. Log the hour anyway.", by:''},
  {text:'Discipline is choosing between what you want now and what you want most.', by:''},
  {text:'A little progress each day adds up to big results.', by:''},
];
function quoteForToday(){
  const d = new Date(todayStr()+'T00:00:00');
  const start = new Date(d.getFullYear(),0,0);
  const dayOfYear = Math.floor((d-start)/86400000);
  return PREP_QUOTES[dayOfYear % PREP_QUOTES.length];
}
// Walks backward from today (not from whichever day is being viewed) looking
// for the most recent past day with no log at all, so a missed day can be
// surfaced and fixed even while looking at a different date.
function findMostRecentMissedDay(logs, lookbackDays){
  const s = STATE.settings;
  const logged = new Set(logs.map(l=>l.date));
  const today = todayStr();
  for(let i=1;i<=lookbackDays;i++){
    const d = new Date(today+'T00:00:00'); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    if(s.trackingStart && iso<s.trackingStart) break;
    if(!logged.has(iso)) return iso;
  }
  return null;
}

async function renderDailyPage(){
  const el = document.getElementById('page-daily');
  dailyDraft = await loadDailyLog(dailyCurrentDate);
  dailyActiveSessionIdx = 0;
  dailyChartState = {level:0, subject:null};
  const s = STATE.settings;
  const activePlans = STATE.plans.filter(p=> p.start<=dailyCurrentDate && dailyCurrentDate<=p.end);
  const inRevisionPhase = dailyCurrentDate >= s.revisionStart;
  const todayIso = todayStr();
  const allLogs = await getAllDailyLogs();
  const missedIso = findMostRecentMissedDay(allLogs, 14);
  const showMissedBanner = missedIso && missedIso!==dailyCurrentDate;
  const q = quoteForToday();

  el.innerHTML = `
    <div class="pagehead">
      <div class="eyebrow">04 · Today's Record</div>
      <h2>Daily Log</h2>
      <p>What you did lives on the left as work tabs — one per session. When it happened lives on the right. You can also go back and fill in any past day you missed — just not the future.</p>
    </div>
    ${showMissedBanner ? `<div class="missed-banner"><p>You haven't logged <strong>${dmy(missedIso)}</strong> yet. You can still fill it in.</p><button id="dl-goto-missed">Log ${dmy(missedIso)}</button></div>` : ''}
    <div class="dl-quote">${q.text}${q.by?`<span>— ${q.by}</span>`:''}</div>
    <div class="daily-layout">
      <div class="dl-main">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
            <h3 style="margin-bottom:0;">Study Sessions — what I logged today</h3>
            <span class="small-muted mono" id="dl-total-hours"></span>
          </div>
          <div class="session-tabs" id="dl-session-tabs" style="margin-top:14px;"></div>
          <div id="dl-session-editor"></div>
        </div>
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
            <h3 style="margin-bottom:0;">Activities & Journal</h3>
            <span class="small-muted mono" id="dl-activity-total"></span>
          </div>
          <p class="small-muted" style="margin:6px 0 12px 0;">Anything else you did today and how long it took — a run, the gym, reading, chores, whatever. Not tied to the syllabus.</p>
          <div id="dl-activities"></div>
          <button class="btn secondary small" id="dl-add-activity">+ Add activity</button>
          <datalist id="activity-suggestions">${ACTIVITY_SUGGESTIONS.map(a=>`<option value="${a}">`).join('')}</datalist>
        </div>
        ${activePlans.length? `<div class="card">
          <h3>Active Plan Blocks Today</h3>
          ${activePlans.map(p=>`<div class="small-muted">• <strong>${p.topicName||p.sectionName||p.subject}</strong> — target ${p.dailyHours} hrs/day (${dmy(p.start)}–${dmy(p.end)})</div>`).join('')}
        </div>`:''}
        <div class="card">
          <h3>Today's Time Breakdown</h3>
          <p class="small-muted" style="margin-bottom:10px;">Updates live as you log — click "Study" to see it by subject, then by topic.</p>
          <div id="dl-today-chart"></div>
        </div>
      </div>
      <aside class="dl-sidebar">
        <div class="card">
          <h3>When</h3>
          <div class="field">
            <label>Date</label>
            ${dateInputHTML('dl-date', dailyCurrentDate)}
            <div class="dl-datenav">
              <button type="button" id="dl-prev-day">‹ Prev day</button>
              <button type="button" id="dl-today-jump">Today</button>
              <button type="button" id="dl-next-day" ${dailyCurrentDate>=todayIso?'disabled':''}>Next day ›</button>
            </div>
          </div>
          <div class="field"><label>Woke up at</label>${timeInputHTML('dl-wake', dailyDraft.wake)}</div>
          <div class="field"><label>Slept at</label>${timeInputHTML('dl-sleep', dailyDraft.sleep)}</div>
          <div class="field"><label>Workout</label>
            <div style="display:flex;gap:6px;align-items:center;">
              <div style="flex:1;">${timeInputHTML('dl-workout-start', dailyDraft.workoutStart)}</div>
              <input type="number" id="dl-workout-dur" value="${dailyDraft.workoutDuration||0}" style="width:56px;" title="minutes">
              <label style="display:flex;align-items:center;gap:4px;text-transform:none;font-size:12px;"><input type="checkbox" id="dl-workout-done" style="width:auto;" ${dailyDraft.workoutDone?'checked':''}> done</label>
            </div>
          </div>
        </div>
        <div class="card">
          <h3>Routine</h3>
          <div id="dl-mundane"></div>
          <p class="small-muted" style="margin-top:8px;">Ideal times come from Settings — tick a task done and adjust its time here if today ran differently.</p>
        </div>
        ${inRevisionPhase ? `<div class="card">
          <h3>Test Series</h3>
          <div class="field"><label>Took a test today?</label>
            <label style="display:flex;align-items:center;gap:6px;text-transform:none;font-size:13px;"><input type="checkbox" id="dl-test-taken" style="width:auto;" ${dailyDraft.testTaken?'checked':''}> Yes</label>
          </div>
          <div class="field"><label>Test / Paper</label><input type="text" id="dl-test-subject" value="${dailyDraft.testSubject||''}" placeholder="e.g. GS2 Sectional Test 4"></div>
          <div class="field"><label>Score / Result</label><input type="text" id="dl-test-score" value="${dailyDraft.testScore||''}" placeholder="e.g. 92/150"></div>
        </div>`:''}
        <div class="card">
          <h3>Notes for the Day</h3>
          <textarea id="dl-notes" placeholder="Anything else worth remembering...">${dailyDraft.notes||''}</textarea>
        </div>
        <button class="btn seal" id="dl-save" style="width:100%;">Save Daily Log</button>
      </aside>
    </div>
  `;

  const missedBtn = document.getElementById('dl-goto-missed');
  if(missedBtn) missedBtn.onclick = async ()=>{ dailyCurrentDate = missedIso; await renderDailyPage(); };

  document.getElementById('dl-prev-day').onclick = async ()=>{
    const d = new Date(dailyCurrentDate+'T00:00:00'); d.setDate(d.getDate()-1);
    dailyCurrentDate = d.toISOString().slice(0,10);
    await renderDailyPage();
  };
  document.getElementById('dl-today-jump').onclick = async ()=>{
    dailyCurrentDate = todayStr();
    await renderDailyPage();
  };
  document.getElementById('dl-next-day').onclick = async ()=>{
    if(dailyCurrentDate>=todayStr()) return;
    const d = new Date(dailyCurrentDate+'T00:00:00'); d.setDate(d.getDate()+1);
    const iso = d.toISOString().slice(0,10);
    dailyCurrentDate = iso>todayStr() ? todayStr() : iso;
    await renderDailyPage();
  };

  document.getElementById('dl-date').addEventListener('change', async ()=>{
    const iso = getDmyIso('dl-date');
    if(!iso) return;
    if(iso>todayStr()){ toast("Can't log a future day yet — that one hasn't happened."); await renderDailyPage(); return; }
    dailyCurrentDate = iso; await renderDailyPage();
  });
  ['dl-wake','dl-sleep','dl-workout-dur'].forEach(id=>{
    document.getElementById(id).addEventListener('input', updateTodayChart);
  });
  document.getElementById('dl-add-activity').onclick = ()=>{
    dailyDraft.activities.push({name:'', minutes:0, notes:''});
    renderActivities();
  };
  renderSessions();
  renderActivities();
  renderMundaneRows();

  document.getElementById('dl-save').onclick = async ()=>{
    syncActiveSessionFromDOM();
    dailyDraft.wake = getTimeValue('dl-wake') || dailyDraft.wake;
    dailyDraft.sleep = getTimeValue('dl-sleep') || dailyDraft.sleep;
    dailyDraft.workoutStart = getTimeValue('dl-workout-start') || dailyDraft.workoutStart;
    dailyDraft.workoutDuration = Number(document.getElementById('dl-workout-dur').value)||0;
    dailyDraft.workoutDone = document.getElementById('dl-workout-done').checked;
    dailyDraft.notes = document.getElementById('dl-notes').value;
    const tt = document.getElementById('dl-test-taken');
    if(tt){
      dailyDraft.testTaken = tt.checked;
      dailyDraft.testSubject = document.getElementById('dl-test-subject').value;
      dailyDraft.testScore = document.getElementById('dl-test-score').value;
    }
    document.querySelectorAll('.activity-row').forEach((row,i)=>{
      dailyDraft.activities[i].name = row.querySelector('.a-name').value;
      dailyDraft.activities[i].start = getTimeValue('act-start-'+i);
      dailyDraft.activities[i].end = getTimeValue('act-end-'+i);
      dailyDraft.activities[i].minutes = Number(row.querySelector('.a-minutes').value)||0;
      dailyDraft.activities[i].notes = row.querySelector('.a-notes').value;
    });
    // dailyDraft.mundane is already kept in sync live by renderMundaneRows()'s change handlers.
    await storeSet('daily:'+dailyCurrentDate, dailyDraft);

    const allLoggedTopics = flattenTopicEntries(dailyDraft.sessions);
    STATE.plans.forEach(p=>{
      if(p.start<=dailyCurrentDate && dailyCurrentDate<=p.end){
        const matchingSessions = allLoggedTopics.filter(ss=>ss.subject===p.subject);
        if(matchingSessions.length){
          const anyCompleted = matchingSessions.some(ss=>ss.completed);
          const totalHrs = matchingSessions.reduce((a,ss)=>a+ss.hours,0);
          p.dayLog[dailyCurrentDate] = { done: anyCompleted || totalHrs>=p.dailyHours, notes: matchingSessions.map(ss=>ss.challenges).filter(Boolean).join('; ') };
        }
      }
    });
    await savePlans();
    await maybeUpdateRoutineSuggestion();
    await applyMoodTint();
    toast('Daily log saved');
  };
}

function escAttr(str){
  return String(str==null?'':str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
// Given {paperId, sectionId, topicId, leafId} (any of the last three may be
// null to mean "whole paper / whole section / whole topic"), returns the
// exact fields a session topic-row needs: the plain subject/topic strings
// used everywhere else in the app (Analysis, Planner matching, charts), plus
// the syllabus ids so the picker can re-open exactly where it left off.
function buildTopicPickPayload({paperId, sectionId=null, topicId=null, leafId=null}){
  const p = SYLLABUS.find(x=>x.id===paperId);
  if(!p) return null;
  const sec = sectionId ? p.sections.find(x=>x.id===sectionId) : null;
  const top = (sec && topicId) ? sec.topics.find(x=>x.id===topicId) : null;
  const leaf = leafId ? ALL_LEAVES.find(l=>l.id===leafId) : null;
  return {
    subject: p.title,
    topic: leaf ? leaf.name : (top ? top.name : (sec ? sec.name : '')),
    sectionName: sec ? sec.name : null,
    topicName: top ? top.name : null,
    paperId: p.id, sectionId: sec?sec.id:null, topicId: top?top.id:null, leafId: leaf?leaf.id:null
  };
}
// Same idea, for the three non-syllabus quick picks (Revision / Test Series / Other),
// which stay free text since there's no fixed tree to drill into.
function buildSpecialPickPayload(subject, topicText){
  return {subject, topic: topicText||'', sectionName:null, topicName:null, paperId:null, sectionId:null, topicId:null, leafId:null};
}
const SPECIAL_SUBJECT_LABELS = {Revision:'Revision (general)', 'Test Series':'Test Series / Mock', Other:'Other / Custom'};
// Builds the breadcrumb shown on a topic row's picker button. Handles both
// freshly-picked entries (which carry sectionName/topicName) and legacy
// entries saved before this picker existed (plain subject+topic strings only).
function topicEntryBreadcrumb(entry){
  if(!entry || !entry.subject) return null;
  if(SPECIAL_SUBJECT_LABELS[entry.subject]){
    const label = SPECIAL_SUBJECT_LABELS[entry.subject];
    return entry.topic ? `${label} › ${entry.topic}` : label;
  }
  const parts = [entry.subject];
  if(entry.sectionName) parts.push(entry.sectionName);
  if(entry.topicName && entry.topicName!==entry.sectionName) parts.push(entry.topicName);
  if(entry.leafId && entry.topic && entry.topic!==entry.topicName) parts.push(entry.topic);
  else if(!entry.sectionName && !entry.topicName && entry.topic) parts.push(entry.topic); // legacy free-typed topic
  return parts.join(' › ');
}
// Stable color per subject string (hashed into the app's existing chart palette)
// so topic rows in a busy multi-subject session stay easy to tell apart at a glance.
function colorForSubjectString(str){
  if(!str) return 'var(--seal)';
  let hash = 0;
  for(let i=0;i<str.length;i++){ hash = (hash*31 + str.charCodeAt(i)) >>> 0; }
  return colorForIndex(hash);
}
// Where the picker should land when re-opened on an existing row: restores the
// exact browse position for entries picked with this modal, and best-effort
// matches legacy free-typed subject/topic strings against the syllabus tree.
function initialNavForEntry(entry){
  if(entry && entry.paperId){
    const p = SYLLABUS.find(x=>x.id===entry.paperId);
    if(p) return {exam:p.exam, paperId:entry.paperId, sectionId:entry.sectionId||null, topicId:entry.topicId||null};
  }
  if(entry && entry.subject){
    const p = SYLLABUS.find(x=>x.title===entry.subject);
    if(p){
      let sectionId=null, topicId=null;
      if(entry.topic){
        outer: for(const sec of p.sections){
          for(const top of sec.topics){
            if(top.name===entry.topic || top.subs.some(s=>s.name===entry.topic)){ sectionId=sec.id; topicId=top.id; break outer; }
          }
        }
      }
      return {exam:p.exam, paperId:p.id, sectionId, topicId};
    }
  }
  return {exam: SYLLABUS[0].exam, paperId:null, sectionId:null, topicId:null};
}

// Pulls the currently-visible session editor's field values back into
// dailyDraft.sessions[dailyActiveSessionIdx] — needed because only one
// session's editor exists in the DOM at a time (the rest live in the tab strip).
// Subject/topic/syllabus-ids are set directly by the Topic Picker modal (not by
// a live DOM field), so they're preserved from the existing entry rather than
// re-read here — only hours/completed/challenges are live-edited inputs.
function syncActiveSessionFromDOM(){
  const editor = document.getElementById('dl-session-editor');
  if(!editor) return;
  const session = dailyDraft.sessions[dailyActiveSessionIdx];
  if(!session) return;
  const labelEl = editor.querySelector('.sess-label');
  if(labelEl) session.label = labelEl.value;
  const rows = editor.querySelectorAll('.topic-row');
  if(!rows.length) return; // no topic rows rendered (e.g. empty state) — leave topics untouched
  const existing = getSessionTopics(session);
  session.topics = Array.from(rows).map((row,i)=>Object.assign({}, existing[i], {
    hours: Number(row.querySelector('.s-hours').value)||0,
    completed: row.querySelector('.s-completed').checked,
    challenges: row.querySelector('.s-challenges').value
  }));
}

function renderSessions(){
  const tabsWrap = document.getElementById('dl-session-tabs');
  const editorWrap = document.getElementById('dl-session-editor');
  const sessions = dailyDraft.sessions;

  if(!sessions.length){
    tabsWrap.innerHTML = `<button type="button" class="session-tab-add" id="dl-add-session" title="Add study session">+</button>`;
    editorWrap.innerHTML = `<div class="empty">No sessions added — click "+" above to log what you studied.</div>`;
    document.getElementById('dl-add-session').onclick = ()=>{
      dailyDraft.sessions.push({label:'', format:null, topics:[{subject:'', topic:'', hours:1, completed:false, challenges:''}]});
      dailyActiveSessionIdx = 0;
      renderSessions();
    };
    updateDailyTotalHours();
    return;
  }

  if(dailyActiveSessionIdx >= sessions.length) dailyActiveSessionIdx = sessions.length-1;

  tabsWrap.innerHTML = sessions.map((session,i)=>{
    const topics = getSessionTopics(session);
    const hrs = topics.reduce((a,t)=>a+(Number(t.hours)||0),0);
    const subjectsCovered = [...new Set(topics.map(t=>t.subject).filter(Boolean))];
    const fallbackLabel = subjectsCovered.length>1 ? `${subjectsCovered.length} subjects`
      : (subjectsCovered[0] || (topics[0]&&topics[0].topic) || `Session ${i+1}`);
    const label = session.label || fallbackLabel;
    const timeRange = (session.startTime && session.endTime) ? ` · ${fmtTime12(session.startTime)}–${fmtTime12(session.endTime)}` : '';
    const anyCompleted = topics.some(t=>t.completed);
    return `<button type="button" class="session-tab ${i===dailyActiveSessionIdx?'active':''}" data-idx="${i}">
      ${anyCompleted?'<span class="st-dot"></span>':''}<span class="st-label">${label}${timeRange}</span><span class="st-hrs">${hrs?Number(hrs.toFixed(2)):0}h</span>
    </button>`;
  }).join('') + `<button type="button" class="session-tab-add" id="dl-add-session" title="Add another session">+</button>`;

  const session = sessions[dailyActiveSessionIdx];
  const topics = getSessionTopics(session);

  editorWrap.innerHTML = `
    <div class="session-row">
      <div class="sess-label-row">
        <input class="sess-label" type="text" placeholder="Name this session (optional) — e.g. Morning block, 9–12" value="${escAttr(session.label||'')}">
        <button class="session-remove-icon session-remove" type="button" title="Remove whole session">✕</button>
      </div>
      <div class="sess-format-row">
        <span class="sfr-label">Studied as</span>
        <button type="button" class="chip sess-format-chip ${session.format==='continuous'?'active':''}" data-format="continuous">One continuous stretch</button>
        <button type="button" class="chip sess-format-chip ${session.format==='broken'?'active':''}" data-format="broken">Broken up, with breaks</button>
      </div>
      <div class="grid grid-3" style="margin-top:10px;">
        <div class="field" style="margin-bottom:0;"><label>Start time</label>${timeInputHTML('sess-start-'+dailyActiveSessionIdx, session.startTime)}</div>
        <div class="field" style="margin-bottom:0;"><label>End time</label>${timeInputHTML('sess-end-'+dailyActiveSessionIdx, session.endTime)}</div>
        ${session.format==='broken' ? `<div class="field" style="margin-bottom:0;"><label>Break time (min)</label><input type="number" min="0" step="5" class="sess-break" value="${session.breakMin||0}"></div>` : ''}
      </div>
      <p class="small-muted session-hint">Tap a topic below to pick it straight from the syllabus — drill down to one precise sub-topic, or use a whole paper/section when that's all you covered.</p>
      <div class="topic-rows">
        ${topics.map((t,ti)=>{
          const crumb = topicEntryBreadcrumb(t);
          const leaf = t.leafId ? ALL_LEAVES.find(l=>l.id===t.leafId) : null;
          return `
          <div class="topic-row" data-ti="${ti}" style="--row-accent:${t.subject?colorForSubjectString(t.subject):'var(--seal)'};">
            <button type="button" class="topic-pick-btn ${crumb?'':'placeholder'}" title="Choose subject &amp; topic">
              <svg class="tpb-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <rect x="2" y="4" width="20" height="4" rx="2" opacity=".9"></rect>
                <rect x="5" y="10" width="14" height="4" rx="2" opacity=".6"></rect>
                <rect x="8" y="16" width="8" height="4" rx="2" opacity=".35"></rect>
              </svg>
              <span class="tpb-text">${crumb ? escAttr(crumb) : 'Choose subject & topic…'}</span>
              ${leaf?`<span class="tag imp-${leaf.importance}" style="flex:none;">${leaf.importance}</span>`:''}
              <span class="tpb-chevron">›</span>
            </button>
            <div class="trow-meta">
              <div class="hours-stepper" title="Hours spent">
                <button type="button" class="hs-dec" tabindex="-1">−</button>
                <input class="s-hours" type="number" step="0.25" min="0" value="${t.hours}">
                <button type="button" class="hs-inc" tabindex="-1">+</button>
              </div>
              <label class="done-toggle"><input class="s-completed" type="checkbox" ${t.completed?'checked':''}> Done</label>
              <button class="topic-remove" type="button" title="Remove this topic">✕</button>
            </div>
            <textarea class="s-challenges" placeholder="Doubts / challenges for this topic (optional)...">${escAttr(t.challenges||'')}</textarea>
          </div>`;
        }).join('') || `<div class="empty">No topics yet — click "+ Add topic" below.</div>`}
      </div>
      <button class="btn secondary small topic-add" type="button">+ Add topic</button>
    </div>
  `;
  editorWrap.querySelectorAll('.s-hours').forEach(inp=>inp.addEventListener('input', updateDailyTotalHours));
  const startInp = document.getElementById('sess-start-'+dailyActiveSessionIdx);
  const endInp = document.getElementById('sess-end-'+dailyActiveSessionIdx);
  if(startInp) startInp.addEventListener('change', ()=>{
    session.startTime = getTimeValue('sess-start-'+dailyActiveSessionIdx);
    renderSessions();
  });
  if(endInp) endInp.addEventListener('change', ()=>{
    session.endTime = getTimeValue('sess-end-'+dailyActiveSessionIdx);
    renderSessions();
  });
  const breakInp = editorWrap.querySelector('.sess-break');
  if(breakInp) breakInp.addEventListener('input', ()=>{ session.breakMin = Number(breakInp.value)||0; });
  editorWrap.querySelectorAll('.hs-dec').forEach(btn=>{
    btn.onclick = ()=> stepHours(btn.closest('.topic-row').querySelector('.s-hours'), -0.25);
  });
  editorWrap.querySelectorAll('.hs-inc').forEach(btn=>{
    btn.onclick = ()=> stepHours(btn.closest('.topic-row').querySelector('.s-hours'), 0.25);
  });
  editorWrap.querySelectorAll('.topic-pick-btn').forEach(btn=>{
    btn.onclick = ()=>{
      syncActiveSessionFromDOM();
      openTopicPicker(Number(btn.closest('.topic-row').dataset.ti));
    };
  });
  editorWrap.querySelectorAll('.sess-format-chip').forEach(btn=>{
    btn.onclick = ()=>{
      syncActiveSessionFromDOM();
      const s = dailyDraft.sessions[dailyActiveSessionIdx];
      s.format = (s.format === btn.dataset.format) ? null : btn.dataset.format;
      renderSessions();
    };
  });
  editorWrap.querySelector('.session-remove').onclick = ()=>{
    const hasContent = getSessionTopics(session).some(t=>t.subject || Number(t.hours)>0);
    if(hasContent && !confirm('Remove this whole session and everything logged in it?')) return;
    dailyDraft.sessions.splice(dailyActiveSessionIdx,1);
    if(dailyActiveSessionIdx>0) dailyActiveSessionIdx--;
    renderSessions();
  };
  const topicAddBtn = editorWrap.querySelector('.topic-add');
  if(topicAddBtn) topicAddBtn.onclick = ()=>{
    syncActiveSessionFromDOM();
    const s = dailyDraft.sessions[dailyActiveSessionIdx];
    s.topics = getSessionTopics(s);
    s.topics.push({subject:'', topic:'', hours:1, completed:false, challenges:''});
    renderSessions();
  };
  editorWrap.querySelectorAll('.topic-remove').forEach(btn=>{
    btn.onclick = ()=>{
      syncActiveSessionFromDOM();
      const ti = Number(btn.closest('.topic-row').dataset.ti);
      const s = dailyDraft.sessions[dailyActiveSessionIdx];
      s.topics.splice(ti,1);
      renderSessions();
    };
  });

  tabsWrap.querySelectorAll('.session-tab[data-idx]').forEach(btn=>{
    btn.onclick = ()=>{
      syncActiveSessionFromDOM();
      dailyActiveSessionIdx = Number(btn.dataset.idx);
      renderSessions();
    };
  });
  document.getElementById('dl-add-session').onclick = ()=>{
    syncActiveSessionFromDOM();
    dailyDraft.sessions.push({label:'', format:null, topics:[{subject:'', topic:'', hours:1, completed:false, challenges:''}]});
    dailyActiveSessionIdx = dailyDraft.sessions.length-1;
    renderSessions();
  };
  updateDailyTotalHours();
}
function updateDailyTotalHours(){
  syncActiveSessionFromDOM();
  const total = flattenTopicEntries(dailyDraft.sessions).reduce((a,t)=>a+(Number(t.hours)||0),0);
  const box = document.getElementById('dl-total-hours');
  if(box) box.textContent = `Total logged today: ${total.toFixed(2)} hrs`;
  updateTodayChart();
}
function stepHours(input, delta){
  if(!input) return;
  let v = (Number(input.value)||0) + delta;
  v = Math.max(0, Math.round(v*100)/100);
  input.value = v;
  input.dispatchEvent(new Event('input',{bubbles:true}));
}

// ---- Topic Picker modal ----
// Opened from a topic row's picker button. A compact, modal version of the
// Planner's scope picker (same search + exam-tabs/papers → sections → topics
// → sub-topics drill-down, same visual language) so logging a study session
// against one exact sub-topic is a browse, not a scroll through a giant
// <select> or a hopeful guess at a native datalist suggestion.
let topicPicker = { ti:null, nav:{exam:null,paperId:null,sectionId:null,topicId:null}, query:'', specialDraft:null };

function ensureTopicPickerModal(){
  let el = document.getElementById('topic-picker-backdrop');
  if(el) return el;
  el = document.createElement('div');
  el.id = 'topic-picker-backdrop';
  el.className = 'tp-modal-backdrop';
  document.body.appendChild(el);
  el.addEventListener('click', (e)=>{ if(e.target===el) closeTopicPicker(); });
  document.addEventListener('keydown', (e)=>{
    if(e.key==='Escape' && el.classList.contains('open')) closeTopicPicker();
  });
  return el;
}
function openTopicPicker(ti){
  const session = dailyDraft.sessions[dailyActiveSessionIdx];
  if(!session) return;
  const entry = getSessionTopics(session)[ti];
  topicPicker = { ti, nav: initialNavForEntry(entry), query:'', specialDraft:null };
  ensureTopicPickerModal();
  renderTopicPickerModal();
  document.getElementById('topic-picker-backdrop').classList.add('open');
  document.body.classList.add('tp-modal-open');
}
function closeTopicPicker(){
  const el = document.getElementById('topic-picker-backdrop');
  if(el) el.classList.remove('open');
  document.body.classList.remove('tp-modal-open');
  topicPicker.ti = null;
}
function renderTopicPickerModal(){
  const modal = ensureTopicPickerModal();
  const session = dailyDraft.sessions[dailyActiveSessionIdx];
  const entry = (session ? getSessionTopics(session)[topicPicker.ti] : null) || {};
  modal.innerHTML = `
    <div class="tp-modal-card" role="dialog" aria-modal="true" aria-label="Choose subject and topic">
      <div class="tp-modal-head">
        <h3>Choose subject &amp; topic</h3>
        <button type="button" class="tp-modal-close" id="tpm-close" aria-label="Close">✕</button>
      </div>
      <div class="tp-modal-body">
        ${topicPicker.specialDraft ? renderSpecialDraftForm() : `
          <div class="tp-quickrow">
            ${Object.keys(SPECIAL_SUBJECT_LABELS).map(key=>
              `<button type="button" class="tp-chip ${entry.subject===key?'active':''}" data-special="${key}">${SPECIAL_SUBJECT_LABELS[key]}</button>`
            ).join('')}
          </div>
          <div class="scope-search-wrap">
            <input type="text" id="tpm-search" placeholder="Search e.g. Panchayati Raj, GS Paper I, Ethics…" autocomplete="off" value="${escAttr(topicPicker.query)}">
            <div id="tpm-search-results"></div>
          </div>
          <div id="tpm-browse"></div>
        `}
      </div>
    </div>
  `;
  document.getElementById('tpm-close').onclick = closeTopicPicker;
  if(topicPicker.specialDraft){
    wireSpecialDraftForm();
    return;
  }
  modal.querySelectorAll('[data-special]').forEach(btn=>{
    btn.onclick = ()=>{
      const key = btn.dataset.special;
      topicPicker.specialDraft = { subject: key, text: entry.subject===key ? (entry.topic||'') : '' };
      renderTopicPickerModal();
    };
  });
  const searchInput = document.getElementById('tpm-search');
  searchInput.oninput = ()=>{ topicPicker.query = searchInput.value.trim(); renderTopicPickerSearch(); };
  renderTopicPickerSearch();
}
function renderSpecialDraftForm(){
  const d = topicPicker.specialDraft;
  return `
    <div class="tp-special-form">
      <div class="tsf-label">Logging under <strong>${SPECIAL_SUBJECT_LABELS[d.subject]}</strong> — add detail if you like:</div>
      <input type="text" id="tpm-special-text" placeholder="${d.subject==='Other'?'e.g. Newspaper analysis, mock interview…':'e.g. Went over Mughal architecture notes'}" value="${escAttr(d.text)}">
      <div class="tsf-actions">
        <button type="button" class="btn secondary small" id="tpm-special-cancel">← Back</button>
        <button type="button" class="btn seal small" id="tpm-special-save">Use this</button>
      </div>
    </div>
  `;
}
function wireSpecialDraftForm(){
  const input = document.getElementById('tpm-special-text');
  input.oninput = ()=>{ topicPicker.specialDraft.text = input.value; };
  document.getElementById('tpm-special-cancel').onclick = ()=>{ topicPicker.specialDraft = null; renderTopicPickerModal(); };
  document.getElementById('tpm-special-save').onclick = ()=>{
    commitTopicPick(buildSpecialPickPayload(topicPicker.specialDraft.subject, topicPicker.specialDraft.text.trim()));
  };
}
// Toggles between the search-results view and the normal browse view,
// depending on whether there's an active query — mirrors the Planner's
// renderScopeSearch exactly, just targeting the modal's ids.
function renderTopicPickerSearch(){
  const resultsBox = document.getElementById('tpm-search-results');
  const browseBox = document.getElementById('tpm-browse');
  if(!resultsBox || !browseBox) return;
  const q = topicPicker.query;
  if(q.length < 2){
    resultsBox.innerHTML = '';
    browseBox.style.display = '';
    renderTopicPickerBrowse();
    return;
  }
  browseBox.style.display = 'none';
  const ql = q.toLowerCase();
  const results = [];
  SYLLABUS.forEach(p=>{
    if(p.title.toLowerCase().includes(ql)){
      results.push({paperId:p.id, sectionId:null, topicId:null, leafId:null, label:p.title, path:EXAM_LABELS[p.exam]});
    }
    p.sections.forEach(sec=>{
      if(sec.name.toLowerCase().includes(ql)){
        results.push({paperId:p.id, sectionId:sec.id, topicId:null, leafId:null, label:sec.name, path:p.title});
      }
      sec.topics.forEach(top=>{
        if(top.name.toLowerCase().includes(ql)){
          results.push({paperId:p.id, sectionId:sec.id, topicId:top.id, leafId:null, label:top.name, path:`${p.title} → ${sec.name}`});
        }
      });
    });
  });
  ALL_LEAVES.forEach(l=>{
    if(l.name.toLowerCase().includes(ql)){
      results.push({paperId:l.paperId, sectionId:l.sectionId, topicId:l.topicId, leafId:l.id, label:l.name, path:`${l.paperTitle} → ${l.sectionName} → ${l.topicName}`});
    }
  });
  const capped = results.slice(0,40);
  if(!capped.length){
    resultsBox.innerHTML = `<div class="search-item empty-hit">No matches for "${escAttr(q)}"</div>`;
    return;
  }
  resultsBox.innerHTML = capped.map((r,i)=>`
    <button type="button" class="search-item" data-idx="${i}">
      <div class="si-name">${escAttr(r.label)}</div>
      <div class="si-path">${escAttr(r.path)}</div>
    </button>`).join('');
  resultsBox.querySelectorAll('.search-item[data-idx]').forEach(btn=>{
    btn.onclick = ()=>{
      const r = capped[Number(btn.dataset.idx)];
      commitTopicPick(buildTopicPickPayload(r));
    };
  });
}
// Breadcrumb trail above the browse list — each earlier segment jumps back to
// that level directly (more direct than a single "← Back" button once you're
// four levels deep).
function tpCrumbTrail(paper, section, topic){
  let html = `<div class="tp-crumbtrail"><button type="button" class="tp-crumb-btn" data-tp-jump="root">All papers</button><span class="tp-crumb-sep">›</span>`;
  if(section){
    html += `<button type="button" class="tp-crumb-btn" data-tp-jump="paper">${escAttr(paper.title)}</button><span class="tp-crumb-sep">›</span>`;
  } else {
    html += `<span class="tp-crumb-current">${escAttr(paper.title)}</span>`;
  }
  if(section){
    if(topic){
      html += `<button type="button" class="tp-crumb-btn" data-tp-jump="section">${escAttr(section.name)}</button><span class="tp-crumb-sep">›</span><span class="tp-crumb-current">${escAttr(topic.name)}</span>`;
    } else {
      html += `<span class="tp-crumb-current">${escAttr(section.name)}</span>`;
    }
  }
  html += `</div>`;
  return html;
}
function renderTopicPickerBrowse(){
  const box = document.getElementById('tpm-browse');

  const ACCENTS = [
    {c:'var(--seal)', d:'var(--seal-dim)'},

    {c:'var(--gold)', d:'var(--gold-dim)'},

    inner = `${tpCrumbTrail(p,null,null)}<div class="tile-grid compact">${tiles}</div>`;
  } else if(!nav.topicId){
    const p = SYLLABUS.find(x=>x.id===nav.paperId);

    const rows = sec.topics.map((top,i)=>`
      <div class="scope-row" style="${accentStyle(i)}">

  } else {

    const sec = p.sections.find(x=>x.id===nav.sectionId);
    const top = sec.topics.find(x=>x.id===nav.topicId);
    const rows = top.subs.map((sub,i)=>{
      const leafId = `${p.id}__${sec.id}__${top.id}__${i}`;

      return `<div class="scope-row" style="${accentStyle(i)}">

          <div class="scope-row-meta"><span class="tag imp-${sub.importance}">${sub.importance}</span>${sub.pyq!=='none'?` <span class="tag pyq">PYQ ${sub.pyq}</span>`:''}</div>

    }).join('');

}
function wireTopicPickerBrowse(){
