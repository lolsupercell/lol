function commitTopicPick(payload){
  if(!payload) return;
  const session = dailyDraft.sessions[dailyActiveSessionIdx];
  if(!session) return;
  const topics = getSessionTopics(session);
  const entry = topics[topicPicker.ti];
  if(!entry){ closeTopicPicker(); return; }
  Object.assign(entry, payload);
  session.topics = topics;
  closeTopicPicker();
  renderSessions();
  toast('Topic set: '+topicEntryBreadcrumb(entry));
}

// Free-form journal of anything done today outside the syllabus — a run, the
// gym, reading, chores. All rows sit in the DOM together (unlike the tabbed
// study sessions above) since entries here are short and quick to scan.
function minutesBetweenClock(start, end){
  if(!start || !end) return null;
  const [sh,sm] = start.split(':').map(Number), [eh,em] = end.split(':').map(Number);
  let diff = (eh*60+em) - (sh*60+sm);
  if(diff < 0) diff += 24*60; // crosses midnight
  return diff;
}
function renderActivities(){
  const wrap = document.getElementById('dl-activities');
  if(!dailyDraft.activities) dailyDraft.activities = [];
  if(!dailyDraft.activities.length){
    wrap.innerHTML = `<div class="empty">No activities logged yet — click "+ Add activity" below.</div>`;
    updateActivityTotal();
    return;
  }
  wrap.innerHTML = dailyDraft.activities.map((a,i)=>`
    <div class="activity-row" data-idx="${i}">
      <input class="a-name" type="text" list="activity-suggestions" placeholder="e.g. Morning run" value="${a.name||''}" style="flex:2;min-width:130px;">
      <div class="act-time-field" style="width:152px;">${timeInputHTML('act-start-'+i, a.start)}</div>
      <span class="small-muted" style="flex:none;">to</span>
      <div class="act-time-field" style="width:152px;">${timeInputHTML('act-end-'+i, a.end)}</div>
      <input class="a-minutes" type="number" min="0" step="5" value="${a.minutes||0}" style="width:58px;text-align:center;" title="minutes (auto-filled from start/end, or set directly)">
      <span class="small-muted" style="flex:none;">min</span>
      <input class="a-notes" type="text" placeholder="notes (optional)" value="${a.notes||''}" style="flex:2;min-width:120px;">
      <button class="btn secondary small a-remove" type="button">✕</button>
    </div>
  `).join('');
  wrap.querySelectorAll('.activity-row').forEach((row,i)=>{
    const startEl = document.getElementById('act-start-'+i), endEl = document.getElementById('act-end-'+i), minEl = row.querySelector('.a-minutes');
    const recompute = ()=>{
      const m = minutesBetweenClock(getTimeValue('act-start-'+i), getTimeValue('act-end-'+i));
      if(m!==null) minEl.value = m;
      updateActivityTotal();
    };
    if(startEl) startEl.addEventListener('change', recompute);
    if(endEl) endEl.addEventListener('change', recompute);
    minEl.addEventListener('input', updateActivityTotal);
    const nameEl = row.querySelector('.a-name');
    if(nameEl) nameEl.addEventListener('input', updateActivityTotal);
    row.querySelector('.a-remove').onclick = ()=>{ dailyDraft.activities.splice(i,1); renderActivities(); };
  });
  updateActivityTotal();
}
function updateActivityTotal(){
  const total = Array.from(document.querySelectorAll('.activity-row')).reduce((sum,row)=>{
    const nameEl = row.querySelector('.a-name'), minEl = row.querySelector('.a-minutes');
    if(!nameEl || !minEl || !nameEl.value.trim()) return sum;
    return sum + (Number(minEl.value)||0);
  }, 0);
  const box = document.getElementById('dl-activity-total');
  if(box) box.textContent = total ? `Total logged: ${(total/60).toFixed(1)} hrs (${total} min)` : '';
  updateTodayChart();
}

// Mundane / routine tasks — each carries its own start & end time. Ideal times
// live in Settings; here they're pre-filled but freely editable for today only.
function renderMundaneRows(){
  const wrap = document.getElementById('dl-mundane');
  if(!wrap) return;
  const s = STATE.settings;
  if(!s.mundaneTasks.length){
    wrap.innerHTML = `<div class="empty">No routine tasks yet — add some in Settings.</div>`;
    return;
  }
  wrap.innerHTML = s.mundaneTasks.map((t,i)=>{
    const entry = dailyDraft.mundane[t.name] || {done:false, start:t.start, end:t.end};
    return `<div class="mundane-row" data-task="${t.name}">
      <label class="mr-check"><input type="checkbox" class="mr-done" data-idx="${i}" ${entry.done?'checked':''}><span>${t.name}</span></label>
      <div class="mr-times">
        ${timeInputHTML('mun-start-'+i, entry.start)}
        <span class="small-muted">to</span>
        ${timeInputHTML('mun-end-'+i, entry.end)}
      </div>
      <span class="mr-dur mono small-muted" id="mun-dur-${i}">${fmtMinutesShort(minutesBetweenClock(entry.start,entry.end)||0)}</span>
    </div>`;
  }).join('');
  s.mundaneTasks.forEach((t,i)=>{
    const doneEl = wrap.querySelector(`.mr-done[data-idx="${i}"]`);
    const startEl = document.getElementById('mun-start-'+i), endEl = document.getElementById('mun-end-'+i);
    const durEl = document.getElementById('mun-dur-'+i);
    const sync = ()=>{
      dailyDraft.mundane[t.name] = {
        done: doneEl.checked,
        start: getTimeValue('mun-start-'+i) || t.start,
        end: getTimeValue('mun-end-'+i) || t.end
      };
      if(durEl) durEl.textContent = fmtMinutesShort(minutesBetweenClock(dailyDraft.mundane[t.name].start, dailyDraft.mundane[t.name].end)||0);
      updateTodayChart();

    doneEl.addEventListener('change', sync);
    startEl.addEventListener('change', sync);
    endEl.addEventListener('change', sync);

// Builds a live snapshot (including unsaved DOM edits) for the "Today's Time
// Breakdown" chart, without waiting for the Save button.
function snapshotDailyDraftForChart(){
  syncActiveSessionFromDOM();
  const durEl = document.getElementById('dl-workout-dur');
  const activities = Array.from(document.querySelectorAll('.activity-row')).map(row=>({
    name: row.querySelector('.a-name').value,
    minutes: Number(row.querySelector('.a-minutes').value)||0
  }));
  return Object.assign({}, dailyDraft, {
    wake: getTimeValue('dl-wake') || dailyDraft.wake,
    sleep: getTimeValue('dl-sleep') || dailyDraft.sleep,
    workoutDuration: durEl ? Number(durEl.value)||0 : dailyDraft.workoutDuration,
    activities
  });
}
function updateTodayChart(){
  const box = document.getElementById('dl-today-chart');
  if(!box) return;
  const draft = snapshotDailyDraftForChart();
  const hasRealData =
    flattenTopicEntries(draft.sessions).some(ss=>(Number(ss.hours)||0)>0) ||
    (draft.activities||[]).some(a=>a.name && (Number(a.minutes)||0)>0) ||
    (Number(draft.workoutDuration)||0)>0 ||
    Object.values(draft.mundane||{}).some(m=>m && m.done);
  if(!hasRealData){
    box.innerHTML = `<div class="empty">Nothing logged yet today — add a study session, activity, or tick off a routine task to see the breakdown.</div>`;
    return;
  }
  const buckets = buildTimeBuckets([draft]);
  renderTimeBreakdown(box, buckets, dailyChartState);
}

<script>
/* ================= TIME BREAKDOWN ENGINE — pie/donut charts, no deps, no network ================= */
function hoursBetweenClock(wake, sleep){
  if(!wake || !sleep) return null;
  const [wh,wm] = wake.split(':').map(Number), [sh,sm] = sleep.split(':').map(Number);
  let diff = (sh*60+sm) - (wh*60+wm);
  if(diff < 0) diff += 24*60;
  return diff/60;
}
const CHART_PALETTE = ['#0A84FF','#30B05C','#FF9F0A','#FF6961','#5E5CE6','#64D2FF','#BF5AF2','#32ADE6','#FFD60A','#AC8E68','#66D4CF','#8E8E93'];
function colorForIndex(i){ return CHART_PALETTE[i % CHART_PALETTE.length]; }
function fmtMinutesShort(min){
  const h = Math.floor(min/60), m = Math.round(min%60);
  if(h && m) return `${h}h ${m}m`;
  if(h) return `${h}h`;
  return `${m}m`;
}

// Builds category buckets (in minutes) from an array of daily-log objects,
// plus subject→minutes and subject→topic→minutes maps for the Study drill-down.
function buildTimeBuckets(logs){
  let sleepMin=0, workoutMin=0, studyMin=0, unaccountedMin=0;
  const activityMin = {};
  const mundaneMin = {};
  const subjectMin = {};
  const subjectTopicMin = {};
  logs.forEach(l=>{
    if(!l) return;
    const awakeHrs = hoursBetweenClock(l.wake, l.sleep);
    const awakeMin = awakeHrs!==null ? awakeHrs*60 : 16*60;
    if(awakeHrs!==null) sleepMin += Math.max(0, 24 - awakeHrs)*60;
    const wMin = Number(l.workoutDuration)||0;
    workoutMin += wMin;
    let dayStudyMin = 0;
    flattenTopicEntries(l.sessions).forEach(ss=>{
      const m = (Number(ss.hours)||0)*60;
      dayStudyMin += m;
      const subj = ss.subject || 'Unlabeled';
      const top = (ss.topic||'').trim() || 'General / unspecified';
      subjectMin[subj] = (subjectMin[subj]||0)+m;
      subjectTopicMin[subj] = subjectTopicMin[subj] || {};
      subjectTopicMin[subj][top] = (subjectTopicMin[subj][top]||0)+m;
    });
    studyMin += dayStudyMin;
    let dayActivityMin = 0;
    (l.activities||[]).forEach(a=>{
      if(!a.name) return;
      const m = Number(a.minutes)||0;
      dayActivityMin += m;
      activityMin[a.name] = (activityMin[a.name]||0)+m;
    });
    // Mundane / routine tasks (meals, commute, etc.) — each has its own start/end
    // time for the day, so they get their own slice in the pie chart too.
    let dayMundaneMin = 0;
    Object.entries(l.mundane||{}).forEach(([name,entry])=>{
      if(!entry || typeof entry!=='object' || !entry.done) return;
      const m = minutesBetweenClock(entry.start, entry.end);
      if(m===null) return;
      dayMundaneMin += m;
      mundaneMin[name] = (mundaneMin[name]||0)+m;
    });
    unaccountedMin += Math.max(0, awakeMin - wMin - dayStudyMin - dayActivityMin - dayMundaneMin);
  });
  return {sleepMin, workoutMin, studyMin, activityMin, mundaneMin, subjectMin, subjectTopicMin, unaccountedMin};
}

// Pure-SVG donut chart. data: [{label, value, color}]. No external chart lib, no network.
function donutChartSVG(data, size){
  size = size || 200;
  const total = data.reduce((a,d)=>a+d.value,0) || 1;
  const r = size/2 - 4, cx = size/2, cy = size/2, rInner = r*0.56;
  let angle = -Math.PI/2;
  let paths = '';
  data.forEach((d,i)=>{
    const frac = d.value/total;
    if(frac<=0) return;
    const a0=angle, a1=angle+frac*Math.PI*2 - (data.length>1?0.012:0);
    angle += frac*Math.PI*2;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const xi0=cx+rInner*Math.cos(a1), yi0=cy+rInner*Math.sin(a1);
    const xi1=cx+rInner*Math.cos(a0), yi1=cy+rInner*Math.sin(a0);
    const large = frac>0.5?1:0;
    const path = `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} L ${xi0.toFixed(2)} ${yi0.toFixed(2)} A ${rInner} ${rInner} 0 ${large} 0 ${xi1.toFixed(2)} ${yi1.toFixed(2)} Z`;
    paths += `<path d="${path}" fill="${d.color}" data-slice="${i}" class="pie-slice"><title>${d.label}: ${fmtMinutesShort(d.value)} (${Math.round(frac*100)}%)</title></path>`;
  });
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="flex:none;">${paths}</svg>`;
}

// Renders an interactive donut + legend into containerEl, with drill-down into
// Study → subject → topic. state = {level:0|1|2, subject:null}. onChange is called
// after a click so the caller can decide whether to re-render (e.g. for persistence).
function renderTimeBreakdown(containerEl, buckets, state){
  let slices, title, backLevel = null;
  if(state.level===0){
    title = 'Full Day — where the hours go';
    slices = [
      {label:'Sleep', value:buckets.sleepMin, color:'#5E5CE6'},
      {label:'Study', value:buckets.studyMin, color:'#0A84FF', drill:true},
      {label:'Workout', value:buckets.workoutMin, color:'#30B05C'},
    ];
    let ci = 3;
    Object.entries(buckets.mundaneMin).sort((a,b)=>b[1]-a[1]).forEach(([name,min])=>{
      slices.push({label:name, value:min, color:colorForIndex(ci++)});
    });
    Object.entries(buckets.activityMin).sort((a,b)=>b[1]-a[1]).forEach(([name,min])=>{
      slices.push({label:name, value:min, color:colorForIndex(ci++)});
    });
    slices.push({label:'Unaccounted / free time', value:buckets.unaccountedMin, color:'#E5E5EA'});
  } else if(state.level===1){
    title = 'Study — by subject';
    backLevel = 0;
    let ci=0;
    slices = Object.entries(buckets.subjectMin).sort((a,b)=>b[1]-a[1]).map(([name,min])=>({label:name, value:min, color:colorForIndex(ci++), drill:true, key:name}));
  } else {
    title = `${state.subject} — by topic`;
    backLevel = 1;
    let ci=0;
    const topics = (buckets.subjectTopicMin[state.subject]) || {};
    slices = Object.entries(topics).sort((a,b)=>b[1]-a[1]).map(([name,min])=>({label:name, value:min, color:colorForIndex(ci++)}));
  }
  slices = slices.filter(s=>s.value>0.4);
  const total = slices.reduce((a,s)=>a+s.value,0);

  if(!slices.length){
    containerEl.innerHTML = `<div class="empty">Nothing logged for this period yet.</div>`;
    return;
  }

  containerEl.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px;">
      <div style="display:flex;align-items:center;gap:8px;">
        ${backLevel!==null ? `<button class="btn secondary small tb-back">← Back</button>` : ''}
        <strong style="font-size:13.5px;">${title}</strong>
      </div>
      <span class="small-muted mono">${fmtMinutesShort(total)} total</span>
    </div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center;">
      ${donutChartSVG(slices, 190)}
      <div class="tb-legend" style="flex:1;min-width:180px;">
        ${slices.map((s,i)=>`<div class="tb-legend-row ${s.drill?'clickable':''}" data-slice="${i}">
          <span class="tb-swatch" style="background:${s.color};"></span>
          <span class="tb-label">${s.label}</span>
          <span class="tb-val mono">${fmtMinutesShort(s.value)} · ${Math.round(s.value/total*100)}%</span>
          ${s.drill?'<span class="tb-arrow">›</span>':''}
        </div>`).join('')}
      </div>
    </div>`;

  const clickSlice = (idx)=>{
    const s = slices[idx];
    if(!s || !s.drill) return;
    if(state.level===0){ state.level=1; }
    else if(state.level===1){ state.level=2; state.subject=s.key; }
    renderTimeBreakdown(containerEl, buckets, state);
  };
  containerEl.querySelectorAll('.pie-slice[data-slice]').forEach(el=>{
    el.onclick = ()=>clickSlice(Number(el.dataset.slice));
  });
  containerEl.querySelectorAll('.tb-legend-row[data-slice]').forEach(el=>{
    el.onclick = ()=>clickSlice(Number(el.dataset.slice));
  });
  const backBtn = containerEl.querySelector('.tb-back');
  if(backBtn) backBtn.onclick = ()=>{ state.level = backLevel; renderTimeBreakdown(containerEl, buckets, state); };
}
</script>

<script>
/* ================= ANALYSIS PAGE — multi-dimensional ================= */
function roundToQuarterHour(hhmm){
  if(!hhmm) return null;
  const [h,m] = hhmm.split(':').map(Number);
  const totalMin = h*60+m;
  const rounded = Math.round(totalMin/15)*15;
  const rh = Math.floor(rounded/60)%24, rm = rounded%60;
  return String(rh).padStart(2,'0')+':'+String(rm).padStart(2,'0');
}
function avgTimeOfDay(arr){
  if(!arr.length) return '—';
  const totalMin = arr.reduce((a,t)=>{const [h,m]=t.split(':').map(Number); return a+h*60+m;},0)/arr.length;
  const h = Math.floor(totalMin/60)%24, m = Math.round(totalMin%60);
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
async function detectRoutineSuggestion(logs){
  const recent = logs.slice(-14).filter(l=>l.wake || l.sleep);
  if(recent.length < 6) return null;
  const s = STATE.settings;
  function mostCommon(field, dismissKey, settingKey, label){
    const counts = {};
    recent.forEach(l=>{ const v = roundToQuarterHour(l[field]); if(v){ counts[v]=(counts[v]||0)+1; } });
    const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
    if(!entries.length) return null;
    const [val, count] = entries[0];
    const sampleSize = recent.filter(l=>l[field]).length;
    if(sampleSize>=6 && count/sampleSize >= 0.65 && val !== s[settingKey]){
      return { text:`You've logged ${label} around ${val} on ${count} of your last ${sampleSize} entries. Set this as your default ${label} time?`, settingKey, dismissKey, value:val };
    }
    return null;
  }
  return mostCommon('wake','wakeSuggestionDismissed','defaultWake','wake-up') ||
         mostCommon('sleep','sleepSuggestionDismissed','defaultSleep','sleep');
}
async function applyRoutineSuggestion(suggestion){
  STATE.settings[suggestion.settingKey] = suggestion.value;
  STATE.settings.wakeSuggestionDismissed = false;
  STATE.settings.sleepSuggestionDismissed = false;
  await saveSettings();
}
async function maybeUpdateRoutineSuggestion(){ /* suggestion is recomputed fresh each Analysis render — nothing to persist here */ }

function computeSubjectStats(logs, totalDaysTracked){
  const hoursBySubject = {};
  logs.forEach(l=>flattenTopicEntries(l.sessions).forEach(ss=>{
    if(!ss.subject) return;
    hoursBySubject[ss.subject] = (hoursBySubject[ss.subject]||0) + (Number(ss.hours)||0);
  }));
  return SYLLABUS.map(paper=>{
    const leaves = leavesForPaper(paper.id);
    const doneLeaves = leaves.filter(l=>leafDone(l.id)).length;
    const pct = leaves.length? Math.round(doneLeaves/leaves.length*100):0;
    const hours = hoursBySubject[paper.title]||0;
    const pace = doneLeaves>0 ? hours/doneLeaves : null;
    const remaining = leaves.length - doneLeaves;
    const dailyRateItems = totalDaysTracked>0 ? doneLeaves/totalDaysTracked : 0;
    const projectedDays = dailyRateItems>0 ? Math.ceil(remaining/dailyRateItems) : null;
    return {paper, leaves, doneLeaves, pct, hours, pace, remaining, projectedDays};
  });
}
function computeExamStats(subjectStats){
  return Object.keys(EXAM_LABELS).map(ex=>{
    const rows = subjectStats.filter(r=>r.paper.exam===ex);
    const totalLeaves = rows.reduce((a,r)=>a+r.leaves.length,0);
    const done = rows.reduce((a,r)=>a+r.doneLeaves,0);
    const hours = rows.reduce((a,r)=>a+r.hours,0);
    return {exam:ex, pct: totalLeaves?Math.round(done/totalLeaves*100):0, hours, done, totalLeaves};
  });
}
function computeGapDays(logsByDate, windowDays){
  let gaps=0;
  for(let i=0;i<windowDays;i++){
    const d = new Date(todayStr()+'T00:00:00'); d.setDate(d.getDate()-i);
    const iso = d.toISOString().slice(0,10);
    const l = logsByDate[iso];
    if(!l || !flattenTopicEntries(l.sessions).some(x=>Number(x.hours)>0)) gaps++;
  }
  return gaps;
}

async function renderAnalysisPage(){
  const el = document.getElementById('page-analysis');
  const s = STATE.settings;
  const logs = await getAllDailyLogs();
  const logsByDate = {}; logs.forEach(l=>logsByDate[l.date]=l);
  const totalDaysTracked = logs.length;
  const totalHrs = totalHoursLogged(logs);
  const avgHrsPerLoggedDay = totalDaysTracked? totalHrs/totalDaysTracked : 0;
  const calendarDaysSinceStart = Math.max(1, daysBetween(s.trackingStart, todayStr())+1);
  const avgHrsPerCalendarDay = totalHrs/calendarDaysSinceStart;

  const overallPct = pctOf(ALL_LEAVES.map(l=>l.id));
  const totalPrepDays = daysBetween(s.trackingStart, s.revisionStart);
  const elapsedPrepDays = clamp(daysBetween(s.trackingStart, todayStr()), 0, totalPrepDays>0?totalPrepDays:9999);
  const expectedPct = totalPrepDays>0 ? Math.min(100, Math.round((elapsedPrepDays/totalPrepDays)*100)) : 0;
  const paceDelta = overallPct - expectedPct;

  const subjectStats = computeSubjectStats(logs, totalDaysTracked);
  const examStats = computeExamStats(subjectStats);
  const validPaces = subjectStats.filter(r=>r.pace!==null).map(r=>r.pace);
  const medianPace = validPaces.length? [...validPaces].sort((a,b)=>a-b)[Math.floor(validPaces.length/2)] : 0;

  const wakeTimes = logs.filter(l=>l.wake).map(l=>l.wake);
  const sleepTimes = logs.filter(l=>l.sleep).map(l=>l.sleep);
  const workoutDays = logs.filter(l=>l.workoutDone).length;
  const gap14 = computeGapDays(logsByDate, 14);

  const testLogs = logs.filter(l=>l.testTaken);
  const suggestion = await detectRoutineSuggestion(logs);

  // Flags: where time is being lost
  const flags = [];
  if(gap14>=5) flags.push({type:'warn', text:`${gap14} of the last 14 days have no logged study hours at all — that's the single biggest source of lost time right now.`});
  const neglected = subjectStats.filter(r=>r.hours===0 && r.pct<20).sort((a,b)=>a.pct-b.pct).slice(0,3);
  if(neglected.length) flags.push({type:'warn', text:`No hours logged yet against: ${neglected.map(r=>r.paper.title).join(', ')}.`});
  const inefficient = subjectStats.filter(r=>r.pace!==null && medianPace>0 && r.pace > medianPace*1.6);
  if(inefficient.length) flags.push({type:'warn', text:`Taking noticeably longer per sub-topic than your median pace (${medianPace.toFixed(2)} hrs/item) in: ${inefficient.map(r=>r.paper.title).join(', ')} — consider whether these sessions are drifting off-topic.`});
  if(workoutDays && totalDaysTracked && workoutDays/totalDaysTracked < 0.4) flags.push({type:'warn', text:`Workout consistency is low (${Math.round(workoutDays/totalDaysTracked*100)}% of logged days) — fatigue compounds over a 2-year prep.`});
  if(paceDelta>=0) flags.push({type:'good', text: paceDelta>10 ? `Running ${paceDelta} points ahead of the foundation-phase pace — a real buffer for revision.` : `Coverage is on pace with the calendar.`});
  else flags.push({type:'warn', text:`Coverage is trailing the expected foundation-phase pace by ${Math.abs(paceDelta)} points.`});
  if(!flags.length) flags.push({type:'good', text:'No major issues detected — keep the current rhythm.'});

  el.innerHTML = `
    <div class="pagehead">
      <div class="eyebrow">07 · Insight</div>
      <h2>Analysis</h2>
      <p>Multi-dimensional read of pace, hours, and routine — not just what's ticked off, but how efficiently you're covering it.</p>
    </div>

    ${suggestion ? `<div class="banner"><p>${suggestion.text}</p><button id="an-apply-suggestion">Apply</button></div>` : ''}

    <div class="card">
      <h3>Time Breakdown</h3>
      <p class="small-muted" style="margin-bottom:10px;">Where your logged hours actually went — sleep, workout, activities and study. Click "Study" to drill into subjects, then topics.</p>
      <div class="tb-tabs">
        <button class="chip ${analysisPeriod==='day'?'active':''}" data-period="day">Today</button>
        <button class="chip ${analysisPeriod==='week'?'active':''}" data-period="week">This Week</button>
        <button class="chip ${analysisPeriod==='month'?'active':''}" data-period="month">This Month</button>
        <button class="chip ${analysisPeriod==='all'?'active':''}" data-period="all">All Time</button>
        <button class="chip ${analysisPeriod==='custom'?'active':''}" data-period="custom">Custom Range</button>
      </div>
      <div id="an-custom-range" style="${analysisPeriod==='custom'?'':'display:none;'}margin-bottom:14px;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
        <div class="field" style="margin:0;max-width:180px;"><label>From</label>${dateInputHTML('an-range-from', analysisRange.from)}</div>
        <div class="field" style="margin:0;max-width:180px;"><label>To</label>${dateInputHTML('an-range-to', analysisRange.to)}</div>
        <button class="btn seal small" id="an-range-apply">Show breakdown</button>
      </div>
      <div id="an-tb-chart"></div>
    </div>

    <div class="grid grid-4">
      <div class="stat"><div class="label">Syllabus Progress</div><div class="value">${overallPct}%</div>
        <div class="small-muted">expected ~${expectedPct}% by today (foundation phase)</div></div>
      <div class="stat"><div class="label">Pace vs Plan</div><div class="value ${paceDelta>=0?'up':'down'}">${paceDelta>=0?'+':''}${paceDelta}%</div>
        <div class="small-muted">${paceDelta>=0?'ahead of / on pace':'behind expected pace'}</div></div>
      <div class="stat"><div class="label">Total Hours / Days</div><div class="value" style="font-size:20px;">${totalHrs.toFixed(0)} hrs / ${totalDaysTracked} d</div>
        <div class="small-muted">${avgHrsPerLoggedDay.toFixed(1)} hrs avg per logged day</div></div>
      <div class="stat"><div class="label">Avg Hrs / Calendar Day</div><div class="value">${avgHrsPerCalendarDay.toFixed(1)}</div>
        <div class="small-muted">over ${calendarDaysSinceStart} days since tracking start</div></div>
    </div>

    <div class="card">
      <h3>Coverage by Exam Stage — All Tracks</h3>
      ${examStats.map(e=>`<div class="bar-row">
        <div class="bar-label">${EXAM_LABELS[e.exam]}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${e.pct}%"></div></div>
        <div class="bar-val">${e.pct}% · ${e.hours.toFixed(0)}h</div>
      </div>`).join('')}
    </div>

    <div class="card">
      <h3>Time Allocation vs Coverage — by Paper</h3>
      <p class="small-muted" style="margin-bottom:10px;">Hours actually logged against each paper, next to how much of it is checked off. A paper with lots of hours but low coverage is worth a closer look.</p>
      ${subjectStats.map(r=>`<div style="margin-bottom:12px;">
        <div style="display:flex;justify-content:space-between;font-size:13px;"><span>${r.paper.title}</span>
          <span class="mono small-muted">${r.hours.toFixed(1)} hrs · ${r.doneLeaves}/${r.leaves.length} (${r.pct}%)${r.pace!==null?` · ${r.pace.toFixed(2)} hrs/item`:''}${r.projectedDays!==null?` · ~${r.projectedDays}d to finish at current pace`:''}</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${r.pct}%"></div></div>
      </div>`).join('')}
    </div>

    <div class="card">
      <h3>What the Register Notices — Where Time May Be Slipping</h3>
      ${flags.map(f=>`<div class="flag ${f.type}">${f.text}</div>`).join('')}
      <p class="small-muted" style="margin-top:8px;">No-study days in the last 14: <strong>${gap14}</strong>. Overall study-day streak: <strong>${computeStreak(logs)}</strong> day(s).</p>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h3>Routine Consistency</h3>
        <div class="stat" style="margin-bottom:10px;"><div class="label">Avg Wake / Sleep</div><div class="value" style="font-size:19px;">${avgTimeOfDay(wakeTimes)} / ${avgTimeOfDay(sleepTimes)}</div>
          <div class="small-muted">based on ${logs.length} logged day(s)</div></div>
        <div class="stat"><div class="label">Workout Consistency</div><div class="value">${logs.length? Math.round(workoutDays/logs.length*100):0}%</div>
          <div class="small-muted">${workoutDays}/${logs.length} logged days</div></div>
      </div>
      <div class="card">
        <h3>Test Series & Revision Phase</h3>
        <p style="font-size:13.5px;">Revision & test-series phase begins <strong>${dmy(s.revisionStart)}</strong>
        (${daysBetween(todayStr(), s.revisionStart)>=0? daysBetween(todayStr(), s.revisionStart)+' days away' : 'already underway'}).
        Target exam window: <strong>${dmy(s.targetEnd)}</strong>.</p>
        ${todayStr()>=s.revisionStart ? `<p class="small-muted">Tests logged so far: <strong>${testLogs.length}</strong>.
          ${testLogs.length? 'Recent: '+testLogs.slice(-3).map(t=>`${t.testSubject||'Test'} (${t.testScore||'—'})`).join('; ') : ''}</p>` :
          `<p class="small-muted">Test-series logging unlocks automatically on the Daily Log once you reach the revision phase.</p>`}
      </div>
    </div>

    <div class="card">
      <h3>Timeline Read-out</h3>
      <p style="font-size:13.5px;">
        Tracking began <strong>${dmy(s.trackingStart)}</strong>. You are currently in the
        <strong>${currentPhase().phase==='FOUNDATION'?'Foundation':currentPhase().phase==='REVISION'?'Revision & Test Series':'Exam Window'}</strong> phase —
        ${todayStr() >= s.revisionStart
          ? 'prioritize full-length tests, timed revision and error-log review over fresh topics.'
          : 'focus on first-pass coverage of GS papers, CSAT fundamentals, and your Anthropology optional before revision begins.'}
      </p>
    </div>
  `;
  if(suggestion){
    document.getElementById('an-apply-suggestion').onclick = async ()=>{
      await applyRoutineSuggestion(suggestion);
      toast('Default routine updated');
      renderAnalysisPage();
    };
  }
  el.querySelectorAll('.tb-tabs button[data-period]').forEach(btn=>{
    btn.onclick = async ()=>{
      analysisPeriod = btn.dataset.period;
      el.querySelectorAll('.tb-tabs button').forEach(b=>b.classList.toggle('active', b.dataset.period===analysisPeriod));
      const rangeBox = document.getElementById('an-custom-range');
      if(rangeBox) rangeBox.style.display = analysisPeriod==='custom' ? 'flex' : 'none';
      await renderAnalysisTimeBreakdown();
    };
  });
  const rangeApplyBtn = document.getElementById('an-range-apply');
  if(rangeApplyBtn){
    rangeApplyBtn.onclick = async ()=>{
      const from = getDmyIso('an-range-from');
      const to = getDmyIso('an-range-to');
      if(!from || !to){ toast('Pick both a from and a to date'); return; }
      if(from > to){ toast('"From" date must be before "To" date'); return; }
      analysisRange = { from, to };
      analysisChartStates.custom = {level:0, subject:null};
      await renderAnalysisTimeBreakdown();
    };
  }
  await renderAnalysisTimeBreakdown();
}
RENDERERS.analysis = renderAnalysisPage;

let analysisPeriod = 'week';
const analysisChartStates = { day:{level:0,subject:null}, week:{level:0,subject:null}, month:{level:0,subject:null}, all:{level:0,subject:null}, custom:{level:0,subject:null} };
let analysisRange = { from: startOfWeek(todayStr()), to: todayStr() };
async function renderAnalysisTimeBreakdown(){
  const box = document.getElementById('an-tb-chart');
  if(!box) return;
  let logs;
  if(analysisPeriod==='day'){
    const l = await storeGet('daily:'+todayStr(), null);
    logs = l ? [l] : [];
  } else if(analysisPeriod==='week'){
    const wkStart = startOfWeek(todayStr());
    const days=[]; let d=new Date(wkStart+'T00:00:00');
    for(let i=0;i<7;i++){ days.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
    logs = (await Promise.all(days.map(dt=>storeGet('daily:'+dt,null)))).filter(Boolean);
  } else if(analysisPeriod==='month'){
    const ym = todayStr().slice(0,7);
    const all = await getAllDailyLogs();
    logs = all.filter(l=>l.date.startsWith(ym));
  } else if(analysisPeriod==='all'){
    logs = await getAllDailyLogs();
  } else if(analysisPeriod==='custom'){
    const all = await getAllDailyLogs();
    const from = analysisRange.from, to = analysisRange.to;
    logs = all.filter(l=> l.date >= from && l.date <= to);
  } else {
    logs = [];
  }
  const buckets = buildTimeBuckets(logs);
  renderTimeBreakdown(box, buckets, analysisChartStates[analysisPeriod]);
}
</script>

<script>
/* ================= SETTINGS PAGE ================= */
const DEFAULT_SETTINGS = {
  username: '',
  reminderEnabled: false,
  reminderTime: '20:00',
  targetEnd: '2027-05-24',
  revisionStart: '2027-02-01',
  trackingStart: '2026-07-12',
  defaultWake: '06:00',
  defaultSleep: '23:00',
  defaultWorkoutStart: '06:30',
  defaultWorkoutDuration: 45,
  mundaneTasks: [
    {name:'Meals', start:'08:00', end:'09:00'},
    {name:'Commute', start:'09:00', end:'09:30'},
    {name:'Newspaper reading', start:'07:00', end:'07:30'},
    {name:'Family time', start:'20:00', end:'21:00'},
    {name:'Screen/relax time', start:'21:30', end:'22:00'}
  ],
  wakeSuggestionDismissed: false,
  sleepSuggestionDismissed: false
};
async function loadSettings(){
  const s = await storeGet('settings', null);
  STATE.settings = s ? Object.assign({}, DEFAULT_SETTINGS, s) : Object.assign({}, DEFAULT_SETTINGS);
  // Migrate legacy mundaneTasks (plain array of strings) to {name,start,end} objects
  // with ideal times, so old saved data keeps working after this update.
  if(Array.isArray(STATE.settings.mundaneTasks) && STATE.settings.mundaneTasks.length && typeof STATE.settings.mundaneTasks[0]==='string'){
    STATE.settings.mundaneTasks = STATE.settings.mundaneTasks.map(name=>({name, start:'08:00', end:'09:00'}));
  }
  if(!s) await storeSet('settings', STATE.settings);
  return STATE.settings;
}
async function saveSettings(){ await storeSet('settings', STATE.settings); }

// Draft array for the mundane task editor — lets rows be added/removed without
// re-rendering (and losing edits in) the rest of the Settings page.
let settingsMundaneDraft = [];
function renderSettingsPage(){
  const s = STATE.settings;
  const el = document.getElementById('page-settings');
  settingsMundaneDraft = (s.mundaneTasks||[]).map(t=>Object.assign({},t));
  el.innerHTML = `
    <div class="pagehead">
      <div class="eyebrow">08 · Configuration</div>
      <h2>Settings</h2>
      <p>Set your exam timeline (DD/MM/YYYY) and default daily routine. These power the countdown, phase, and pace calculations everywhere else.</p>
    </div>
    <div class="card">
      <h3>Exam Timeline</h3>
      <div class="grid grid-3">
        <div class="field"><label>Tracking start date</label>${dateInputHTML('set-trackstart', s.trackingStart)}</div>
        <div class="field"><label>Revision & test-series start</label>${dateInputHTML('set-revstart', s.revisionStart)}</div>

      name: row.querySelector('.me-name').value.trim(),
      start: getTimeValue('me-start-'+i) || '08:00',

    await goPage('dashboard');
  };
  document.getElementById('set-fresh-start').onclick = async ()=>{
    if(!confirm('Delete today\'s and yesterday\'s logged entries and set Day 1 to tomorrow? This cannot be undone.')) return;
    await storeDelete('daily:'+todayStr());
    await storeDelete('daily:'+yesterdayStr());
    s.trackingStart = tomorrowStr();
    await saveSettings();
    toast('Cleared today & yesterday — Day 1 is now '+dmy(s.trackingStart));
    await goPage('dashboard');
  };
  document.getElementById('set-username-save').onclick = async ()=>{
    s.username = document.getElementById('set-username').value.trim();
    await saveSettings();
    toast(s.username ? `Saved — good to have you, ${s.username}.` : 'Name cleared');

  const reminderStatusEl = document.getElementById('set-reminder-status');
  const showReminderStatus = ()=>{
    if(!reminderStatusEl) return;
    if(!('Notification' in window)){ reminderStatusEl.textContent = "This browser doesn't support notifications."; return; }
    if(Notification.permission==='denied'){ reminderStatusEl.textContent = 'Notifications are blocked for this site in your browser/phone settings — enable them there first.'; return; }
    if(s.reminderEnabled) reminderStatusEl.textContent = `On — you'll get a nudge around ${fmtTime12(s.reminderTime)} on days you have this app open.`;
    else reminderStatusEl.textContent = '';
  };
  showReminderStatus();
  document.getElementById('set-reminder-toggle').onclick = async ()=>{
    if(!('Notification' in window)){ toast("This browser doesn't support notifications."); return; }
    if(!s.reminderEnabled){
      const perm = await Notification.requestPermission();
      if(perm !== 'granted'){ toast('Notification permission was not granted.'); return; }
      s.reminderEnabled = true;
      s.reminderTime = getTimeValue('set-reminder-time') || s.reminderTime;
      await saveSettings();
      startReminderTimer();
      toast('Daily reminder turned on');
    } else {
      s.reminderEnabled = false;
      await saveSettings();
      stopReminderTimer();
      toast('Daily reminder turned off');
    }
    await renderSettingsPage();
  };
  document.getElementById('set-reminder-time').addEventListener('change', async ()=>{
    s.reminderTime = getTimeValue('set-reminder-time') || s.reminderTime;
    await saveSettings();
    if(s.reminderEnabled) startReminderTimer();
    showReminderStatus();
  });
  document.getElementById('set-export').onclick = async ()=>{
    const keys = await storeListKeys('daily:');
    const dailyData = {};
    for(const k of keys){ dailyData['daily:'+k] = await storeGet('daily:'+k, null); }
    const dump = {
      exportedAt: new Date().toISOString(),
      settings: s,
      plans: STATE.plans,
      syllabusProgress: STATE.syllabusProgress,
      daily: dailyData
    };
    const blob = new Blob([JSON.stringify(dump, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const namePart = s.username ? s.username.toLowerCase().replace(/[^a-z0-9]+/g,'-') + '-' : '';
    a.href = url; a.download = `${namePart}upsc-tracker-backup.json`; a.click();
    URL.revokeObjectURL(url);
    toast('Backup downloaded — keep this file somewhere safe.');
  };
  document.getElementById('set-import-input').addEventListener('change', async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const statusEl = document.getElementById('set-backup-status');
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      if(!data || typeof data !== 'object' || (!data.settings && !data.daily)){
        toast("That doesn't look like a UPSC Tracker backup file.");
        return;
      }
      if(!confirm('Restore this backup? It will replace your current name, plans, and syllabus progress on this device (daily logs are merged in, not deleted).')) {
        e.target.value = '';
        return;
      }
      if(data.settings) await storeSet('settings', Object.assign({}, DEFAULT_SETTINGS, data.settings));
      if(data.plans) await storeSet('plans', data.plans);
      if(data.syllabusProgress) await storeSet('syllabusProgress', data.syllabusProgress);
      let restoredDays = 0;
      if(data.daily){
        for(const key of Object.keys(data.daily)){
          if(data.daily[key] == null) continue;
          const cleanKey = key.startsWith('daily:') ? key : 'daily:'+key;
          await storeSet(cleanKey, data.daily[key]);
          restoredDays++;
        }
      }
      const restoredName = data.settings && data.settings.username;
      if(statusEl) statusEl.textContent = restoredName
        ? `Welcome back, ${restoredName} — restored ${restoredDays} day${restoredDays===1?'':'s'} of logs.`
        : `Restored ${restoredDays} day${restoredDays===1?'':'s'} of logs.`;
      toast(restoredName ? `Welcome back, ${restoredName}!` : 'Backup restored');
      await loadSettings();
      await loadPlans();
      await renderSettingsPage();
    }catch(err){
      console.error('restore failed', err);
      toast('Could not read that file — make sure it\'s a UPSC Tracker backup.');
    }
  });
}
function renderSettingsMundaneRows(){
  const wrap = document.getElementById('set-mundane-rows');
  if(!wrap) return;
  if(!settingsMundaneDraft.length){
    wrap.innerHTML = `<div class="empty">No routine tasks yet — click "+ Add task" below.</div>`;
    return;
  }
  wrap.innerHTML = settingsMundaneDraft.map((t,i)=>`
    <div class="mundane-edit-row" data-idx="${i}">
      <input type="text" class="me-name" placeholder="Task name (e.g. Meals)" value="${t.name||''}" style="flex:2;min-width:140px;">
      ${timeInputHTML('me-start-'+i, t.start)}
      <span class="small-muted">to</span>
      ${timeInputHTML('me-end-'+i, t.end)}
      <button type="button" class="btn secondary small me-remove">✕</button>
    </div>
  `).join('');
  wrap.querySelectorAll('.mundane-edit-row').forEach((row,i)=>{
    row.querySelector('.me-name').addEventListener('input', (e)=>{ settingsMundaneDraft[i].name = e.target.value; });
    row.querySelector('.me-remove').onclick = ()=>{ settingsMundaneDraft.splice(i,1); renderSettingsMundaneRows(); };
  });
}
RENDERERS.settings = async ()=>{ renderSettingsPage(); };
</script>

<script>
/* ================= OPENING SCREEN — progress grid + reveal =================
   A day is judged across several independent dimensions of productivity —
   no single one can carry the whole score:
     1. Core-subject study happened (CSAT / General Aptitude / Maths excluded on purpose)
     2. Some physical activity happened
     3. Woke up close to the ideal time
     4. Slept close to the ideal time
     5. The everyday routine (meals, chores, etc. from Settings) was actually followed
   Each is 0..1; the day's score is their average. Colour runs bark-brown (low)
   through an olive midpoint to deep leaf-green (high) — the same read as a
   living vs. wilting plant. Untouched future days stay a neutral paper tone. */

const CORE_EXCLUDE_RE = /csat|general aptitude|maths|mathematics/i;
const PHYSICAL_RE = /run|gym|yoga|walk|workout|exercise|sport|swim|cycl|jog|badminton|football|cricket/i;
const REVEAL_THRESHOLD = 0.7;

function timeToMinutes(t){
  if(!t) return null;
  const parts = t.split(':').map(Number);
  if(parts.length<2 || Number.isNaN(parts[0]) || Number.isNaN(parts[1])) return null;
  return parts[0]*60+parts[1];
}
// Positive = later than ideal, negative = earlier — wraps sensibly around midnight
// so a 23:00 ideal sleep vs a 00:20 actual reads as "80 minutes late", not -640.
function minutesLate(idealTime, actualTime){
  const ideal = timeToMinutes(idealTime), actual = timeToMinutes(actualTime);
  if(ideal===null || actual===null) return null;
  let diff = actual - ideal;
  if(diff < -12*60) diff += 24*60;
  if(diff > 12*60) diff -= 24*60;
  return diff;
}
function creditFromLateness(diffMin, graceMin, spanMin){
  if(diffMin===null) return null;
  if(diffMin <= graceMin) return 1;
  if(diffMin >= graceMin+spanMin) return 0;
  return clamp(1-(diffMin-graceMin)/spanMin, 0, 1);
}
function computeDayScore(log, settings){
  if(!log) return null;
  const parts = [];
  const coreHours = flattenTopicEntries(log.sessions)
    .filter(s=> s.subject && !CORE_EXCLUDE_RE.test(s.subject))
    .reduce((a,s)=>a+(Number(s.hours)||0),0);
  parts.push(clamp(coreHours/3, 0, 1));
  const movedToday = !!log.workoutDone || (log.activities||[]).some(a=> a.name && PHYSICAL_RE.test(a.name) && Number(a.minutes)>0);
  parts.push(movedToday ? 1 : 0);
  const wakeCredit = creditFromLateness(minutesLate(settings.defaultWake, log.wake), 15, 75);
  if(wakeCredit!==null) parts.push(wakeCredit);
  const sleepCredit = creditFromLateness(minutesLate(settings.defaultSleep, log.sleep), 15, 75);
  if(sleepCredit!==null) parts.push(sleepCredit);
  const mundaneVals = Object.values(log.mundane||{});
  if(mundaneVals.length) parts.push(mundaneVals.filter(m=>m&&m.done).length/mundaneVals.length);
  if(!parts.length) return null;
  return parts.reduce((a,b)=>a+b,0)/parts.length;
}
function hexToRgb(hex){
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const n = parseInt(hex,16);
  return [(n>>16)&255,(n>>8)&255,n&255];
}
function rgbToHex(rgb){
  return '#'+rgb.map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function mixHex(hexA,hexB,t){
  t = clamp(t,0,1);
  const a=hexToRgb(hexA), b=hexToRgb(hexB);
  return rgbToHex(a.map((v,i)=>v+(b[i]-v)*t));
}
function grayOf(hex){
  const [r,g,b]=hexToRgb(hex);
  const l = 0.299*r+0.587*g+0.114*b;
  return rgbToHex([l,l,l]);
}
// Picks a grid width/height for a given number of day-tiles, aiming for a
// wide-ish canvas so the hidden scene reads reasonably regardless of how
// long the prep window is.
function pickGridDims(total){
  const aspect = 2.0;
  let rows = Math.max(4, Math.round(Math.sqrt(total/aspect)));
  let cols = Math.max(4, Math.ceil(total/rows));
  return {cols, rows};
}
// Procedurally generates one pixel of a small hidden scene (sunrise behind a
// mountain peak with a flag at the summit) purely from row/col/grid-size —
// works at any grid resolution, no fixed image needed. The person filling
// the grid isn't told what it is; it just gets sharper as real tiles resolve.
function artPixelAt(r,c,rows,cols){
  const x = cols>1 ? c/(cols-1) : 0.5;
  const y = rows>1 ? r/(rows-1) : 0.5;
  const SKY_TOP='#BFE3F5', SKY_BOT='#EAF6FF', SUN='#FFCF6B', SUN_GLOW='#FFE7B0';
  const BACK_MTN='#B7ACC9', FRONT_MTN='#8C6A50', SNOW='#FFFFFF';
  const POLE='#5B4636', FLAG='#E0483E';
  const GROUND_TOP='#7FC993', GROUND_BOT='#3D9A5B';
  const horizon = 0.62;

  if(y > horizon){
    return mixHex(GROUND_TOP, GROUND_BOT, (y-horizon)/(1-horizon));
  }
  const fApexX=0.58, fApexY=0.16, fHalf=0.24;
  const fdx = Math.abs(x-fApexX);
  const frontTop = fdx<=fHalf ? fApexY + (horizon-fApexY)*(fdx/fHalf) : null;

  const bApexX=0.36, bApexY=0.26, bHalf=0.32;
  const bdx = Math.abs(x-bApexX);
  const backTop = bdx<=bHalf ? bApexY + (horizon-bApexY)*(bdx/bHalf) : null;

  if(frontTop!==null && y>=frontTop) return (y-frontTop<0.045) ? SNOW : FRONT_MTN;
  if(backTop!==null && y>=backTop) return (y-backTop<0.035) ? SNOW : BACK_MTN;

  if(frontTop!==null){
    const poleTop = fApexY-0.14;
    if(Math.abs(x-fApexX) < (0.6/cols) && y>=poleTop && y<=frontTop) return POLE;
    if(x>=fApexX && x<=fApexX+0.05 && y>=poleTop && y<=poleTop+0.05) return FLAG;
  }
  const sunX=0.78, sunY=0.20, sunR=0.085;
  const dSun = Math.hypot(x-sunX, y-sunY);
  if(dSun<=sunR) return SUN;
  if(dSun<=sunR*1.5) return mixHex(SUN_GLOW, SKY_TOP, (dSun-sunR)/(sunR*0.5));

  return mixHex(SKY_TOP, SKY_BOT, horizon>0 ? y/horizon : 0);
}
// Blends a tile's hidden-art color with how "revealed" that day is:
// future days stay almost blank, unlogged past days stay dull and gray,
// logged days brighten toward the true color in proportion to the day's score.
function pixelCellColor(artHex, isFuture, score){
  if(isFuture) return mixHex('#ECECEE', artHex, 0.10);
  if(score===null) return mixHex(grayOf(artHex), artHex, 0.16);
  return mixHex(grayOf(artHex), artHex, 0.18+0.82*score);
}
function resizeImageToDataURL(file, maxDim){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let {width,height} = img;
        if(width>maxDim || height>maxDim){
          const scale = maxDim/Math.max(width,height);
          width = Math.round(width*scale); height = Math.round(height*scale);
        }
        const canvas = document.createElement('canvas');
        canvas.width=width; canvas.height=height;
        canvas.getContext('2d').drawImage(img,0,0,width,height);
        resolve(canvas.toDataURL('image/jpeg',0.85));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function renderOpeningScreen(){
  const s = STATE.settings;
  const today = todayStr();
  const target = s.targetEnd;
  const grid = document.getElementById('op-grid');
  const dayNumEl = document.getElementById('op-daynum');
  const countdownEl = document.getElementById('op-countdown');
  const statsEl = document.getElementById('op-stats');
  const revealEl = document.getElementById('op-reveal');

  if(!target || daysBetween(today,target)<0){
    grid.innerHTML = `<div class="empty">Set your target exam date in Settings to see your journey grid.</div>`;
    countdownEl.textContent = 'Target date not set yet';
    statsEl.innerHTML = ''; revealEl.innerHTML = '';
    return;
  }

  const gridStart = (s.trackingStart && s.trackingStart<=today) ? s.trackingStart : today;
  const daysRemaining = daysBetween(today,target)+1;
  const totalDaysSpan = daysBetween(gridStart,target)+1;
  const dayNum = daysBetween(gridStart, today)+1;
  dayNumEl.textContent = dayNum>0?dayNum:1;
  countdownEl.textContent = `${daysRemaining} day${daysRemaining===1?'':'s'} left · target ${dmy(target)}`;

  const logs = await getAllDailyLogs();
  const logByDate = {};
  logs.forEach(l=>logByDate[l.date]=l);

  const {cols, rows} = pickGridDims(totalDaysSpan);
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  let cellsHtml='', scoredCount=0, scoredSum=0, streakGreen=0, streakBroken=false, revealedCount=0;
  for(let i=0;i<totalDaysSpan;i++){
    const d = new Date(gridStart+'T00:00:00'); d.setDate(d.getDate()+i);
    const iso = d.toISOString().slice(0,10);
    const isFuture = iso>today;
    const isToday = iso===today;
    const log = logByDate[iso];
    const score = isFuture ? null : computeDayScore(log,s);
    const r = Math.floor(i/cols), c = i%cols;
    const artHex = artPixelAt(r,c,rows,cols);
    let bg, tip;
    if(isFuture){ bg=pixelCellColor(artHex,true,null); tip=`${dmy(iso)} — still ahead`; }
    else if(score===null){ bg=pixelCellColor(artHex,false,null); tip=`${dmy(iso)} — not logged`; scoredCount++; }
    else { bg=pixelCellColor(artHex,false,score); tip=`${dmy(iso)} — ${Math.round(score*100)}%`; scoredCount++; scoredSum+=score; if(score>=0.4) revealedCount++; }
    if(!isFuture && iso!==today){
      if(score!==null && score>=0.7 && !streakBroken) streakGreen++; else streakBroken=true;
    }
    cellsHtml += `<div class="day-cell${isToday?' is-today':''}" style="background:${bg};" data-tip="${tip}" data-iso="${iso}"></div>`;
  }
  grid.innerHTML = cellsHtml;

  const avg = scoredCount ? scoredSum/scoredCount : null;
  const revealPct = totalDaysSpan ? Math.round((revealedCount/totalDaysSpan)*100) : 0;
  statsEl.innerHTML = `
    <div class="stat"><div class="label">Consistency</div><div class="value">${avg!==null?Math.round(avg*100)+'%':'—'}</div></div>
    <div class="stat"><div class="label">Green streak</div><div class="value">${streakGreen} day${streakGreen===1?'':'s'}</div></div>
    <div class="stat"><div class="label">Picture revealed</div><div class="value">${revealPct}%</div></div>
  `;
  revealEl.innerHTML = `<p class="small-muted" style="text-align:center;margin:2px 0 14px 0;">Something's forming in that grid. Keep logging honest days and it'll come into focus — no spoilers here.</p>`;
}

document.getElementById('op-continue').addEventListener('click', ()=>{
  const screen = document.getElementById('opening-screen');
  screen.classList.add('op-zoom');

  setTimeout(async ()=>{
    screen.style.display='none';
    screen.classList.remove('op-zoom');
    document.getElementById('app').style.display='flex';
    await goPage('dashboard', { replace: true });
    const hero = document.querySelector('.hero');
    if(hero){
      hero.classList.add('today-pulse');
      setTimeout(()=>hero.classList.remove('today-pulse'), 1400);
    }
  }, 500);
});
</script>


<script>
/* ================= DAILY REMINDER (local notification) ================= */
let reminderIntervalId = null;
function startReminderTimer(){
  stopReminderTimer();
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  reminderIntervalId = setInterval(checkReminderTick, 30000);
  checkReminderTick();
}
function stopReminderTimer(){
  if(reminderIntervalId){ clearInterval(reminderIntervalId); reminderIntervalId = null; }
}
function checkReminderTick(){
  const s = STATE.settings;
  if(!s || !s.reminderEnabled || !s.reminderTime) return;
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  const nowHHMM = pad2(now.getHours())+':'+pad2(now.getMinutes());
  if(nowHHMM !== s.reminderTime) return;
  const today = todayStr();
  if(localStorage.getItem('kv:lastReminderFired') === today) return;
  localStorage.setItem('kv:lastReminderFired', today);
  const body = s.username
    ? `Hey ${s.username} — take a few minutes to log today's prep.`
    : "Take a few minutes to log today's prep.";
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(reg=>{
        reg.showNotification('Service Register', { body, icon:'icon-192.png', badge:'icon-192.png', tag:'daily-reminder' });
      });
    } else {
      new Notification('Service Register', { body, icon:'icon-192.png' });
    }
  }catch(e){ console.error('reminder notification failed', e); }
}
// Best-effort periodic background sync registration — silently does nothing
// on browsers/devices that don't support it. See sw.js for why this can't be
// treated as a precise alarm.
async function registerPeriodicSyncBestEffort(){
  try{
    const reg = await navigator.serviceWorker.ready;
    if('periodicSync' in reg){
      const status = await navigator.permissions.query({name:'periodic-background-sync'});
      if(status.state === 'granted'){
        await reg.periodicSync.register('daily-reminder-check', { minInterval: 12*60*60*1000 });
      }
    }
  }catch(e){ /* not supported here — fine, the in-page timer is the real mechanism */ }
}
</script>
<script>
/* ================= INIT ================= */
(async function init(){
  initLiveClock();
  await loadSettings();
  await loadPlans();
  await loadSyllabusProgress();
  await renderOpeningScreen();
  await applyMoodTint();
  await goPage('dashboard', { replace: true });
  registerPeriodicSyncBestEffort();
})();
</script>

<script>
(function(){
  var sidebar = document.getElementById('sidebar');
  var overlay = document.getElementById('nav-overlay');
  var hamburger = document.getElementById('hamburger');
  var edgeTab = document.getElementById('edge-tab');
  if (!sidebar || !overlay || !hamburger) return;

  function openDrawer(){ sidebar.classList.add('open'); overlay.classList.add('open'); if(edgeTab) edgeTab.style.display='none'; }
  function closeDrawer(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); if(edgeTab) edgeTab.style.display=''; }

  hamburger.addEventListener('click', function(){
    sidebar.classList.contains('open') ? closeDrawer() : openDrawer();
  });
  if(edgeTab){
    edgeTab.addEventListener('click', function(){
      sidebar.classList.contains('open') ? closeDrawer() : openDrawer();
    });
  }
  overlay.addEventListener('click', closeDrawer);
  sidebar.addEventListener('click', function(e){
    if (e.target.closest('button[data-page]')) closeDrawer();
  });
})();
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
